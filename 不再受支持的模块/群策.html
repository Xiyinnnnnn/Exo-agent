<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Multi-Agent群聊</title>
<style>
:root {
  --bg-primary: #000000;
  --bg-secondary: #111111;
  --bg-tertiary: #1a1a1a;
  --border-color: #333333;
  --border-focus: #555555;
  --text-primary: #ffffff;
  --text-secondary: #aaaaaa;
  --text-weak: #666666;
  --accent-gold: #ffd700;
  --accent-red: #ff4444;
  --accent-green: #44ff44;
  --accent-blue: #4488ff;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
}

* { 
  margin: 0; padding: 0; box-sizing: border-box; 
  font-family: var(--font-sans);
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

.app-layout {
  display: grid;
  height: 100vh;
  grid-template-rows: 48px 1fr;
}

.app-layout.desktop {
  grid-template-columns: 260px 1fr;
  grid-template-areas:
    "nav nav"
    "sidebar main";
}

.app-layout.mobile {
  grid-template-rows: 48px 1fr 56px;
  grid-template-columns: 1fr;
  grid-template-areas:
    "nav"
    "main"
    "tabs";
}

/* 顶部导航 */
.top-nav {
  grid-area: nav;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  z-index: 100;
}
.top-nav h1 { font-size: 16px; font-weight: 600; }

/* 侧边栏 */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 主内容区 */
.main-area {
  grid-area: main;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 群列表项 */
.group-item {
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}
.group-item:hover { background: var(--bg-tertiary); }
.group-item.active {
  background: rgba(68,136,255,0.1);
  border-left: 2px solid var(--accent-blue);
}
.group-item .name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.group-item .meta { font-size: 11px; color: var(--text-secondary); }
.group-item .unread {
  display: inline-block; background: var(--accent-blue); color: #fff;
  font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 8px;
}

/* 消息列表 */
.message-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* 消息气泡 */
.message-wrapper {
  display: flex;
  flex-direction: column;
  max-width: 85%;
}
.message-wrapper.agent { align-self: flex-start; }
.message-wrapper.user { align-self: flex-end; align-items: flex-end; }
.message-wrapper.system { align-self: center; max-width: 100%; align-items: center; }

.message-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px; font-size: 12px;
}
.message-header .avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg-tertiary); border: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
}
.message-header .name { font-weight: 500; }
.message-header .time { color: var(--text-weak); font-size: 11px; }
.message-header .badge {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
}
.badge-host { background: rgba(255,215,0,0.2); color: var(--accent-gold); }
.badge-admin { background: rgba(68,136,255,0.2); color: var(--accent-blue); }
.badge-muted { background: rgba(255,68,68,0.2); color: var(--accent-red); }

.message-bubble {
  padding: 10px 14px;
  border-radius: var(--radius-md);
  line-height: 1.5;
  font-size: 14px;
  word-break: break-word;
}
.message-bubble.agent-bg {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
}
.message-bubble.user-bg {
  background: #1a3a5c;
  border: 1px solid #2a4a6c;
}
.message-bubble.system-bg {
  background: transparent; border: none;
  color: var(--text-weak); font-size: 12px; text-align: center;
}

/* 消息折叠 */
.message-body.folded {
  max-height: 120px; overflow: hidden; position: relative;
}
.message-body.folded::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
  background: linear-gradient(transparent, var(--bg-secondary));
}
.expand-toggle {
  color: var(--accent-blue); font-size: 12px; cursor: pointer;
  margin-top: 4px; display: inline-block;
}

/* 思考过程 — 每轮独立块 */
.thinking-block {
  border-left: 2px solid var(--border-color);
  padding: 8px 12px; margin: 8px 0;
  font-size: 12px; color: var(--text-secondary);
  background: rgba(255,255,255,0.03);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  white-space: pre-wrap; word-break: break-word;
}
.thinking-block.collapsed { max-height: 0; overflow: hidden; padding: 0 12px; margin: 0; border: none; }
.thinking-toggle {
  color: var(--text-weak); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; gap: 4px; margin-top: 4px;
}

/* 删除按钮 */
.msg-delete-btn {
  position: absolute;
  bottom: 6px; right: 6px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(255,68,68,0.12);
  border: 1px solid rgba(255,68,68,0.25);
  color: var(--accent-red);
  font-size: 11px;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  line-height: 1;
  transition: opacity 0.15s, transform 0.15s;
  z-index: 10;
}
.message-bubble {
  position: relative;
}
.message-bubble:hover .msg-delete-btn {
  display: flex;
}
.msg-delete-btn:hover {
  background: rgba(255,68,68,0.25);
  transform: scale(1.15);
}

/* 工具调用块 — 每轮独立 */
.tool-call-block {
  margin: 4px 0;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  background: rgba(68,136,255,0.06);
  border: 1px solid rgba(68,136,255,0.15);
  font-size: 12px;
  color: var(--accent-blue);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* 轮次分隔 */
.round-block {
  margin: 2px 0;
}

/* 思考过程头部 */
.round-header {
  font-size: 11px;
  color: var(--text-weak);
  padding: 2px 0;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
.round-header .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-gold);
  flex-shrink: 0;
}
.round-header .dot.tool { background: var(--accent-blue); }

/* 表决状态 */
.vote-status-bar {
  display: flex; gap: 8px; flex-wrap: wrap;
  font-size: 11px; padding: 4px 8px; margin-top: 4px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.05);
}
.vote-status-bar .agree { color: var(--accent-green); }
.vote-status-bar .disagree { color: var(--accent-red); }
.vote-status-bar .pending { color: var(--text-weak); }
.vote-status-bar .timeout { color: var(--text-weak); }

/* 引用块 */
.quote-block {
  border-left: 2px solid var(--accent-blue);
  padding: 4px 8px; margin: 4px 0;
  font-size: 12px; color: var(--text-secondary);
  background: rgba(68,136,255,0.08);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  cursor: pointer;
}
.quote-block:hover { background: rgba(68,136,255,0.15); }

/* 输入区域 */
.input-area {
  padding: 12px 16px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  display: flex; gap: 8px; align-items: flex-end;
}
.input-area textarea {
  flex: 1;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 10px 14px;
  font-size: 14px;
  resize: none;
  min-height: 42px;
  max-height: 40vh;
  overflow-y: auto;
  line-height: 1.5;
  outline: none;
}

.input-area textarea:focus { border-color: var(--border-focus); }
.input-area textarea::placeholder { color: var(--text-weak); }

.btn {
  padding: 8px 16px;
  border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; font-weight: 500;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  transition: all 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.1); }
.btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); }
.btn.danger { background: var(--accent-red); border-color: var(--accent-red); }
.btn.danger.stop-active {
  animation: stopPulse 1.5s ease-in-out infinite;
}
@keyframes stopPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
}
.btn.small { padding: 4px 10px; font-size: 12px; }

/* 弹出菜单 */
.popup-menu {
  position: absolute;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  z-index: 1000;
  min-width: 180px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.popup-menu-item {
  padding: 10px 16px; cursor: pointer; font-size: 14px;
  border-bottom: 1px solid var(--border-color);
  transition: background 0.1s;
}
.popup-menu-item:last-child { border-bottom: none; }
.popup-menu-item:hover { background: rgba(255,255,255,0.05); }
.popup-menu-item.danger { color: var(--accent-red); }

/* 汉堡按钮 */
.hamburger-btn {
  width: 36px; height: 36px; border: none; background: transparent;
  color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); font-size: 18px;
}
.hamburger-btn:hover { background: var(--bg-tertiary); }

/* 底部Tab(移动端) */
.mobile-tabs {
  display: none;
  grid-area: tabs;
  height: 56px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  grid-template-columns: repeat(3, 1fr);
}
.mobile-tabs .tab {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-weak);
  font-size: 10px; gap: 2px;
}
.mobile-tabs .tab.active { color: var(--accent-blue); }
.mobile-tabs .tab .tab-icon { font-size: 20px; }

/* 面板覆盖 */
.panel-overlay {
  position: fixed; top: 48px; right: 0; bottom: 0;
  width: 380px; max-width: 100vw;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  z-index: 200;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.25s ease;
}
.panel-overlay.open { transform: translateX(0); }
.panel-overlay .panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: var(--bg-secondary); z-index: 1;
}
.panel-content { padding: 16px; }

/* 选择器 */
.mention-selector {
  position: absolute;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  max-height: 200px; overflow-y: auto;
  z-index: 1000; width: 220px;
}

/* 开关 */
.toggle-switch {
  width: 44px; height: 24px;
  background: var(--border-color);
  border-radius: 12px; cursor: pointer;
  position: relative; transition: background 0.2s;
}
.toggle-switch.on { background: var(--accent-blue); }
.toggle-switch::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; top: 2px; left: 2px;
  transition: left 0.2s;
}
.toggle-switch.on::after { left: 22px; }

/* 范围滑块（压缩阈值滑条） */
.range-slider-group { margin-bottom: 16px; }
.range-slider-group label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;
}
.range-slider-group label .range-value {
  color: var(--accent-blue); font-weight: 600; font-size: 14px;
  min-width: 42px; text-align: right;
}
.range-slider-group input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px;
  background: var(--border-color);
  border-radius: 3px; outline: none; cursor: pointer;
}
.range-slider-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent-blue); cursor: pointer;
  border: 2px solid var(--bg-primary);
  box-shadow: 0 0 6px rgba(68,136,255,0.3);
}
.range-slider-group input[type="range"]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent-blue); cursor: pointer;
  border: 2px solid var(--bg-primary);
}
.range-slider-group .range-labels {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--text-weak); margin-top: 2px;
}
.range-slider-group .range-hint {
  font-size: 11px; color: var(--text-weak); margin-top: 4px;
  font-style: italic;
}

/* 表单 */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 12px;
  background: var(--bg-primary); border: 1px solid var(--border-color);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 14px; outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--border-focus);
}
.form-group textarea {
  min-height: 120px; resize: vertical;
  font-family: var(--font-mono); font-size: 13px;
}

/* 分隔线 */
.section-divider {
  border: none; border-top: 1px solid var(--border-color);
  margin: 16px 0;
}
.section-title {
  font-size: 12px; color: var(--text-weak); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 8px;
}

/* 滚动条美化 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

/* @标记 */
.mention-tag { color: var(--accent-blue); font-weight: 500; }

/* 调试面板样式 */
.debug-log-entry { font-size: 11px; padding: 3px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); font-family: var(--font-mono); }
.debug-log-entry.error { background: rgba(255,68,68,0.1); }
.debug-log-entry.warn { background: rgba(255,215,0,0.05); }
.debug-has-error { animation: debugPulse 1.5s ease-in-out infinite; }
@keyframes debugPulse {
  0%, 100% { background: transparent; }
  50% { background: rgba(255,68,68,0.15); }
}

@media (max-width: 768px) {
  .mobile-tabs { display: grid; }
  .sidebar { display: none; }
  .app-layout.desktop { grid-template-columns: 1fr; }
}
/* === 代码运行结果块 === */
.code-run-block {
  margin: 8px 0;
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--border-color);
}
.code-run-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: var(--bg-tertiary);
  font-size: 12px; color: var(--text-secondary);
}
.code-run-header .lang-tag {
  padding: 1px 8px; border-radius: 3px; font-size: 11px;
  font-family: var(--font-mono);
  background: rgba(68,136,255,0.15); color: var(--accent-blue);
}
.code-run-header .run-time {
  margin-left: auto; font-size: 11px; color: var(--text-weak);
}
.code-run-body {
  padding: 10px 14px;
  font-family: var(--font-mono); font-size: 13px; line-height: 1.5;
  max-height: 300px; overflow-y: auto;
  white-space: pre-wrap; word-break: break-all;
}
.code-run-body.stdout { color: var(--accent-green); background: rgba(68,255,68,0.05); }
.code-run-body.stderr { color: var(--accent-red); background: rgba(255,68,68,0.08); }
.code-run-body.mixed { color: var(--text-primary); background: rgba(255,255,255,0.03); }
.code-run-status { display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px; }
.code-run-status.success { background: var(--accent-green); }
.code-run-status.error { background: var(--accent-red); }
.code-run-status.timeout { background: var(--accent-gold); }
</style>
<script>
/* MCTS+ && 工具库 CDN 加载器 */
var _libs={},_libPromises={};
function _loadLib(name,url,testFn){
  if(_libs[name])return Promise.resolve(_libs[name]);
  if(_libPromises[name])return _libPromises[name];
  if(testFn&&testFn()){_libs[name]=true;return Promise.resolve(true);}
  _libPromises[name]=new Promise(function(res,rej){
    var s=document.createElement('script');s.src=url;s.onload=function(){_libs[name]=true;res(true);};
    s.onerror=function(){rej(new Error('CDN加载失败:'+name));};document.head.appendChild(s);
  });
  return _libPromises[name];
}
var _cdn={
  xlsx:'https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js',
  docx:'https://unpkg.com/docx@8.5.0/build/index.umd.js',
  pdfjs:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
  pdfjsWorker:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js',
  tesseract:'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'
};
function _triggerDownload(blob,filename,mime){
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;
  if(mime)a.type=mime;document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},200);
}
function _escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</head>
<body>

<div class="app-layout desktop" id="appLayout">
  
  <!-- 顶部导航 -->
  <nav class="top-nav" id="topNav">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger-btn" id="sidebarToggle" 
        style="display:none;" onclick="toggleSidebar()">[三]</button>
      <h1 id="navTitle">Multi-Agent群聊</h1>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn small" id="navAction" onclick="handleNavAction()"></button>
    </div>
  </nav>
  
  <!-- 侧边栏（群列表） -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-weight:600;">群聊列表</span>
      <button class="btn small primary" onclick="showKnowledgeBaseDialog()">📚 知识库</button>
    </div>
    <div id="groupList"></div>
  </aside>
  
  <!-- 主内容区 -->
  <main class="main-area" id="mainArea">
    <!-- 群列表视图（移动端） -->
    <div id="groupsView" style="display:none;flex:1;overflow-y:auto;"></div>
    
    <!-- 聊天视图 -->
    <div id="chatView" style="display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;">
      <div class="message-list" id="messageList"></div>
      <div class="input-area" id="inputArea">
        <button class="hamburger-btn" id="chatHamburger" 
          onclick="showChatHamburgerMenu(event)">[+]</button>
        <textarea id="messageInput" rows="1" 
          placeholder="输入消息... 使用 @ 提及Agent"
          onkeydown="handleInputKeydown(event)"
          oninput="handleInputChange(event)"></textarea>
        <input type="file" id="fileUploadInput" accept=".txt,.md,.json,.csv,.log,.xml,.html,.css,.yaml,.yml,.toml,.ini,.cfg,.env,.sh,.bash,.zsh,.bat,.ps1,.js,.ts,.jsx,.tsx,.py,.java,.c,.cpp,.h,.hpp,.go,.rs,.rb,.php,.swift,.kt,.scala,.r,.m,.lua,.sql,.pl,.tex,.pdf,.docx,.xlsx,.xls,.xlsm,.ods,.pptx,.epub,.png,.jpg,.jpeg,.gif,.webp,.bmp" 
          style="display:none;" onchange="handleFileUpload(this)">
        <button class="btn small" onclick="document.getElementById('fileUploadInput').click()"

// ===== HYPERMEM 向量缓存 (IndexedDB冷存储) =====
var _embedDB = null;
function getEmbedDB() {
  if (_embedDB) return _embedDB;
  _embedDB = new Promise(function(resolve, reject) {
    var req = indexedDB.open('EmbeddingCacheDB', 1);
    req.onupgradeneeded = function() {
      if (!req.result.objectStoreNames.contains('cache')) {
        var store = req.result.createObjectStore('cache', { keyPath: 'key' });
        store.createIndex('timestamp', 'timestamp', { unique: false });
      }
    };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
  return _embedDB;
}
// 从缓存读
async function embedCacheGet(key) {
  try {
    var db = await getEmbedDB();
    var tx = db.transaction('cache', 'readonly');
    var store = tx.objectStore('cache');
    var result = await new Promise(function(resolve, reject) {
      var req = store.get(key);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
    return result || null;
  } catch(e) { return null; }
}
// 写入缓存
async function embedCacheSet(key, hdv, rff, pca) {
  try {
    var db = await getEmbedDB();
    var tx = db.transaction('cache', 'readwrite');
    var store = tx.objectStore('cache');
    store.put({ key: key, hdv: hdv, rff: rff, pca: pca, timestamp: Date.now() });
    await new Promise(function(resolve, reject) {
      tx.oncomplete = resolve;
      tx.onerror = function() { reject(tx.error); };
    });
  } catch(e) { /* 静默 */ }
}
// 遍历全部缓存（用于扫描匹配）
async function embedCacheScan(limit) {
  limit = limit || 200;
  try {
    var db = await getEmbedDB();
    var tx = db.transaction('cache', 'readonly');
    var store = tx.objectStore('cache');
    var all = await new Promise(function(resolve, reject) {
      var req = store.getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = function() { reject(req.error); };
    });
    all.sort(function(a, b) { return (b.timestamp||0) - (a.timestamp||0); });

  } catch(e) { return []; }
}

async function embedAndCache(key, text) {
  if (!text || text.length < 3) return null;
  text = String(text).substring(0, 1200);

  var existing = await embedCacheGet(key);

// ===== localStorage封装 =====
const STORAGE_PREFIX = 'magc_';

function storageGet(key) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    return raw ? JSON.parse(raw) : null;
  } catch(e) {
    DebugLogger.error('storage', `读取失败: ${key} - ${e.message}`);
    return null;
  }
}

function storageSet(key, value) {
  try {
    const jsonStr = JSON.stringify(value);
    localStorage.setItem(STORAGE_PREFIX + key, jsonStr);
    DebugLogger.debug('storage', `写入: ${key} (${jsonStr.length}字节)`);
    return true;
  } catch(e) {
    DebugLogger.error('storage', `写入失败: ${key} - ${e.message}`);
    const check = checkStorageQuota();
    if (check.warning) {
      alert(check.message);
    }
    return false;
  }
}

function storageDelete(key) {
  localStorage.removeItem(STORAGE_PREFIX + key);
}

function getAllAgentFriends() {
  return storageGet('agent_friends') || [];
}

function saveAgentFriend(agent) {
  const agents = getAllAgentFriends();
  const idx = agents.findIndex(a => a.id === agent.id);
  if (idx >= 0) {
    agents[idx] = { ...agents[idx], ...agent, updatedAt: Date.now() };
  } else {
    agents.push({ ...agent, createdAt: Date.now(), updatedAt: Date.now() });
  }
  storageSet('agent_friends', agents);
}

function deleteAgentFriend(agentId) {
  const agents = getAllAgentFriends().filter(a => a.id !== agentId);
  storageSet('agent_friends', agents);
}

function getAgentFriend(agentId) {
  return getAllAgentFriends().find(a => a.id === agentId) || null;
}

function findAgentByName(name) {
  return getAllAgentFriends().find(a => a.name === name) || null;
}

function getAllGroups() {
  return storageGet('chat_groups') || [];
}

function getGroup(groupId) {
  return getAllGroups().find(g => g.id === groupId) || null;
}

function saveGroup(group) {
  const groups = getAllGroups();
  const idx = groups.findIndex(g => g.id === group.id);
  if (idx >= 0) {
    groups[idx] = group;
  } else {
    groups.push(group);
  }
  storageSet('chat_groups', groups);
}

function deleteGroup(groupId) {
  const groups = getAllGroups().filter(g => g.id !== groupId);
  storageSet('chat_groups', groups);
  storageDelete('chat_messages_' + groupId);
  wakeSchedulers.delete(groupId);
  concurrencyControllers.delete(groupId);
  // 清理中断控制器
  abortGroupDiscussion(groupId, '群已解散');
  // 延迟清理控制器，给 agent 任务时间处理 abort 并保存消息
  setTimeout(function() {
    groupAbortControllers.delete(groupId);
  }, 300);
  groupAbortControllers.delete(groupId + '_requests');
  // 清理IndexedDB中的消息
  _renderedOldestTimestamp[groupId] = null;
  _isLoadingHistory[groupId] = false;
  (async () => {
    try {
      const db = await getMessagesDB();
      const tx = db.transaction('msgs', 'readwrite');
      const store = tx.objectStore('msgs');
      const idx = store.index('groupId');
      const all = await new Promise((resolve, reject) => {
        const req = idx.getAllKeys(groupId);
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
      for (const key of all) store.delete(key);
    } catch(e) { /* 静默 */ }
  })();
}

  return storageGet('chat_messages_' + groupId) || [];
}

  // 写入localStorage
  const ok = storageSet('chat_messages_' + groupId, messages);
  // 后台异步同步到IndexedDB（最新50条）
  if (messages.length > 0) {
    const recent = messages.slice(-50);
    archiveMessagesToDB(groupId, recent);
  }
  return ok;
}

  const messages = getMessages(groupId);
  messages.push(message);
  const ok = saveMessages(groupId, messages);

  if (messages.length > MSG_HOT_CACHE_SIZE * 2) {

let _msgsDB = null;
function getMessagesDB() {
  if (_msgsDB) return _msgsDB;
  _msgsDB = new Promise((resolve, reject) => {
    const req = indexedDB.open('GroupMessagesDB', 1);
    req.onupgradeneeded = () => {
      if (!req.result.objectStoreNames.contains('msgs')) {
        const store = req.result.createObjectStore('msgs', { keyPath: 'key' });
        store.createIndex('groupId', 'groupId', { unique: false });
        store.createIndex('timestamp', 'timestamp', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _msgsDB;
}

function makeMsgKey(groupId, msgId) {
  return groupId + '::' + msgId;
}

// 将消息批量写入IndexedDB（异步，不阻塞主流程）
async function archiveMessagesToDB(groupId, messages) {
  if (!messages || messages.length === 0) return;
  try {
    const db = await getMessagesDB();
    const tx = db.transaction('msgs', 'readwrite');
    const store = tx.objectStore('msgs');
    for (const msg of messages) {
      store.put({ key: makeMsgKey(groupId, msg.id), groupId, ...msg });
    }
    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch(e) {
    DebugLogger.error('msgDB', `归档消息失败: ${e.message}`);
  }
}

// 从IndexedDB加载指定群组的所有消息
async function loadAllMessagesFromDB(groupId) {
  try {
    const db = await getMessagesDB();
    const tx = db.transaction('msgs', 'readonly');
    const store = tx.objectStore('msgs');
    const idx = store.index('groupId');
    const results = await new Promise((resolve, reject) => {
      const req = idx.getAll(groupId);
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
    return results.map(m => { const { key, ...msg } = m; return msg; });
  } catch(e) {
    DebugLogger.error('msgDB', `加载消息失败: ${e.message}`);
    return [];
  }
}

// 从IndexedDB按时间戳范围加载消息（用于滚动加载历史）
async function loadMessagesRange(groupId, beforeTimestamp, count) {
  try {
    const db = await getMessagesDB();
    const tx = db.transaction('msgs', 'readonly');
    const store = tx.objectStore('msgs');
    const idx = store.index('groupId');
    const all = await new Promise((resolve, reject) => {
      const req = idx.getAll(groupId);
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
    const filtered = all
      .filter(m => m.timestamp < beforeTimestamp)
      .sort((a, b) => b.timestamp - a.timestamp)
      .slice(0, count)
      .reverse()
      .map(m => { const { key, ...msg } = m; return msg; });
    return filtered;
  } catch(e) {
    DebugLogger.error('msgDB', `范围加载失败: ${e.message}`);
    return [];
  }
}


// 清理localStorage消息缓存：只保留未压缩的消息 + 最近N条
function trimMessageCache(groupId) {
  const msgs = getMessages(groupId);
  if (msgs.length <= MSG_HOT_CACHE_SIZE) return;

  const group = getGroup(groupId);
  const startRound = (group && group.summaries.length > 0)
    ? group.summaries[group.summaries.length - 1].roundRange[1] + 1
    : 0;

  const uncompressed = msgs.filter(m => m.roundIndex >= startRound);
  const recent = msgs.slice(-MSG_HOT_CACHE_SIZE);
  const keepIds = new Set([...uncompressed, ...recent].map(m => m.id));
  const toArchive = msgs.filter(m => !keepIds.has(m.id));

  if (toArchive.length === 0) return;

  archiveMessagesToDB(groupId, toArchive);

  const kept = msgs.filter(m => keepIds.has(m.id));
  saveMessagesRaw(groupId, kept);

  DebugLogger.info('msgDB', `群 ${groupId}: 缓存裁剪 ${msgs.length}→${kept.length} (归档${toArchive.length}条)`);
}

// 直接写入localStorage（不触发trim循环），供trimMessageCache内部使用
function saveMessagesRaw(groupId, messages) {
  storageSet('chat_messages_' + groupId, messages);
}

// 检查localStorage用量，超80%触发群主压缩
async function checkAndTriggerCompressionForQuota(groupId) {
  const quota = checkStorageQuota();
  if (!quota.warning) return;
  const group = getGroup(groupId);
  if (!group) return;
  const hostMember = group.members.find(m => m.role === 'host');
  if (!hostMember) return;
  const hostAgent = getAgentFriend(hostMember.agentId);
  if (!hostAgent || !hostAgent.apiKey) return;

  DebugLogger.warn('msgDB', `localStorage用量${quota.usage.toFixed(1)}MB，触发群主压缩`);
  try {
    await executeCompression(groupId);
    trimMessageCache(groupId);
  } catch(e) {
    DebugLogger.error('msgDB', `配额触发压缩失败: ${e.message}`);
  }
}

function makeFileKey(groupId, filename) {
  return groupId + '::' + filename;
}

async function getFileContent(groupId, filename) {
  const flist = groupFiles[groupId] || [];
  const found = flist.find(f => f.filename === filename);
  if (!found) return null;
  // 兼容旧数据：有content字段直接用
  if (found.content !== undefined) return found.content;
  // 新数据：从IndexedDB懒加载
  if (found._storage === 'indexed') {
    try {
      const db = await getFilesDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('files', 'readonly');
        const req = tx.objectStore('files').get(makeFileKey(groupId, filename));
        req.onsuccess = () => resolve(req.result?.content || '');
        req.onerror = () => reject(req.error);
      });
    } catch(e) {
      DebugLogger.error('file', `IndexedDB读取失败: ${filename} - ${e.message}`);
      return null;
    }
  }
  return found.content || null;
}

async function setFileContent(groupId, filename, content, byteSize) {
  const flist = groupFiles[groupId] || [];
  if (!groupFiles[groupId]) groupFiles[groupId] = flist;
  const found = flist.find(f => f.filename === filename);
  if (!found) return;

  const size = byteSize || new Blob([content]).size;

  if (size <= FILE_IDB_THRESHOLD) {
    // 小文件存localStorage
    found.content = content;
    found._storage = 'local';
    found.size = size;
    found.timestamp = Date.now();
    // 清理IndexedDB中可能存在的旧副本
    try {
      const db = await getFilesDB();
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').delete(makeFileKey(groupId, filename));
    } catch(e) { /* 静默 */ }
  } else {
    // 大文件存IndexedDB
    try {
      const db = await getFilesDB();
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').put({
        key: makeFileKey(groupId, filename),
        content: content,
        timestamp: Date.now()
      });
      await new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      delete found.content;  // 从localStorage元数据中移除content
      found._storage = 'indexed';
      found.size = size;
      found.timestamp = Date.now();
    } catch(e) {
      // IndexedDB失败 → 降级存localStorage（有风险但比丢数据好）
      DebugLogger.warn('file', `IndexedDB写入失败,降级localStorage: ${filename} - ${e.message}`);
      found.content = content;
      found._storage = 'local';
      found.size = size;
      found.timestamp = Date.now();
    }
  }
  saveGroupFiles();
}

async function deleteFileContent(groupId, filename) {
  const flist = groupFiles[groupId] || [];
  const found = flist.find(f => f.filename === filename);
  if (found && found._storage === 'indexed') {
    try {
      const db = await getFilesDB();
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').delete(makeFileKey(groupId, filename));
    } catch(e) { /* 静默 */ }
  }
}

function saveGroupFiles() {
  // 存储前确保大文件的content字段已剥离（防止意外把大文件写进localStorage）
  for (const gid of Object.keys(groupFiles)) {
    for (const f of groupFiles[gid] || []) {
      if (f._storage === 'indexed' && f.content !== undefined) {
        delete f.content;
      }
    }
  }
  try {
    localStorage.setItem('groupFiles_v2', JSON.stringify(groupFiles));
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      DebugLogger.error('file', 'localStorage配额不足! 请清理旧文件或迁移到IndexedDB');
      showToast('存储空间不足，请删除一些群文件', 'error');
    }
  }
}

const loadedLibs = {};
function loadLib(key, url, globalCheck) {
  if (loadedLibs[key]) return loadedLibs[key];
  if (globalCheck && globalCheck()) {
    loadedLibs[key] = Promise.resolve();
    return loadedLibs[key];
  }
  loadedLibs[key] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('加载失败: ' + key));
    document.head.appendChild(s);
  });
  return loadedLibs[key];
}

async function ensureLib(name) {

  if (!lib) throw new Error('未知库: ' + name);
  return loadLib(name, lib.url, lib.check);
}

// PDF
FILE_PARSERS['.pdf'] = async (arrayBuf) => {
  await ensureLib('pdfjs');
  pdfjsLib.GlobalWorkerOptions.workerSrc = '';
  const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
  const pages = [];
  const maxPages = Math.min(pdf.numPages, 200);
  for (let i = 1; i <= maxPages; i++) {
    const page = await pdf.getPage(i);
    const text = await page.getTextContent();
    pages.push(text.items.map(it => it.str).join(' '));
  }

const SHEET_EXTS = ['.xlsx','.xls','.xlsm','.ods','.csv'];
for (const ext of SHEET_EXTS) {
  FILE_PARSERS[ext] = async (arrayBuf) => {
    await ensureLib('xlsx');
    const wb = XLSX.read(arrayBuf, { type: 'array' });
    const names = wb.SheetNames.slice(0, 20);
    let out = '[工作簿: ' + wb.SheetNames.length + '个工作表]\n';
    for (const name of names) {
      const ws = wb.Sheets[name];
      const txt = XLSX.utils.sheet_to_csv(ws, { blankrows: false, strip: true });
      out += '\n--- ' + name + ' ---\n' + (txt || '(空表)');
      if (out.length > 50000) { out += '\n...(以上为前50000字，工作表过多，已省略后续。使用 filesystem read 读取原始文件)'; break; }

    }
    return out;
  };
}

// EPUB
FILE_PARSERS['.epub'] = async (arrayBuf) => {
  await ensureLib('jszip');
  const zip = await JSZip.loadAsync(arrayBuf);
  const containerFile = zip.file('META-INF/container.xml');
  if (!containerFile) throw new Error('无效EPUB: 缺少container.xml');
  const containerXml = await containerFile.async('text');
  const rootfileMatch = containerXml.match(/full-path="([^"]+)"/);
  if (!rootfileMatch) throw new Error('无效EPUB: 未找到rootfile');
  const rootfilePath = rootfileMatch[1];
  const opfFile = zip.file(rootfilePath);
  if (!opfFile) throw new Error('无效EPUB: 找不到' + rootfilePath);
  const opfText = await opfFile.async('text');
  const spineMatch = opfText.match(/<spine[^>]*>([\s\S]*?)<\/spine>/);
  if (!spineMatch) throw new Error('无效EPUB: 无spine');
  const idrefs = [...spineMatch[1].matchAll(/idref="([^"]+)"/g)].map(m => m[1]);
  const manifestMatch = opfText.match(/<manifest>([\s\S]*?)<\/manifest>/);
  const idToHref = {};
  if (manifestMatch) {
    for (const m of manifestMatch[1].matchAll(/<item[^>]*id="([^"]+)"[^>]*href="([^"]+)"[^>]*\/?>/g)) {
      idToHref[m[1]] = m[2];
    }
  }
  const opfDir = rootfilePath.replace(/\/[^\/]+$/, '');
  let text = '';
  for (const idref of idrefs) {
    const href = idToHref[idref];
    if (!href) continue;
    const fullPath = opfDir ? opfDir + '/' + href : href;
    const htmlFile = zip.file(fullPath);
    if (!htmlFile) continue;
    const htmlText = await htmlFile.async('text');
    const stripped = htmlText.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    text += stripped + '\n\n';
    if (text.length > 50000) { text += '\n...(以上为前50000字，EPUB内容较长，已省略后续章节。使用 filesystem read 读取原始文件)'; break; }
  }
  return text || '(EPUB解析为空)';
};

  const IMG_EXTS = ['.png','.jpg','.jpeg','.gif','.webp','.bmp'];
  const IMG_MIME = {'.png':'image/png','.jpg':'image/jpeg','.jpeg':'image/jpeg','.gif':'image/gif','.webp':'image/webp','.bmp':'image/bmp'};
  for (const ext of IMG_EXTS) {
    FILE_PARSERS[ext] = async (arrayBuf) => {
      // 1) 将 ArrayBuffer 转为 base64 data URL（保留原始图片供 ocr_image 工具使用）
      const bytes = new Uint8Array(arrayBuf);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const b64 = btoa(binary);
      const mime = IMG_MIME[ext] || 'image/png';
      const dataUrl = 'data:' + mime + ';base64,' + b64;
      // 2) 上传时顺便跑一次 OCR 预览（附在末尾供 readFile 展示）
      let ocrPreview = '';
      try {
        await ensureLib('tesseract');
        const blob = new Blob([arrayBuf]);
        const url = URL.createObjectURL(blob);
        const result = await Tesseract.recognize(url, 'eng+chi_sim', { logger: () => {} });
        URL.revokeObjectURL(url);
        ocrPreview = (result?.data?.text || '').trim();
      } catch(e) { /* OCR预览失败不影响上传 */ }
      // 3) 拼接：Data URL + OCR 预览。readFile 读取时展示预览部分；ocr_image 工具取 Data URL 重新识别
      const preview = ocrPreview ? '\n[OCR预览] ' + ocrPreview : '\n[OCR预览] (未识别到文字)';
      return dataUrl + preview;
    };
  }

  以上名字属于别人——你不是他们中的任何一个。
  你只以【${myName}】的身份完成本职工作。
═════════════════════════════════════`);
  
  return parts.join('\n\n---\n\n');
}

// ===== MCTS+ Plan 引擎 (Agent可调用 - 两种模式) =====
var MCTS_CFG={UCB_C:1.414,PHI:0.08,VL_WEIGHT:0.5,DEATH_PENALTY:0.1,Q_LOCAL:0.08,Q_GLOBAL:0.3,MIN_PHEROMONE:0.001,MAX_PHEROMONE:5.0,CYCLE_SIMILARITY:0.75,RESOURCE_THRESHOLD:100,CONVERGE_CHECK_INTERVAL:50,REGRET_RATIO_THRESHOLD:0.05,VALUE_STDDEV_THRESHOLD:0.02,MIN_ROOT_VISITS:30,
  MODES:{fast:{sims:150,maxDepth:4,evapRate:0.05,concur:12,advInterval:0,tokenBudget:20000,thinking:false},standard:{sims:600,maxDepth:6,evapRate:0.08,concur:20,advInterval:200,tokenBudget:80000,thinking:true}}};
async function _mctsLLM_group(agent,systemPrompt,userPrompt,temperature,maxTokens,useThinking){
  var body={model:(agent.model||'deepseek-v4-pro'),messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}],temperature:temperature,max_tokens:maxTokens||4096,response_format:{type:'json_object'}};
  if(useThinking){body.thinking={type:'enabled'};body.reasoning_effort=agent.effortLevel||'high';}else{body.thinking={type:'disabled'};}
  var ctrl=new AbortController();var tid=setTimeout(function(){ctrl.abort();},useThinking?60000:15000);
  try{
    var resp=await fetch(agent.baseURL.replace(/\/+$/,'')+'/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+agent.apiKey},body:JSON.stringify(body),signal:ctrl.signal});

    clearTimeout(tid);
    if(!resp.ok)throw new Error('MCTS API '+resp.status);
    var data=await resp.json();var content=data.choices[0].message.content;
    try{return JSON.parse(content);}catch(e){var m=content.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);throw new Error('MCTS JSON解析失败');}
  }catch(e){clearTimeout(tid);if(e.name==='AbortError')throw new Error('MCTS超时');throw e;}
}
async function executeMCTSPlan(agent,args){
  var mode=args.mode||'fast';var cfg=MCTS_CFG.MODES[mode]||MCTS_CFG.MODES.fast;
  var problem=args.problem||'';var goal=args.goal||'';var constraints=args.constraints||'';
  var S={nodes:new Map(),edges:new Map(),rootNodeId:null,simCount:0,pathHistory:[],bestPathValue:-Infinity,convergenceData:{regretRatio:1,valueStddev:1,minRootVisits:0},converged:false,stats:{apiCalls:0,totalTokens:0,maxDepth:0,deaths:{}},activeSims:0,maxConcurrent:cfg.concur};
  var uid=function(){return crypto.randomUUID();};
  var rootId=uid();S.nodes.set(rootId,{id:rootId,state:problem,depth:0,parentId:null,children:[],createdAt:Date.now(),expandedAt:null,visits:0,totalValue:0,virtualVisits:0,virtualValue:0});S.rootNodeId=rootId;
  function sel(nid){var n=S.nodes.get(nid);if(!n||n.children.length===0)return null;var e=n.children,tv=n.visits+n.virtualVisits;if(tv===0)return e[Math.floor(Math.random()*e.length)];var be=null,bv=-Infinity;for(var i=0;i<e.length;i++){var x=e[i],N=(x.visits||0)+(x.virtualVisits||0)||0.001,W=(x.totalValue||0)-((x.virtualVisits||0)>0?MCTS_CFG.VL_WEIGHT*(x.virtualVisits||0):0),ucb1=W/N+MCTS_CFG.UCB_C*Math.sqrt(Math.log(tv)/N)+MCTS_CFG.PHI*(x.pheromone||0.1);if(ucb1>bv){bv=ucb1;be=x;}}return be;}
  function mVL(eid){var e=S.edges.get(eid);if(!e)return;e.virtualVisits=(e.virtualVisits||0)+1;var n=S.nodes.get(e.fromId);if(n)n.virtualVisits=(n.virtualVisits||0)+1;}
  function uVL(eid){var e=S.edges.get(eid);if(!e)return;e.virtualVisits=Math.max(0,(e.virtualVisits||0)-1);var n=S.nodes.get(e.fromId);if(n)n.virtualVisits=Math.max(0,(n.virtualVisits||0)-1);}
  function cVL(ids){for(var i=0;i<ids.length;i++)uVL(ids[i]);}
  function bp(ids,val){for(var i=ids.length-1;i>=0;i--){var e=S.edges.get(ids[i]);if(!e)continue;e.visits=(e.visits||0)+1;e.totalValue=(e.totalValue||0)+val;e.pheromone=Math.min(MCTS_CFG.MAX_PHEROMONE,(e.pheromone||0.1)+MCTS_CFG.Q_LOCAL*val);var n=S.nodes.get(e.toId);if(n){n.visits=(n.visits||0)+1;n.totalValue=(n.totalValue||0)+val;}}if(val>0.5){for(var j=0;j<ids.length;j++){var ee=S.edges.get(ids[j]);if(ee)ee.pheromone=Math.min(MCTS_CFG.MAX_PHEROMONE,(ee.pheromone||0.1)+MCTS_CFG.Q_GLOBAL*val);}}if(val>S.bestPathValue)S.bestPathValue=val;}
  function eva(){S.edges.forEach(function(e){e.pheromone=Math.max(MCTS_CFG.MIN_PHEROMONE,(e.pheromone||0.1)*(1-cfg.evapRate));});}
  function chC(){var r=S.nodes.get(S.rootNodeId);if(!r||r.children.length<2)return false;var s=r.children.slice().sort(function(a,b){return(b.visits||0)-(a.visits||0);});var bv=s[0]?s[0].visits||0:0,sv=s[1]?s[1].visits||0:1;S.convergenceData.regretRatio=sv/Math.max(1,bv);var rc=S.pathHistory.slice(-100),vs=1;if(rc.length>=20){var mn=rc.reduce(function(a,b){return a+b;},0)/rc.length;vs=Math.sqrt(rc.reduce(function(s,v){return s+Math.pow(v-mn,2);},0)/rc.length);}S.convergenceData.valueStddev=vs;var mv=Math.min.apply(null,r.children.map(function(e){return e.visits||0;}));S.convergenceData.minRootVisits=mv;return S.convergenceData.regretRatio<MCTS_CFG.REGRET_RATIO_THRESHOLD&&vs<MCTS_CFG.VALUE_STDDEV_THRESHOLD&&mv>=MCTS_CFG.MIN_ROOT_VISITS&&S.simCount>200;}
  async function rS(){if(S.converged)return;S.activeSims++;var pe=[],pn=[S.rootNodeId],n=S.nodes.get(S.rootNodeId),cc=0;while(n&&n.expandedAt!==null&&n.children.length>0&&n.depth<cfg.maxDepth){var ed=sel(n.id);if(!ed)break;mVL(ed.id);pe.push(ed.id);n=S.nodes.get(ed.toId);if(!n)break;pn.push(n.id);cc+=(n._cost||0);}if(!n){cVL(pe);S.activeSims--;return;}var v=0;if(n.expandedAt===null&&n.depth<cfg.maxDepth){try{var er=await _mctsLLM_group(agent,'你是决策路径生成器。输出JSON: {next_steps:[{state,action,reasoning,probability_hint:0-1}]}。2-4个候选。深度已达上限或自然终止则返回空数组。','当前状态：'+n.state+'\\n深度：'+n.depth+'/'+cfg.maxDepth+'\\n目标：'+goal+'\\n约束：'+constraints,0.8,4096,cfg.thinking);if(er.next_steps&&er.next_steps.length>0){for(var si=0;si<er.next_steps.length;si++){var st=er.next_steps[si],cid=uid();S.nodes.set(cid,{id:cid,state:st.state,depth:n.depth+1,parentId:n.id,children:[],createdAt:Date.now(),expandedAt:null,visits:0,totalValue:0,virtualVisits:0,virtualValue:0});var eid=uid();S.edges.set(eid,{id:eid,fromId:n.id,toId:cid,action:st.action,reasoning:st.reasoning||'',visits:0,totalValue:0,pheromone:0.1,heuristic:st.probability_hint||0.3,virtualVisits:0});n.children.push(S.edges.get(eid));}}n.expandedAt=Date.now();}catch(e){S.activeSims--;return;}}
    var pc=pe.map(function(eid){var e=S.edges.get(eid);if(!e)return'?';var t=S.nodes.get(e.toId);return e.action+' \u2192 '+(t?t.state.slice(0,30):'?');}).join(' | ');
    try{var evR=await _mctsLLM_group(agent,'你是决策步骤评估器。输出JSON: {logical_consistency:0-1,constraint_compliance:0-1,value_progression:0-1,risk_assessment:0-1,robustness:0-1,resource_cost:0-100,composite_score:0-1,death_risk:"none/low/medium/high",death_type:null}。composite_score=0.25*logical+0.30*compliance+0.20*progression+0.15*(1-risk)+0.10*robustness。','当前状态：'+n.state+'\\n已完成路径：'+pc+'\\n约束：'+constraints,0.2,4096,cfg.thinking);
      var rv=evR.composite_score||0.5,dd=false,dt=null;
      if(evR.death_type==='CONTRADICTION'&&evR.death_risk==='high'){dd=true;dt='CONTRADICTION';}else if(evR.constraint_compliance<0.3&&evR.death_risk==='high'){dd=true;dt='CONSTRAINT_VIOLATION';}else if((evR.resource_cost||0)+cc>MCTS_CFG.RESOURCE_THRESHOLD){dd=true;dt='RESOURCE_EXHAUSTION';}
      if(dd){v=rv*MCTS_CFG.DEATH_PENALTY;S.stats.deaths[dt]=(S.stats.deaths[dt]||0)+1;}else{v=rv;}
      if(n.depth>S.stats.maxDepth)S.stats.maxDepth=n.depth;
    }catch(e){v=0.3;}
    bp(pe,v);cVL(pe);S.pathHistory.push(v);if(S.pathHistory.length>500)S.pathHistory.shift();S.simCount++;
    if(S.simCount%80===0)eva();
    if(cfg.advInterval>0&&S.simCount%cfg.advInterval===0&&S.simCount>100){try{var r=S.nodes.get(S.rootNodeId);if(r&&r.children.length>0){var be=r.children.slice().sort(function(a,b){return((b.totalValue||0)/Math.max(1,b.visits||1))-((a.totalValue||0)/Math.max(1,a.visits||1));})[0];if(be){var t=S.nodes.get(be.toId);var atk=await _mctsLLM_group(agent,'你是对抗测试引擎。输出JSON: {attack_success:bool,point_of_failure:"",confidence:0-1,attack_vector:"premise_negation/external_shock/constraint_amplify"}','路径：'+be.action+' \\u2192 '+(t?t.state.slice(0,60):'?')+'\\n约束：'+constraints,0.9,4096,cfg.thinking);if(atk.attack_success)be.pheromone=(be.pheromone||0.1)*0.7;}}}catch(e){}}

  var root=S.nodes.get(S.rootNodeId);if(root&&root.children.length>0){
    var cp=function(fe){var pa=[],nid=fe.toId;pa.push({action:fe.action,reasoning:fe.reasoning||'',state:S.nodes.get(nid)?S.nodes.get(nid).state:'',value:(fe.totalValue||0)/Math.max(1,fe.visits||1),visits:fe.visits||0,pheromone:fe.pheromone||0});while(nid){var n=S.nodes.get(nid);if(!n||n.children.length===0)break;var s=n.children.slice().sort(function(a,b){return((b.totalValue||0)/Math.max(1,b.visits||1))-((a.totalValue||0)/Math.max(1,a.visits||1));});var be=s[0];if(!be)break;nid=be.toId;var tn=S.nodes.get(nid);pa.push({action:be.action,reasoning:be.reasoning||'',state:tn?tn.state:'',value:(be.totalValue||0)/Math.max(1,be.visits||1),visits:be.visits||0,pheromone:be.pheromone||0});}return pa;};

  }
  return result;
}

async function _toolCalculate(expr){
  try{var r=Function('"use strict";return ('+(expr||'0')+')')();return '计算结果: '+expr+' = '+r;}catch(e){return '计算失败: '+e.message;}
}
async function _toolGenerateTable(args){
  var headers=args.headers||[],rows=args.rows||[],fmt=args.download||'csv';
  if(!headers.length)return '表格缺少表头';
  var csv=_escapeCsv(headers);for(var i=0;i<rows.length;i++)csv+='\n'+_escapeCsv(rows[i]||[]);
  var fn='table-'+Date.now().toString(36);
  if(fmt==='xlsx'){try{await _loadLib('xlsx',_cdn.xlsx,function(){return typeof XLSX!=='undefined';});var ws=XLSX.utils.aoa_to_sheet([headers].concat(rows));var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Sheet1');var xd=XLSX.write(wb,{type:'array',bookType:'xlsx'});_saveGroupFile(args._groupId,fn+'.xlsx',new Blob([xd]),'xlsx');}catch(e){csv='[XLSX失败,回退CSV]\n'+csv;}}
  _saveGroupFile(args._groupId,fn+'.csv',csv,'csv');
  _saveGroupFile(args._groupId,fn+'.md','# 表格\n\n|'+headers.join('|')+'|\n|'+headers.map(function(){return '---';}).join('|')+'|\n'+rows.map(function(r){return '|'+(r||[]).join('|')+'|';}).join('\n'),'md');
  var rowSample = rows.slice(0, 5).map(function(r){return '|'+(r||[]).join('|')+'|';}).join('\n');
  var tblSummary = '表头: '+headers.join(', ')+' | 共'+rows.length+'行\n'+rowSample;
  if(rows.length>5)tblSummary+='\n...(以上为前5行摘要，使用 filesystem read '+fn+'.csv 读取完整表格)';

async function _toolVectorSearch(args){
  var query=(args.query||'').trim();if(!query)return '请提供搜索查询';
  // === 阶段1: 查询嵌入 ===
  var queryHDV = null;
  try {
    var hdvResp = await runCodeInSandbox('hdv_encode', query.substring(0, 500), 5000);
    if (hdvResp && hdvResp.success && hdvResp.result) queryHDV = hdvResp.result;
  } catch(e) {}
  // === 阶段2: 搜聊天记录 ===
  var chatResults = [];
  try {
    var cached = await embedCacheScan(200);
    for (var i = 0; i < cached.length; i++) {
      if (!cached[i].key || cached[i].key.indexOf('msg:') !== 0) continue;
      if (!cached[i].hdv || !queryHDV) continue;
      var sim = _hdvHammingMain(queryHDV, cached[i].hdv);
      if (sim > 0.35) {
        chatResults.push({ key: cached[i].key, similarity: sim, ts: cached[i].timestamp });
      }
    }
    chatResults.sort(function(a, b) { return b.similarity - a.similarity; });
    chatResults = chatResults.slice(0, 5);
  } catch(e) {}
  // === 阶段3: 搜文件 ===
  var allFiles = [];
  Object.keys(groupFiles||{}).forEach(function(gid) {
    (groupFiles[gid]||[]).forEach(function(f) {
      if (f.visible !== false) allFiles.push({ filename: f.filename, size: f.size, tag: gid, ts: f.timestamp });
    });
  });
  var qLower = query.toLowerCase();
  var qw = qLower.split(/\s+/);
  var fileScored = allFiles.map(function(f) {
    var s = 0, fn = f.filename.toLowerCase();
    for (var i = 0; i < qw.length; i++) { if (fn.indexOf(qw[i]) >= 0) s += 4; }
    if (f.size > 0) s -= Math.log10(f.size + 1) * 0.3;
    s -= Math.log10(Date.now() - f.ts + 86400000) * 0.2;
    return { file: f, score: s };
  }).filter(function(x) { return x.score > 0; }).sort(function(a, b) { return b.score - a.score; }).slice(0, 5);
  // === 组装结果 ===
  var parts = [];
  parts.push('🔍 语义搜索: "'+query+'"');
  if (chatResults.length > 0) {
    parts.push('\n📝 聊天记录匹配:');
    for (var ci = 0; ci < chatResults.length; ci++) {
      var cr = chatResults[ci];
      parts.push('  ' + (ci + 1) + '. [相似度:' + cr.similarity.toFixed(2) + '] ' + cr.key.substring(0, 100));
    }
    parts.push('  → 使用上述消息ID进行 [引用:msg:xxx] 以获取完整上下文');
  }
  if (fileScored.length > 0) {
    parts.push('\n📁 群文件匹配:');
    for (var fi = 0; fi < fileScored.length; fi++) {
      var fs = fileScored[fi];
      parts.push('  ' + (fi + 1) + '. ' + fs.file.filename + ' (' + (fs.file.size / 1024).toFixed(1) + 'KB, 评分:' + fs.score.toFixed(1) + ')');
    }
    parts.push('  → 使用 filesystem read 读取文件完整内容');
  }
  if (parts.length === 1) return '未找到与 "' + query + '" 相关的聊天记录或文件。';
  return parts.join('\n');
}

// 主线程汉明距离（轻量）
function _hdvHammingMain(a, b) {
  if (!a || !b || a.length !== 313 || b.length !== 313) return 0;
  var dist = 0;
  for (var i = 0; i < 313; i++) {
    var x = a[i] ^ b[i];
    x = x - ((x >>> 1) & 0x55555555);
    x = (x & 0x33333333) + ((x >>> 2) & 0x33333333);
    dist += ((x + (x >>> 4) & 0xF0F0F0F) * 0x1010101) >>> 24;
  }
  return 1.0 - dist / 10000;
}

function parseAgentResponse(rawText) {
  // 【重构】标准Function Calling模式下，工具调用不再需要从文本中解析JSON块。
  // 但用户管理命令仍通过JSON文本输入，需要提取 commandBlock。
  var thinkingContent = null;
  var cleanContent = rawText || '';
  var displayContent = cleanContent;

  // 提取 <thinking>...</thinking>
  var thinkingMatch = cleanContent.match(/<\s*thinking\s*>([\s\S]*?)<\s*\/\s*thinking\s*>/i);
  if (thinkingMatch) {
    thinkingContent = thinkingMatch[1].trim();
    cleanContent = cleanContent.replace(/<\s*thinking\s*>[\s\S]*?<\s*\/\s*thinking\s*>/gi, '');
  }
  // 也提取 <think>...</think>
  var thinkMatch = cleanContent.match(/<\s*think\s*>([\s\S]*?)<\s*\/\s*think\s*>/i);
  if (thinkMatch) {
    if (!thinkingContent) thinkingContent = thinkMatch[1].trim();
    else thinkingContent += '\n\n' + thinkMatch[1].trim();
    cleanContent = cleanContent.replace(/<\s*think\s*>[\s\S]*?<\s*\/\s*think\s*>/gi, '');
  }

  // 提取引用标记 [引用:消息ID] 或 [引用:msg:短ID]
  var quotedMessageId = null;
  var quoteRegex = /\[引用:(?:msg:)?([^\]]+)\]/;
  var quoteMatch = cleanContent.match(quoteRegex);
  if (quoteMatch) {
    quotedMessageId = quoteMatch[1].trim();
    cleanContent = cleanContent.replace(/\[引用:(?:msg:)?[^\]]+\]\s*/g, '').trim();
  }

  // 剥离残留的thinking标签
  cleanContent = cleanContent
    .replace(/<\s*thinking\s*>[\s\S]*?<\s*\/\s*thinking\s*>/gi, '')
    .replace(/<\s*think\s*>[\s\S]*?<\s*\/\s*think\s*>/gi, '')
    .trim();

  // 【用户命令】从文本中提取 {"command":"xxx",...} 块
  var commandBlock = null;
  var braceStack = [];
  for (var i = 0; i < cleanContent.length; i++) {
    var ch = cleanContent[i];
    if (ch === '{') braceStack.push(i);
    else if (ch === '}' && braceStack.length === 1) {
      var start = braceStack.pop();
      var candidate = cleanContent.substring(start, i + 1);
      // 快速检查是否包含 "command" 关键字
      if (candidate.indexOf('"command"') === -1 && candidate.indexOf('"command') === -1) continue;
      try {
        var parsed = JSON.parse(candidate);
        if (parsed && parsed.command) {
          commandBlock = parsed;
          cleanContent = cleanContent.replace(candidate, '').trim();
          break;
        }
      } catch(e) {}
    } else if (ch === '}') {
      braceStack.pop();
    }
  }

  displayContent = cleanContent;

  return {
    cleanContent: cleanContent || '',
    thinkingContent: thinkingContent,
    displayContent: displayContent || '',
    quotedMessageId: quotedMessageId,
    commandBlock: commandBlock
  };
}


// 【Bug1修复】消息ID查找：支持精确匹配 + 前缀匹配（短ID）
function findMessageById(messages, idOrPrefix) {
  // 精确匹配
  let found = messages.find(m => m.id === idOrPrefix);
  if (found) return found;
  // 前缀匹配（支持 msg:短ID 格式）
  found = messages.find(m => m.id.startsWith(idOrPrefix));
