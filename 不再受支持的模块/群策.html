}

// ===== 提议与表决状态机 =====
const ProposalStateMachine = {

  proposals: new Map(),
  
  create(proposalId, content, proposerId, groupId) {
    const proposal = {
      id: proposalId,
      content,
      proposerId,
      groupId,
      status: 'open',
      votes: {},
      createdAt: Date.now(),
      timeoutMinutes: 5
    };
    // 【Bug2修复】提议者自动投同意票
    proposal.votes[proposerId] = { 
      vote: 'agree', 
      reason: '提议者自动同意', 
      timestamp: Date.now() 
    };
    this.proposals.set(proposalId, proposal);
    this._scheduleTimeout(proposalId, groupId);
    return proposal;
  },
  
  castVote(proposalId, voterId, vote, reason) {
    const p = this.proposals.get(proposalId);
    if (!p || p.status !== 'open') return null;
    p.votes[voterId] = { vote, reason, timestamp: Date.now() };
    this._checkResolution(proposalId);
    return p;
  },
  
  // 【Bug1修复】获取指定群中所有状态为open的提议
  getOpenProposalsForGroup(groupId) {
    const result = [];
    for (const [id, p] of this.proposals) {
      if (p.groupId === groupId && p.status === 'open') {
        result.push({ id, content: p.content, proposerId: p.proposerId, votes: p.votes });
      }
    }
    return result;
  },
  
  // 【Bug1修复】为用户投票提供便捷方法：自动查找当前群唯一活跃提议并投票
  voteOnCurrentProposal(groupId, vote, reason) {
    const openProposals = this.getOpenProposalsForGroup(groupId);
    if (openProposals.length === 0) {
      addSystemMessage(groupId, `[系统] 当前没有进行中的提议可以表决`);
      return null;
    }
    if (openProposals.length > 1) {
      const proposalList = openProposals.map(p => 
        `  - ID: ${p.id.substring(0, 8)}... 内容: ${(p.content || '').substring(0, 40)}`
      ).join('\n');
      addSystemMessage(groupId, `[系统] 当前有多个进行中的提议，请指定proposalId：\n${proposalList}`);
      return null;
    }
    const target = openProposals[0];
    return this.castVote(target.id, '__user__', vote, reason);
  },
  
  _checkResolution(proposalId) {
    const p = this.proposals.get(proposalId);
    if (!p) return;
    if (p.status !== 'open') return;
    
    const group = getGroup(p.groupId);
    if (!group) return;
    
    // 有表决权成员：排除禁言者 + 排除用户（用户挂机，不参与计票）
    const eligibleMembers = group.members.filter(m => !m.isMuted && m.agentId !== '__user__');
    const totalVoters = eligibleMembers.length;
    if (totalVoters === 0) return;
    
    const votes = Object.values(p.votes);
    const agrees = votes.filter(v => v.vote === 'agree').length;
    const disagrees = votes.filter(v => v.vote === 'disagree').length;
    
    // 一票否决：任意反对 → 立即否决
    if (disagrees >= 1) {
      p.status = 'rejected';
      addSystemMessage(p.groupId, `[决议否决] 提议 "${p.content}" 遭一票否决 (${agrees}同意/${disagrees}反对，共${totalVoters}人有表决权)`);
      logResolution(p.groupId, p.content, 'rejected', agrees, disagrees, totalVoters, '一票否决');
      return;
    }
    
    // 全票同意才通过
    if (agrees >= totalVoters) {
      p.status = 'passed';
      addSystemMessage(p.groupId, `[决议通过] 提议 "${p.content}" 获全票通过 (${agrees}/${totalVoters})`);
      logResolution(p.groupId, p.content, 'passed', agrees, disagrees, totalVoters, '全票通过');
      return;
    }
    
    // 投票未齐 → 维持open，等待更多投票
  },
  
  _scheduleTimeout(proposalId, groupId) {
    setTimeout(() => {
      const p = this.proposals.get(proposalId);
      if (p && p.status === 'open') {
        p.status = 'timeout';
        if (activeGroupId === groupId) {
          addSystemMessage(groupId, `[提议超时] 提议 "${p.content}" 在5分钟内未完成表决，已自动关闭`);
          renderChatMessages();
        } else {
          addSystemMessage(groupId, `[提议超时] 提议 "${p.content}" 在5分钟内未完成表决，已自动关闭`);
        }
      }
    }, 5 * 60 * 1000);
  }
};

function logResolution(groupId, content, result, agrees, disagrees, totalVoters, detail) {
  (async () => {
    try {
      const logFile = 'resolutions-log.md';
      if (!groupFiles[groupId]) groupFiles[groupId] = [];
      let found = groupFiles[groupId].find(f => f.filename === logFile);
      if (!found) {
        groupFiles[groupId].push({
          filename: logFile, _storage: 'local', size: 0,
          timestamp: Date.now(), visible: true
        });
      }
      let existing = '';
      try { existing = await getFileContent(groupId, logFile) || ''; } catch(e) {}
      const header = existing ? '' : `# 决议日志\n\n> 群组: ${getGroup(groupId)?.name || '未知'}\n\n`;
      const ts = new Date().toLocaleString('zh-CN');
      const resultLabel = result === 'passed' ? '✅ 通过' : '❌ 否决';
      const entry = `### ${ts} — ${resultLabel}\n- 提案: ${content}\n- 表决: ${agrees}同意 / ${disagrees}反对 (共${totalVoters}人有表决权)\n- 详情: ${detail}\n\n`;
      await setFileContent(groupId, logFile, header + existing + entry);
      saveGroupFiles();
    } catch(e) { DebugLogger.error('resolution', '决议日志写入失败: ' + e.message); }
  })();
}

// ===== 上下文拼接 =====
function buildAgentContext(group, agentId, messages) {
  const member = group.members.find(m => m.agentId === agentId);
  if (!member) return { systemPrompt: '', messages: [] };
  
  const agent = getAgentFriend(agentId);
  if (!agent) return { systemPrompt: '', messages: [] };
  
  const systemPrompt = assembleSystemPrompt(agent, member, group, false);
  
  const contextMessages = [];
  
  if (group.summaries.length > 0) {
    const latestSummary = group.summaries[group.summaries.length - 1];
    const summaryFileName = `summary-round-${latestSummary.roundRange[0]}-${latestSummary.roundRange[1]}.md`;
    // 精简摘要 + 文件引用，节省 ~300 tokens/Agent
    const briefSummary = latestSummary.summary.length > 250
      ? latestSummary.summary.substring(0, 250) + '...'
      : latestSummary.summary;
    contextMessages.push({
      role: 'system',
      content: `[历史摘要 · 第${latestSummary.roundRange[0]}~${latestSummary.roundRange[1]}轮]\n${briefSummary}\n\n📄 完整摘要: readFile ${summaryFileName}\n📋 索引: readFile summary-index.md\n📊 超摘要: readFile meta-summary.md\n🎯 决策日志: readFile decisions-log.md\n\n[以下为最近讨论]`
    });
  }
  
  // 【新增】注入当前群成员列表（含ID），让每个Agent都知道本群有谁及其精确ID
  // 【隐藏哨兵过滤】系统哨兵（如偏离检测）不对普通Agent暴露
  const memberListText = group.members
    .filter(m => !HIDDEN_AGENT_IDS.has(m.agentId))
    .map(m => {
      const memberAgent = getAgentFriend(m.agentId);
      const name = memberAgent ? memberAgent.name : '未知';
      const agentIdShort = m.agentId ? m.agentId.substring(0, 12) + '...' : '?';
      const roleLabel = m.role === 'host' ? '[群主]' 
        : m.role === 'admin' ? '[管理员]' 
        : '[成员]';
      const mutedLabel = m.isMuted ? ' [禁言中]' : '';
      return `${roleLabel} ${name} (ID: ${m.agentId})${mutedLabel}`;
    }).join('\n');
  contextMessages.push({
    role: 'system',
    content: `[当前群成员列表 — 管理命令必须使用精确ID]\n${memberListText}\n[提示: 使用 @名称 提及特定成员; 群主/管理员使用mute/unmute/remove时必须用上方列表中的精确ID作为target参数; 群主使用invite前必须先listFriends获取可邀请好友ID]`
  });
  
  // 【Bug2修复】明确告知Agent自己的身份与权限边界，防止成员/管理员越权以为自己是群主
  const myRoleLabel = member.role === 'host' ? '群主'
    : member.role === 'admin' ? '管理员'
    : '成员';
  let roleBoundaryText = '';
  if (member.role === 'host') {
    roleBoundaryText = '你是本群的最高管理者。你可以禁言、解除禁言、拉人、删人、发起提议、终止讨论。当前表决采用一票否决制（任一人反对即否决，需全员同意方通过），不存在平票。所有管理命令的target必须使用精确的agent ID。';
  } else if (member.role === 'admin') {
    roleBoundaryText = '你是群主的辅助执行者，不是群主。你可以禁言、解除禁言、发起提议、投票表决。但你不能拉人、不能删人、不能解散群。对群主已做的决定，你只能执行不能推翻。所有管理命令的target必须使用精确的agent ID。';
  } else {
    roleBoundaryText = '你是本群的普通成员，不是群主也不是管理员。你没有管理权限（不能禁言、不能拉人、不能删人）。你可以参与讨论、被@时回应、发起提议、投票表决。请专注你的专业领域发言，不要试图执行管理命令。';
  }
  // 【身份锚点·第三道锁】动态生成 — 运行时最后一次身份告知，
  // 列出群内所有其他成员名字，明确禁止Agent自称别人名字。
  const ctxOtherNames = group.members
    .filter(m => m.agentId !== agent.id && !HIDDEN_AGENT_IDS.has(m.agentId))
    .map(m => {
      const a = getAgentFriend(m.agentId);
      return a ? a.name : '未知';
    });
  const ctxOtherNamesStr = ctxOtherNames.length > 0
    ? ctxOtherNames.join('、')
    : '无';
  
  // [v3] 如果当前Agent是偏离检测哨兵，注入群话题基准
  if (agent.id === 'builtin-watchdog-drift') {
    const groupTopic = group.topic || '';
    if (groupTopic) {
      contextMessages.push({
        role: 'system',
        content: `[偏离检测基准] 本群讨论话题：「${groupTopic}」。请以上述话题为偏离判断基准。偏离=持续讨论与该话题不相关的内容且未拉回。`
      });
    } else {
      contextMessages.push({
        role: 'system',
        content: `[偏离检测基准] 本群未设定讨论话题。请以用户（senderType: 'user'）的消息内容和意图为偏离判断基准。偏离=持续讨论与用户初始意图不相关的内容且未拉回。`
      });
    }
    // 注入群主身份信息，确保Watcher知道该@谁
    const hostMember = group.members.find(m => m.role === 'host');
    const hostAgent = hostMember ? getAgentFriend(hostMember.agentId) : null;
    contextMessages.push({
      role: 'system',
      content: `[@目标] 本群群主是「${hostAgent?.name || '未知'}」（ID: ${hostMember?.agentId || '?'}）。你只能@群主，不能@任何其他人。`
    });
  }

  contextMessages.push({
    role: 'system',
    content: `[身份确认·第三道锁] ⚠️ 你是【${agent.name}】（ID: ${agent.id}），担任本群【${myRoleLabel}】。${roleBoundaryText}\\n\\n🚫 禁止身份混淆：群内除你外还有——${ctxOtherNamesStr}。这些名字属于别人，与你无关。不要在回复中自称或扮演别人的名字。你只是【${agent.name}】。\\n\\n🚫 禁止情绪误判：用户消息可能包含批评或负面情绪。如果用户消息带有 [→指向群主] 或 [→指向管理员] 标记，说明用户在对该角色说话，其批评/指责/情绪与你无关。若消息无 [→指向…] 标记但出现了你的名字，用户可能在对你说话。
若既无方向标记也未出现你的名字，该消息与你无关。
\\n\\n在下方消息流中：\\n- 你之前的发言会以系统标注 \\"[历史: 你在HH:MM:SS的发言]\\" 的形式呈现。这是系统给你看的备忘，不要模仿此格式。\\n- 别人的消息以 \\"[别人名字](HH:MM:SS):\\" 开头，让你知道是谁在什么时间说的。\\n- 【输出格式铁律】你的输出必须是纯文本消息内容。绝对不要在输出开头添加 \\"[名字](时间):\\"、\\"[名字→某人](时间):\\" 或任何类似前缀——系统会自动替你添加这些格式标记。你只管输出你想说的文本本身。\\n\\n【防复读铁律】绝对不要复读自己已说过的内容！每次发言必须带来新信息或新角度。如果你发现自己即将重复之前的内容，改为简短引用（1句话）并补充新观点，或直接保持沉默。复读会导致你被禁言。绝对不要照抄其他Agent的发言。\\n\\n【迭代讨论铁律】这是一个多轮迭代讨论，不是你一句我一句就结束的回合制问答！群主分配任务后，你应该：①先给出自己的专业意见；②如果不同意其他成员的观点，用 @名称 点名反驳并说明理由；③如果你希望某个特定成员回应你的疑问，用 @名称 明确点名；④讨论应该持续多轮交锋直到形成共识，最后由群主总结。不要在一条消息里试图说完所有话——留一些给后续回合！`
  });


  
  // 【修复】注入当前开放提案，让每个Agent都知道有提案需要表决
  const openProposals = [];
  ProposalStateMachine.proposals.forEach((p, id) => {
    if (p.status === 'open' && p.groupId === group.id) {
      const proposerAgent = getAgentFriend(p.proposerId);
      const votes = Object.values(p.votes || {});
      const agrees = votes.filter(v => v.vote === 'agree').length;
      const disagrees = votes.filter(v => v.vote === 'disagree').length;
      openProposals.push(
        `  • 提案ID: ${id.substring(0, 8)} | 内容: ${p.content} | 提议人: ${proposerAgent?.name || '未知'} | 已表决: ${agrees}同意/${disagrees}反对`
      );
    }
  });
  if (openProposals.length > 0) {
    contextMessages.push({
      role: 'system',
      content: `[待表决提案 - 一票否决制，需全员同意方通过]\n${openProposals.join('\n')}\n表决命令格式: {"command":"vote","proposalId":"<提案ID完整UUID>","vote":"agree或disagree","reason":"理由"}`
    });
  }
  
  const startRound = group.summaries.length > 0 
    ? group.summaries[group.summaries.length - 1].roundRange[1] + 1 
    : 0;

  const recentMessages = messages.filter(m => m.roundIndex >= startRound);

  // 【Bug1@过期修复】在循环前扫描：找到最后一条@了该Agent的消息索引，以及该Agent最后发言的索引
  // 只有"最后一条@消息的索引 > 该Agent最后发言的索引"时，@才是活跃的
  let lastMentionIndex = -1;
  let lastOwnMessageIndex = -1;
  for (let i = 0; i < recentMessages.length; i++) {
    const m = recentMessages[i];
    if (m.senderType !== 'system') {
      if (m.senderId === agentId) {
        lastOwnMessageIndex = i;
      }
      if (m.mentions && m.mentions.includes(agentId)) {
        lastMentionIndex = i;
      }
    }
  }
  const hasActiveMention = lastMentionIndex > lastOwnMessageIndex;

  // 所有系统反馈消息必须注入上下文——确保任何Agent发出命令后都能看到执行结果
  // 包括命令执行成功/失败的所有反馈类型
  // 仅注入Agent需要知晓并据此行动的命令反馈。
  // 不含 [系统]（范围太宽，包含"讨论已被终止"等用户面信息导致Agent错乱）
  // 不含 [防退化]（纯用户面）

  const COMMAND_FEEDBACK_PREFIXES = [
    '[错误]',
    '[命令失败]',
    '[命令格式提醒]',
    '[好友列表]',
    '[加入]',
    '[移出]',
    '[禁言]',
    '[解除禁言]',
    '[提议]',
    '[表决]',
    '[决议通过]',
    '[决议否决]',
    '[提议超时]',
    '[话题已完善]'
  ];

  for (let msgIdx = 0; msgIdx < recentMessages.length; msgIdx++) {
    const msg = recentMessages[msgIdx];
    if (msg.senderType === 'system') {
      // 命令反馈类的system消息需要注入到Agent上下文中
      const isCommandFeedback = COMMAND_FEEDBACK_PREFIXES.some(
        prefix => msg.content && msg.content.startsWith(prefix)
      );
      if (!isCommandFeedback) continue;
      // 命令反馈消息作为system角色注入
      contextMessages.push({
        role: 'system',
        content: `[系统通知 - 请关注此反馈] ${msg.content}`
      });
      continue;
    }

    const isMentioned = msg.mentions && msg.mentions.includes(agentId);
    const isOwnMessage = msg.senderId === agentId;

    // 【Bug4修复】为每条消息附上时间戳，帮助Agent判断消息时效
    const msgTimeStr = msg.timestamp 
      ? new Date(msg.timestamp).toLocaleTimeString('zh-CN', {hour12: false})
      : '未知时间';

    // 【重复注入修复】去掉 [用户消息] 前缀。所有消息统一使用
    // [发送者名称](时间戳): 内容 的格式。用户历史消息和Agent消息
    // 通过 role (user/assistant) 区分，LLM通过时间戳判断时效。
    let prefix = '';
    if (msg.quotedMessageId) {
      const quoted = findMessageById(messages, msg.quotedMessageId);
      if (quoted) {
        const quotedTimeStr = quoted.timestamp
          ? new Date(quoted.timestamp).toLocaleTimeString('zh-CN', {hour12: false})
          : '未知时间';
        prefix += `[引用 msg:${msg.quotedMessageId.substring(0, 8)} ← ${quoted.senderName}(${quotedTimeStr}): "${(quoted.cleanContent || quoted.content || '').substring(0, 80)}"] `;
      }
    }

    // 【Bug2修复】对于非@目标的Agent，剥离消息中的@名称原文，防止LLM看到@文本后抢答
    let displayContent = msg.cleanContent || msg.content;

    // 【重构】工具调用结果不再通过 buildAgentContext 注入，
    // 改为标准 Function Calling 的 role:'tool' 消息在独立 messages[] 中管理。
    if (!isMentioned && !isOwnMessage) {
      // 移除@提及文本，替换为[提及别人]
      displayContent = displayContent.replace(/@[^\s,，。！？、；：""''\]\)】》\n!?,.;:'"\)\]]+/g, '[提及他人]');
    }

    // 【Bug1彻底修复】@标记不再作为独立system消息插入（会被LLM复读），
    // 改为发送者名称后追加"→你"标记。这是LLM不会自然照抄的格式，
    // 且协议中用逻辑描述了标记含义但不泄露其精确原文。
    // 仅在"该消息@了此Agent且@仍活跃（未过期）"时生效。
    const mentionMarker = (isMentioned && hasActiveMention && msgIdx === lastMentionIndex) ? '→你' : '';

    // [R2] 反向方向标记：告诉非目标Agent此消息指向谁
    let directionMarker = '';
    if (msg.senderType === 'user' && !isOwnMessage && !mentionMarker) {
      // 当前Agent不是被@的人 → 显示用户实际在跟谁说话
      if (msg.mentions && msg.mentions.length > 0) {
        const targetNames = msg.mentions.map(mid => {
          const m = group.members.find(gm => gm.agentId === mid);
          if (!m) return null;
          const a = getAgentFriend(m.agentId);
          return a ? a.name : null;
        }).filter(Boolean);
        if (targetNames.length > 0) {
          directionMarker = `→指向${targetNames.join('/')}`;
        }
      }
    }

    // 【唯一路径修复】所有消息统一通过 context 注入，不再有独立的
    // latestUserMsg 路径。
    //
    // 【防复读核心修复】Agent自己的历史消息使用 system 角色 + 明确标注格式，
    // 杜绝Agent把 "[名字](时间):" 当成输出模板来模仿。
    // 他人的消息保留 "[名字](时间):" 格式——Agent需要知道谁在什么时间说了什么，
    // 但绝不应在自己的输出中重现此格式。
    // 【Bug1修复】每条消息暴露短ID (msg:xxxxxxxx)，让Agent有精确的引用目标
    const msgShortId = msg.id ? msg.id.substring(0, 8) : 'unknown';
    if (isOwnMessage) {
      contextMessages.push({
        role: 'system',
        content: `[你之前说的 — ${msgTimeStr} — msg:${msgShortId}] ${displayContent}`
      });
      // 【重构】工具调用结果不再在此处注入到contextMessages，
      // 而是在主循环的独立 messages[] 中通过 role:'tool' 管理。
    } else {
      // 【Bug B修复】其他 Agent 的消息统一用 user 角色，禁止用 assistant。
      // 在 LLM API 协议中 assistant = 模型自己的历史输出。把别人的发言标成
      // assistant 会导致模型认为那是自己说过的话，从而：
      //   1) 不自洽——无法区分"我说的"和"别人说的"
      //   2) 插话——以为自己是最后一个发言的人，不顾他人正在对话
      //   3) 角色混淆——把别人的观点当成自己的立场
      // 改为全部 user 角色 + 明确身份前缀（用户/群主/管理员/成员），模型像读群聊记录一样阅读。
      let roleTag = '';
      if (msg.senderType !== 'user' && msg.senderId && group && group.members) {
        const senderMember = group.members.find(m => m.agentId === msg.senderId);
        if (senderMember?.role === 'host') roleTag = '群主 ';
        else if (senderMember?.role === 'admin') roleTag = '管理员 ';
      }
      const senderLabel = msg.senderType === 'user' 
        ? `⚠️ 真实用户 ${msg.senderName}`
        : `${roleTag}成员 ${msg.senderName}`;
      const directionTag = mentionMarker || directionMarker;
      contextMessages.push({
        role: 'user',
        content: `${prefix}[${senderLabel}${directionTag}](${msgTimeStr} msg:${msgShortId}): ${displayContent}`
      });
    }


  }

  return {
    systemPrompt,
    messages: contextMessages
  };
}

// ===== @机制与唤醒调度 =====
const wakeSchedulers = new Map();

function getWakeScheduler(groupId) {
  let scheduler = wakeSchedulers.get(groupId);
  if (!scheduler) {
    scheduler = new WakeScheduler(groupId);
    wakeSchedulers.set(groupId, scheduler);
  }
  return scheduler;
}

class WakeScheduler {
  constructor(groupId) {
    this.groupId = groupId;
    this.messageCount = 0;
    // [v3] 记录每个成员"上次被唤醒时的messageCount"，用于冷却期判断
    this.lastWakeCount = new Map();
  }
  
  incrementMessageCount() {
    this.messageCount++;
  }
  
  // [v3] 当成员因@被唤醒时更新冷却计时
  _onMentionWake(agentId) {
    this.lastWakeCount.set(agentId, this.messageCount);
  }
  
  // [v3] 当成员被pickNextBatch选中时更新冷却计时
  _onBatchWake(agentId) {
    this.lastWakeCount.set(agentId, this.messageCount);
  }
  
  // [v3] 已废弃：整除触发机制已完全移除，统一使用 pickNextBatch 打分调度。
  // 保留空壳以兼容旧调用点，永远返回空数组。
  determineWakeList(recentMessages, allMessages, alreadyWokenIds) {
    return [];
  }

  // ===== [v3] 纯打分动态调度 =====
  // 完全抛弃整除限制。每个Agent根据：@优先级 + 群主身份 + 活跃度 + 沉默补偿 综合打分。
  // cooldownMap: Map<agentId, lastWakeMsgCount> — 冷却期内跳过，冷却期满正常参选。
  pickNextBatch(allMessages, cooldownMap, batchSize) {
    const group = getGroup(this.groupId);
    if (!group) return [];

    const candidates = [];
    // 冷却消息数：至少2条，最多半批大小
    const cooldownMsgs = Math.max(Math.ceil(batchSize / 2), 2);

    // 聚合最近消息中的 @提及（用于优先级判断）
    const aggregatedMentionedIds = new Set();
    const recentWindow = Math.max(batchSize * 2, 6);
    const recentMessages = allMessages.slice(-recentWindow);
    for (const msg of recentMessages) {
      if (!msg.mentions || msg.mentions.length === 0) continue;
      for (const mid of msg.mentions) {
        aggregatedMentionedIds.add(mid);
      }
    }

    for (const member of group.members) {
      // [v3] Watcher排除：偏离检测哨兵不参与正常打分调度，完全隔离。
      // 它只在后面的沉默专用通道中触发。
      const agent = getAgentFriend(member.agentId);
      if (agent && agent.id === 'builtin-watchdog-drift') continue;

      // [v3] 冷却期检查：距离上次唤醒不足 cooldownMsgs 条消息 → 跳过
      const lastWake = cooldownMap.get(member.agentId);
      if (lastWake !== undefined && (this.messageCount - lastWake) < cooldownMsgs) {
        continue;
      }

      // 禁言处理
      if (member.isMuted) {
        if (member.muteUntilCount !== null &&
            member.muteUntilCount !== undefined &&
            this.messageCount >= member.muteUntilCount) {
          member.isMuted = false;
          member.muteUntilCount = null;
          saveGroup(group);
          DebugLogger.info('wake', `${getAgentFriend(member.agentId)?.name} 禁言到期自动解除 (messageCount=${this.messageCount})`);
        } else {
          continue;
        }
      }

      if (!agent || !agent.apiKey || !agent.apiKey.trim()) continue;

      let score = 0;

      // 规则1: @提及 — 最高优先级（10000分）
      if (aggregatedMentionedIds.has(member.agentId)) {
        // 检查@是否已过期（该Agent已回应过）
        let lastMentionIdx = -1;
        let lastOwnIdx = -1;
        for (let i = 0; i < allMessages.length; i++) {
          const m = allMessages[i];
          if (m.senderId === member.agentId && m.senderType === 'agent') lastOwnIdx = i;
          if (m.mentions && m.mentions.includes(member.agentId)) lastMentionIdx = i;
        }
        if (lastMentionIdx > lastOwnIdx) {
          score += 10000;  // @仍活跃，绝对优先
          DebugLogger.info('wake', `${agent.name} 因活跃@提及获得最高优先级`);
        }
      }

      // 规则2: 群主 — 高优先级（5000分）
      if (member.role === 'host') {
        score += 5000;
      }

      // [v3] 规则3: 活跃度加成 — 完全替代旧的整除/间隔门控。
      // wakeInterval 重新定义为"活跃度"：0=仅@唤醒，1~10=越活跃越高频。
      // 无门控！每个Agent都无条件获得活跃度加成，值越大越容易被选中。
      const activity = member.overrides?.wakeInterval
        || (agent ? agent.wakeInterval : 5)
        || 5;
      if (activity > 0) {
        score += activity * 50;  // 最高 10*50 = 500分
      }

      // [v3] @活跃时非目标降分 — 避免抢答，但比例放宽（0.5而非旧版0.4）
      if (aggregatedMentionedIds.size > 0 &&
          !aggregatedMentionedIds.has(member.agentId) &&
          member.role !== 'host') {
        score = Math.floor(score * 0.5);
      }

      // 规则4: 沉默时长 — 越久没说话越优先
      let lastMsgIndex = -1;
      for (let i = allMessages.length - 1; i >= 0; i--) {
        if (allMessages[i].senderId === member.agentId && allMessages[i].senderType !== 'system') {
          lastMsgIndex = i;
          break;
        }
      }
      if (lastMsgIndex >= 0) {
        const silenceLength = allMessages.length - lastMsgIndex;
        score += silenceLength * 50;
      } else {
        score += 1000;  // 从未说过话
      }

      if (score > 0) {
        candidates.push({ agentId: member.agentId, score });
      }
    }

    // [v3] Watcher 沉默专用通道：偏离检测哨兵不参与正常打分。
    // 纯粹由沉默时长触发——只有当它至少12条新消息没说过话时才被唤醒。
    // 它永远不被@、永远没有活跃度加成、永远不被冷却期管制（自身是低频哨兵）。
    const WATCHER_ID = 'builtin-watchdog-drift';
    const watcherMember = group.members.find(m => m.agentId === WATCHER_ID);
    if (watcherMember && !watcherMember.isMuted) {
      const watcherAgent = getAgentFriend(WATCHER_ID);
      if (watcherAgent && watcherAgent.apiKey && watcherAgent.apiKey.trim()) {
        const watcherLastWake = cooldownMap.get(WATCHER_ID);
        const watcherCooldownOk = watcherLastWake === undefined || (this.messageCount - watcherLastWake) >= 8;
        if (watcherCooldownOk) {
          let watcherLastMsg = -1;
          for (let i = allMessages.length - 1; i >= 0; i--) {
            if (allMessages[i].senderId === WATCHER_ID) { watcherLastMsg = i; break; }
          }
          const watcherSilence = watcherLastMsg >= 0 ? (allMessages.length - watcherLastMsg) : allMessages.length;
          // 沉默≥15条 → 触发；群刚创建(allMessages.length>0且从未说话)也触发
          if (watcherSilence >= 15) {
            candidates.push({ agentId: WATCHER_ID, score: watcherSilence * 100 });
          }
        }
      }
    }

    // 按分数降序
    candidates.sort((a, b) => b.score - a.score);

    // 取前 batchSize 个（二次安检冷却期，防止边缘情况）
    const selected = [];
    for (const c of candidates) {
      if (selected.length >= batchSize) break;
      const lastWake = cooldownMap.get(c.agentId);
      if (lastWake !== undefined && (this.messageCount - lastWake) < cooldownMsgs) continue;
      selected.push(c.agentId);
    }

    if (selected.length > 0) {
      DebugLogger.info('wake',
        `pickNextBatch 选中 ${selected.map(id => {
          const a = getAgentFriend(id);
          const c = candidates.find(x => x.agentId === id);
          return `${a?.name || id}(${c?.score || '?'})`;
        }).join(', ')}`);
    }

    return selected;
  }

  _extractMentions(content, group) {
    if (!content) return [];
    
    const mentionRegex = /@([^\s,，。！？、；：""''\]\)】》\n!?,.;:'"\)\]]+)/g;
    const mentionedNames = [];
    let match;
    while ((match = mentionRegex.exec(content)) !== null) {
      mentionedNames.push(match[1]);
    }
    
    return mentionedNames.map(name => {
      const member = group.members.find(m => {
        const agent = getAgentFriend(m.agentId);
        return agent && agent.name === name;
      });
      return member ? member.agentId : null;
    }).filter(Boolean);
  }
  
  // [v3] 强制下轮唤醒 — 将冷却计数设为很久以前
  forceWakeNextRound(agentId) {
    this.lastWakeCount.set(agentId, -9999);
    DebugLogger.info('wake', `强制下轮唤醒: ${getAgentFriend(agentId)?.name}`);
  }
  
  reset() {
    this.messageCount = 0;
    this.lastWakeCount.clear();
  }
}

// ===== @选择器UI =====
function showMentionSelector(inputElement, groupId) {
  // 清理上一次可能残留的@选择器弹窗
  const existingPopups = document.querySelectorAll('.mention-selector');
  existingPopups.forEach(p => p.remove());
  
  const group = getGroup(groupId);
  if (!group) return;
  
  const popup = document.createElement('div');
  popup.className = 'mention-selector';
  popup.style.cssText = `
    position: absolute;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 8px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 1000;
    width: 220px;
    color: #fff;
  `;
  
  group.members.forEach(member => {
    const agent = getAgentFriend(member.agentId);
    if (!agent) return;
    
    const item = document.createElement('div');
    item.style.cssText = 'padding:8px 12px;cursor:pointer;display:flex;align-items:center;';
    item.innerHTML = `
      <span style="
        width:28px;height:28px;border-radius:50%;background:#333;
        display:flex;align-items:center;justify-content:center;margin-right:8px;
        font-size:12px;
      ">${escapeHTML(agent.avatar)}</span>
      <span>${escapeHTML(agent.name)}</span>
      ${member.role === 'host' ? '<span style="color:#ffd700;margin-left:auto;font-size:11px;">群主</span>' : ''}
      ${member.isMuted ? '<span style="color:#ff4444;margin-left:4px;font-size:11px;">[禁言]</span>' : ''}
    `;
    item.addEventListener('click', () => {
      insertMention(inputElement, agent.name);
      popup.remove();
    });
    item.addEventListener('mouseenter', () => item.style.background = '#333');
    item.addEventListener('mouseleave', () => item.style.background = 'transparent');
    popup.appendChild(item);
  });
  
  const rect = inputElement.getBoundingClientRect();
  popup.style.left = rect.left + 'px';
  popup.style.bottom = (window.innerHeight - rect.top + 10) + 'px';
  
  document.body.appendChild(popup);
  
  const closeHandler = (e) => {
    if (!popup.contains(e.target) && e.target !== inputElement) {
      popup.remove();
      document.removeEventListener('click', closeHandler);
    }
  };
  setTimeout(() => document.addEventListener('click', closeHandler), 100);
  
  return popup;
}

function insertMention(inputElement, agentName) {
  const cursorPos = inputElement.selectionStart;
  const textBefore = inputElement.value.substring(0, cursorPos);
  const textAfter = inputElement.value.substring(cursorPos);
  
  const lastAtIndex = textBefore.lastIndexOf('@');
  const newBefore = textBefore.substring(0, lastAtIndex) + '@' + agentName + ' ';
  
  inputElement.value = newBefore + textAfter;
  inputElement.focus();
  const newPos = newBefore.length;
  inputElement.setSelectionRange(newPos, newPos);
}

// ===== 历史压缩 =====
function checkCompressionNeed(group, messages) {
  const hostMember = group.members.find(m => m.role === 'host');
  if (!hostMember) return { needed: false, severity: 0 };
  
  const hostAgent = getAgentFriend(hostMember.agentId);
  if (!hostAgent) return { needed: false, severity: 0 };
  
  // 使用群主token上限 × 压缩阈值% 作为触发条件
  // 阈值由群管理界面的滑条控制，默认70%，范围10%~90%
  const hostTokenLimit = hostMember.overrides?.maxTokens || hostAgent.maxTokens;
  
  const contextTokens = estimateTokens(messages, group);
  
  const threshold = (group.settings.compressionThreshold || 70) / 100;
  if (contextTokens > hostTokenLimit * threshold) {
    return { needed: true, severity: contextTokens / hostTokenLimit };
  }
  return { needed: false, severity: 0 };
}

function estimateTokens(messages, group) {
  let totalChars = 0;
  const startRound = group.summaries.length > 0 
    ? group.summaries[group.summaries.length - 1].roundRange[1] + 1 
    : 0;
  
  for (const msg of messages) {
    if (msg.roundIndex >= startRound && msg.senderType !== 'system') {
      totalChars += (msg.cleanContent || msg.content || '').length;
    }
  }
  return Math.ceil(totalChars / 2);
}

async function executeCompression(groupId) {
  const group = getGroup(groupId);
  if (!group) return null;
  
  const messages = getMessages(groupId);
  const hostMember = group.members.find(m => m.role === 'host');
  if (!hostMember) return null;
  
  const hostAgent = getAgentFriend(hostMember.agentId);
  if (!hostAgent) return null;
  
  DebugLogger.info('compression', `群 ${groupId} 开始历史压缩 (消息数:${messages.length})`);
  
  const unsummarizedMessages = messages.filter(m => {
    if (group.summaries.length === 0) return true;
    return m.roundIndex > group.summaries[group.summaries.length - 1].roundRange[1];
  });
  
  if (unsummarizedMessages.length === 0) return null;

  const roundStart = unsummarizedMessages[0].roundIndex;
  const roundEnd = unsummarizedMessages[unsummarizedMessages.length - 1].roundIndex;
  
  // ═══════════════════════════════════════════════════════
  // 方案四：压缩前融合群文件内容
  // ═══════════════════════════════════════════════════════
  
  // 1. 收集群内已有分析文件的内容
  const fileList = groupFiles[groupId] || [];
  const visibleFiles = fileList.filter(f => f.visible !== false);
  
  // 过滤出分析类文件（排除摘要文件自身，避免循环引用）
  const systemFilePrefixes = [
    'summary-round-', 'summary-index', 'meta-summary',
    'decisions-log', 'open-questions', 'compression-input-'
  ];
  const analysisFiles = visibleFiles.filter(f =>
    !systemFilePrefixes.some(pfx => f.filename.startsWith(pfx))
  );
  
  // 2. 读取压缩辅助输入文件（如果各成员已写入）
  const inputFileName = `compression-input-${roundStart}-${roundEnd}.md`;
  let memberInputContent = '';
  try {
    memberInputContent = await getFileContent(groupId, inputFileName) || '';
  } catch(e) { /* 文件可能不存在 */ }
  
  // 3. 读取最近3个分析文件的内容片段（每个最多800字）
  let fileInsights = '';
  const recentAnalysisFiles = analysisFiles.slice(-3);
  for (const af of recentAnalysisFiles) {
    try {
      const content = await getFileContent(groupId, af.filename);
      if (content) {
        const snippet = content.length > 20000
          ? content.substring(0, 20000) + '\n...(以上为前20000字预览，文件共'+content.length+'字符，可用 file_read 分段读取剩余内容)'
          : content;
        fileInsights += `\n[文件: ${af.filename}]\n${snippet}\n`;
      }
    } catch(e) { /* 静默跳过无法读取的文件 */ }
  }
  
  // ═══════════════════════════════════════════════════════
  // 构建增强版压缩 Prompt
  // ═══════════════════════════════════════════════════════
  
  const compressionPrompt = `[系统指令 - 历史压缩]
请将以下群聊讨论内容总结为结构化摘要。要求：

1. 保留所有关键决策、结论、分歧点
2. 保留每个Agent的核心观点和表决结果
3. 压缩到500字以内
4. 使用以下Markdown格式严格输出：

## 话题脉络
（本轮讨论的主要议题和演进路径）

## 关键决策
（达成的共识、通过的提案、确定的方向）

## 各成员立场
（每个参与讨论的Agent的核心观点。只记录上下文中确有发言的成员。禁止为未发言成员编造立场。）

## 待解决问题
（尚未解决的分歧、需继续讨论的议题）

5. 只输出上述Markdown格式，不要JSON命令块或额外解释
6. 在「关键决策」和「待解决问题」中使用精确表述，便于后续索引

7. 【防编造铁律】用户消息必须原样保留措辞，不得概括改写。禁止将你的推测包装成"用户说/用户认为"。禁止编造用户未说过的话。

${fileInsights ? `\\n[群内已有分析文件参考 — 请将以下文件中的关键结论融入摘要]\\n${fileInsights}\\n` : ''}
${memberInputContent ? `\\n[各成员提交的压缩输入 — 请重视以下汇总]\\n${memberInputContent}\\n` : ''}

以下为需要压缩的讨论内容：
${unsummarizedMessages.map(m => `[${m.senderName}]: ${m.cleanContent || m.content}`).join('\\\\n')}`;



  
  const response = await callAgentAPI(
    hostAgent, 
    hostMember, 
    group, 
    compressionPrompt,
    [],
    true
  );
  
  // 消费流式响应体，提取纯文本摘要
  let summary = '';
  let thinkingText = '';
  try {
    await streamAgentResponse(
      response,
      (chunk, full, isThinking) => { /* 压缩无需实时渲染 */ },
      (fullText, thinking) => {
        summary = fullText;
        thinkingText = thinking || '';
      },
      (error) => {
        throw new Error('压缩摘要生成失败: ' + error.message);
      }
    );
  } catch (streamError) {
    DebugLogger.error('compression', `流式读取压缩摘要失败: ${streamError.message}`);
    throw streamError;
  }
  
  // 存入 group.summaries（保持兼容）
  group.summaries.push({
    roundRange: [roundStart, roundEnd],
    summary,
    createdAt: Date.now()
  });
  saveGroup(group);
  
  // ═══════════════════════════════════════════════════════
  // 方案三：分级摘要体系 — 写入文件系统
  // ═══════════════════════════════════════════════════════
  
  // 辅助：确保文件在文件列表中注册
  function ensureFileEntry(fname) {
    if (!groupFiles[groupId]) groupFiles[groupId] = [];
    const found = groupFiles[groupId].find(f => f.filename === fname);
    if (!found) {
      groupFiles[groupId].push({
        filename: fname,
        _storage: 'local',
        size: 0,
        timestamp: Date.now(),
        visible: true
      });
    }
  }
  
  // ① 写入本轮摘要文件
  const summaryFileName = `summary-round-${roundStart}-${roundEnd}.md`;
  const summaryFileContent = `# 讨论摘要 · 第${roundStart}~${roundEnd}轮
> 生成时间: ${new Date().toISOString()}
> 群组: ${group.name}
> 话题: ${group.topic || '未设定'}

${summary}

---
*此文件由群主 ${hostAgent.name} 自动生成，群内所有成员可用 readFile 查阅。*
`;
  ensureFileEntry(summaryFileName);
  await setFileContent(groupId, summaryFileName, summaryFileContent);
  
  // ② 更新摘要索引
  const indexLines = group.summaries.map(s =>
    `- [第${s.roundRange[0]}~${s.roundRange[1]}轮](summary-round-${s.roundRange[0]}-${s.roundRange[1]}.md) — ${new Date(s.createdAt).toLocaleString('zh-CN')}`
  );
  const indexFileName = 'summary-index.md';
  const indexContent = `# 讨论摘要索引
> 群组: ${group.name}
> 最后更新: ${new Date().toISOString()}

${indexLines.join('\n')}
`;
  ensureFileEntry(indexFileName);
  await setFileContent(groupId, indexFileName, indexContent);
  
  // ③ 提取关键决策 → decisions-log.md
  const decisionPattern = /(?:关键决策|##\s*关键决策)[\s\S]*?(?=##\s*各成员立场|##\s*待解决问题|$)/i;
  const decisionMatch = summary.match(decisionPattern);
  if (decisionMatch) {
    let decisionsLog = '';
    try { decisionsLog = await getFileContent(groupId, 'decisions-log.md') || ''; } catch(e) {}
    const header = decisionsLog ? '' : `# 关键决策日志\n\n> 群组: ${group.name}\n\n`;
    const entry = `\n### 第${roundStart}~${roundEnd}轮 (${new Date().toLocaleDateString('zh-CN')})\n${decisionMatch[0].trim()}\n`;
    decisionsLog = header + decisionsLog + entry;
    ensureFileEntry('decisions-log.md');
    await setFileContent(groupId, 'decisions-log.md', decisionsLog);
  }
  
  // ④ 提取待解决问题 → open-questions.md
  const questionPattern = /(?:待解决问题|##\s*待解决问题)[\s\S]*?$/i;
  const questionMatch = summary.match(questionPattern);
  if (questionMatch) {
    let openQuestions = '';
    try { openQuestions = await getFileContent(groupId, 'open-questions.md') || ''; } catch(e) {}
    const header = openQuestions ? '' : `# 待解决问题追踪\n\n> 群组: ${group.name}\n\n`;
    const entry = `\n### 第${roundStart}~${roundEnd}轮 (${new Date().toLocaleDateString('zh-CN')})\n${questionMatch[0].trim()}\n`;
    openQuestions = header + openQuestions + entry;
    ensureFileEntry('open-questions.md');
    await setFileContent(groupId, 'open-questions.md', openQuestions);
  }
  
  // ⑤ 更新 meta-summary.md（超摘要）
  const metaContent = `# 讨论超摘要
> 群组: ${group.name}
> 话题: ${group.topic || '未设定'}
> 最后更新: ${new Date().toISOString()}
> 已压缩轮次: ${group.summaries.length}

## 讨论全貌
${group.summaries.map((s, i) =>
  `### 阶段${i+1}: 第${s.roundRange[0]}~${s.roundRange[1]}轮\n${s.summary.substring(0, 400)}${s.summary.length > 400 ? '...' : ''}`
).join('\n\n')}

---
*查阅各阶段完整摘要请 readFile summary-round-X-Y.md，索引见 summary-index.md*
`;
  ensureFileEntry('meta-summary.md');
  await setFileContent(groupId, 'meta-summary.md', metaContent);
  
  saveGroupFiles();
  
  DebugLogger.info('compression', `压缩完成，摘要长度:${summary.length}字，覆盖第${roundStart}~${roundEnd}轮。已写入: ${summaryFileName}, summary-index.md, decisions-log.md, open-questions.md, meta-summary.md`);
  
  // 方案四：告知成员压缩完成，引导查阅文件
  addSystemMessage(groupId, `[历史压缩完成] 第${roundStart}~${roundEnd}轮已压缩为结构化摘要。\n📄 完整摘要: readFile ${summaryFileName}\n📋 摘要索引: readFile summary-index.md\n🎯 关键决策: readFile decisions-log.md\n❓ 待解决问题: readFile open-questions.md\n📊 讨论超摘要: readFile meta-summary.md`);
  
  // 方案四：通知成员可为后续压缩准备输入
  addSystemMessage(groupId, `[系统] 💡 如果你认为本轮有重要结论被遗漏，可用 writeFile 追加到 compression-input-${roundStart}-${roundEnd}.md。群主在下次压缩时会读取此文件作为参考。`);
  
  return summary;
}


// ================================================================
// 标准 Function Calling 基础设施
// ================================================================
function _buildLLMRequest(agent, messages, tools, stream) {
  var apiKey = agent.apiKey;
  if (!apiKey) throw new Error('API Key未配置');
  var baseUrl = agent.baseURL.replace(/\/+$/, '');
  var model = agent.model || 'deepseek-v4-pro';

  var _safeStr = function(s) {
    if (typeof s !== 'string') return s;
    return s.replace(/\\/g, '＼').replace(/\x00/g, '').replace(/\u2028/g, '').replace(/\u2029/g, '');
  };
  var cleanedMessages = messages.map(function(m) {
    var cleaned = { role: m.role };
    if (m.content !== undefined && m.content !== null) cleaned.content = _safeStr(m.content);
    else if (m.tool_calls) cleaned.content = null;
    else cleaned.content = '';
    if (m.tool_calls) {
      cleaned.tool_calls = m.tool_calls.map(function(tc) {
        return { type: tc.type, id: tc.id, function: { name: _safeStr(tc.function.name), arguments: _safeStr(tc.function.arguments) } };
      });
    }
    if (m.tool_call_id) cleaned.tool_call_id = m.tool_call_id;
    if (m.name) cleaned.name = m.name;
    if (m.reasoning_content) cleaned.reasoning_content = _safeStr(m.reasoning_content);
    return cleaned;
  });

  var effectiveMaxTokens = agent.maxTokens || 4096;
  if (tools && tools.length > 0) effectiveMaxTokens = Math.max(effectiveMaxTokens, 16384);

  var body = {
    model: model,
    messages: cleanedMessages,
    max_tokens: effectiveMaxTokens,
    temperature: agent.temperature || 0.7,
    stream: !!stream
  };

  if (tools && tools.length > 0) {
    body.tools = tools.map(function(t) {
      return { type: 'function', function: { name: t.name, description: t.description, parameters: t.parameters } };
    });
    body.tool_choice = 'auto';
  }
  if (agent.deepThinking) {
    body.thinking = { type: 'enabled' };
    body.reasoning_effort = agent.effortLevel || 'high';
  } else {
    body.thinking = { type: 'disabled' };
  }

  return { baseUrl: baseUrl, apiKey: apiKey, body: body };
}

function extractToolCallsFromStream(chunk) {
  var toolCallsMap = {};
  if (chunk.choices && chunk.choices[0].delta) {
    var delta = chunk.choices[0].delta;
    if (delta.tool_calls) {
      for (var i = 0; i < delta.tool_calls.length; i++) {
        var tc = delta.tool_calls[i];
        var idx = (tc.index !== undefined) ? tc.index : 0;
        if (!toolCallsMap[idx]) {
          toolCallsMap[idx] = { index: idx, id: tc.id || '', type: 'function', function: { name: '', arguments: '' } };
        }
        if (tc.id) toolCallsMap[idx].id = tc.id;
        if (tc.function) {
          if (tc.function.name) toolCallsMap[idx].function.name += tc.function.name;
          if (tc.function.arguments) toolCallsMap[idx].function.arguments += tc.function.arguments;
        }
      }
    }
  }
  var result = [];
  var keys = Object.keys(toolCallsMap);
  for (var j = 0; j < keys.length; j++) {
    var entry = toolCallsMap[keys[j]];
    // 不要求 function.name 非空 — 后续跨chunk合并时补充
    result.push(entry);
  }
  return result;
}

function parseToolCallArguments(toolCall) {
  var rawArgs = toolCall.function.arguments;
  try { return JSON.parse(rawArgs); }
  catch (e) {
    var fixed = rawArgs;
    // 补缺失的 }
    var openBraces = (fixed.match(/\{/g) || []).length;
    var closeBraces = (fixed.match(/\}/g) || []).length;
    if (openBraces > closeBraces) fixed += '}'.repeat(openBraces - closeBraces);
    // 补缺失的 "
    var openQuotes = 0, inString = false, escaped = false;
    for (var qi = 0; qi < fixed.length; qi++) {
      var ch = fixed[qi];
      if (escaped) { escaped = false; continue; }
      if (ch === '\\') { escaped = true; continue; }
      if (ch === '"') { inString = !inString; openQuotes++; }
    }
    if (openQuotes % 2 !== 0) fixed += '"';
    // 尝试1：直接修复
    try { return JSON.parse(fixed); }
    catch (e2) {
      // 尝试2：修复字符串内嵌换行符
      try {
        var fixed2 = fixed.replace(/(?<="[^"]*)\n(?=[^"]*")/g, '\\n');
        return JSON.parse(fixed2);
      } catch (e3) {
        // 尝试3：移除尾逗号
        try {
          var fixed3 = fixed.replace(/,\s*}/g, '}').replace(/,\s*\]/g, ']');
          return JSON.parse(fixed3);
        } catch (e4) {
          // 兜底：返回空对象让工具自行处理缺失参数
          console.warn('[toolcall] 参数JSON解析失败，返回空对象兜底。原始参数:', rawArgs.substring(0, 200));
          return {};
        }
      }
    }
  }
}

// ===== API调用层 =====
async function callAgentAPI(agent, memberConfig, group, 
  userMessage = null, contextMessages = [], skipInteractionProtocol = false, tools = null) {
  
  const systemPrompt = assembleSystemPrompt(agent, memberConfig, group, skipInteractionProtocol);
  
  const messages = [
    { role: 'system', content: systemPrompt }
  ];
  
  for (const ctxMsg of contextMessages) {
    messages.push({
      role: ctxMsg.role,
      content: ctxMsg.content
    });
  }
  
  if (userMessage) {
    messages.push({
      role: 'user',
      content: userMessage
    });
  }
  
  if (messages.length === 1) {
    messages.push({
      role: 'user',
      content: '[系统唤醒]'
    });
  }

  // 使用 _buildLLMRequest 生成请求体（含 tools）
  var req = _buildLLMRequest(agent, messages, tools, true);
  var requestBody = req.body;

  // 保持 memberConfig.overrides 的兼容性
  if (memberConfig.overrides?.model) requestBody.model = memberConfig.overrides.model;
  if (memberConfig.overrides?.temperature != null) requestBody.temperature = memberConfig.overrides.temperature;
  if (memberConfig.overrides?.maxTokens) requestBody.max_tokens = memberConfig.overrides.maxTokens;
  
  DebugLogger.api(`agent:${agent.name}`, `开始调用 → 模型:${requestBody.model} tokens:${requestBody.max_tokens} 消息数:${messages.length}` + (tools ? ' 工具数:' + tools.length : ''));
  const startTime = performance.now();
  
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 600000);
  
  // 注册到全局中断系统
  registerRequestController(group.id, controller);
  
  // 检查全局中断信号
  const globalCtrl = groupAbortControllers.get(group.id);
  if (globalCtrl && globalCtrl.signal.aborted) {
    clearTimeout(timeoutId);
    unregisterRequestController(group.id, controller);
    throw new Error('讨论已被终止');
  }
  
  // 监听全局中断
  const onGlobalAbort = () => { controller.abort(); };
  if (globalCtrl) {
    globalCtrl.signal.addEventListener('abort', onGlobalAbort);
  }
  
  try {
    const response = await fetch(
      `${req.baseUrl}/v1/chat/completions`,
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${req.apiKey}`
        },
        body: JSON.stringify(requestBody),
        signal: controller.signal
      }
    );
    
    clearTimeout(timeoutId);
    const elapsed = Math.round(performance.now() - startTime);
    
    if (!response.ok) {
      const errorText = await response.text().catch(() => '');
      DebugLogger.error(`agent:${agent.name}`, `API错误 HTTP ${response.status}`, { body: errorText.substring(0, 200) });
      throw new Error(`API Error: ${response.status} ${response.statusText}${errorText ? ' - ' + errorText.substring(0, 100) : ''}`);
    }
    
    unregisterRequestController(group.id, controller);
    if (globalCtrl) {
      globalCtrl.signal.removeEventListener('abort', onGlobalAbort);
    }
    
    DebugLogger.api(`agent:${agent.name}`, `响应成功 (${elapsed}ms, status:${response.status})`);
    return response;
  } catch (error) {
    clearTimeout(timeoutId);
    unregisterRequestController(group.id, controller);
    if (globalCtrl) {
      globalCtrl.signal.removeEventListener('abort', onGlobalAbort);
    }
    const elapsed = Math.round(performance.now() - startTime);
    
    if (error.name === 'AbortError') {
      // 区分超时中断和用户手动中断
      const isManualAbort = globalCtrl && globalCtrl.signal.aborted;
      if (isManualAbort) {
        DebugLogger.info(`agent:${agent.name}`, `被用户手动终止`);
        throw new Error('讨论已被终止');
      }
      DebugLogger.error(`agent:${agent.name}`, `请求超时 (>600s)`, { elapsed });
      throw new Error('请求超时(600秒)');
    }
    
    DebugLogger.error(`agent:${agent.name}`, `调用失败: ${error.message}`, { elapsed });
    throw error;
  }
}

// ① 搜索 — POST /search
async function callTavilySearch(agent, query, options = {}) {
  const searchDepth = options.searchDepth || 'advanced';
  const maxResults = options.maxResults || 5;
  const includeDomains = options.includeDomains || [];
  const excludeDomains = options.excludeDomains || [];

  if (!agent || !agent.tavilyApiKey || !agent.tavilyApiKey.trim()) {
    throw new Error('Tavily API Key未配置');
  }

  DebugLogger.api(`agent:${agent.name}`, `Tavily搜索 → query:"${query.substring(0, 80)}" depth:${searchDepth}`);

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 30000);

  try {
    const response = await fetch('https://api.tavily.com/search', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${agent.tavilyApiKey}`
      },
      body: JSON.stringify({
        query,
        search_depth: searchDepth,
        max_results: maxResults,
        include_domains: includeDomains.length > 0 ? includeDomains : undefined,
        exclude_domains: excludeDomains.length > 0 ? excludeDomains : undefined
      }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!response.ok) {
      const errText = await response.text().catch(() => '');
      throw new Error(`Tavily Search Error: HTTP ${response.status} ${errText.substring(0, 100)}`);
    }

    const data = await response.json();
    DebugLogger.api(`agent:${agent.name}`, `Tavily搜索完成 → ${data.results?.length || 0}条结果`);

    return {
      query,
      results: data.results || [],
      answer: data.answer || null,
      images: data.images || [],
      responseTime: data.response_time || 0
    };
  } catch (error) {
    clearTimeout(timeoutId);
    if (error.name === 'AbortError') {
      throw new Error('Tavily搜索超时(30s)');
    }
    throw error;
  }
}

// ===== 流式响应处理 =====
async function streamAgentResponse(response, onChunk, onComplete, onError, abortSignal = null) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let thinkingText = '';
  let buffer = '';

  const cancelReader = () => { try { reader.cancel(); } catch(e) {} };
  if (abortSignal) {
    if (abortSignal.aborted) { cancelReader(); return; }
    abortSignal.addEventListener('abort', cancelReader, { once: true });
  }

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (abortSignal && abortSignal.aborted) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;

        const data = trimmed.slice(6).trim();
        if (data === '[DONE]') {
          if (abortSignal && abortSignal.aborted) return;
          await onComplete(fullText, thinkingText);
          return;
        }

        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta;

          if (delta?.reasoning_content) {
            thinkingText += delta.reasoning_content;
            onChunk(delta.reasoning_content, fullText, true);
          }

          if (delta?.content) {
            fullText += delta.content;
            onChunk(delta.content, fullText, false);
          }
        } catch(e) {}
      }
    }

    if (abortSignal && abortSignal.aborted) return;
    await onComplete(fullText, thinkingText);
  } catch (error) {
    if (abortSignal && abortSignal.aborted) return;
    onError(error);
  } finally {
    if (abortSignal) abortSignal.removeEventListener('abort', cancelReader);
  }
}

// 【权限矩阵】根据身份裁剪 manage_group 的可调用动作
var MANAGE_GROUP_ROLE_ACTIONS = {
  host:    ['mute','unmute','remove','invite','admin','vote','stop_discussion','list_members','list_friends'],
  admin:   ['mute','unmute','vote','list_members'],
  member:  ['vote','list_members']
};

function getActiveTools(agent, groupId) {
  var tools = [];
  var keys = Object.keys(TOOL_REGISTRY);
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    if (key === 'web_search' && !agent.enableSearchTool) continue;
    if ((key === 'read_pdf' || key === 'ocr_image' || key === 'filesystem') && !agent.enableFileTool) continue;
    if (key === 'manage_group') {
      // 根据 agent 在群中的角色，动态裁剪可调用动作
      var role = 'member';
      if (groupId) {
        var grp = getGroup(groupId);
        if (grp) {
          var mem = grp.members.find(function(m) { return m.agentId === agent.id; });
          if (mem && (mem.role === 'host' || mem.role === 'admin')) role = mem.role;
        }
      }
      var allowedActions = MANAGE_GROUP_ROLE_ACTIONS[role] || MANAGE_GROUP_ROLE_ACTIONS['member'];
      // 深拷贝模板，裁剪 enum
      var mgmtTool = JSON.parse(JSON.stringify(TOOL_REGISTRY[key]));
      mgmtTool.parameters.properties.action.enum = allowedActions;
      // 同步 description 让模型感知能力边界
      mgmtTool.description = '群管理操作（你的权限级别: ' + (role === 'host' ? '群主-全权限' : role === 'admin' ? '管理员' : '普通成员') + '）。可用: ' + allowedActions.join('/');
      tools.push(mgmtTool);
      continue;
    }

    tools.push(TOOL_REGISTRY[key]);
  }
  return tools;
}

async function executeTool(toolCall, groupId, agent) {
  var toolName = toolCall.function.name;
  var toolDef = TOOL_REGISTRY[toolName];
  if (!toolDef) return { role: 'tool', tool_call_id: toolCall.id, content: '未知工具: ' + toolName };
  try {
    var args = parseToolCallArguments(toolCall);
    args._groupId = groupId;
    var result;
    switch (toolName) {
      case 'filesystem': result = await _executeFilesystemTool(args); break;
      case 'table_generator': result = await _toolGenerateTable(args); break;
      case 'word_generator': result = await _toolGenerateWord(args); break;
      case 'diagram': result = await _toolGenerateDiagram(args); break;
      case 'chart': result = await _toolGenerateChart(args); break;
      case 'calculator': result = await _toolCalculate(args.expression || ''); break;
      case 'read_pdf': result = await _toolReadPdf(args); break;
      case 'ocr_image': result = await _toolOcrImage(args); break;
      case 'vector_search': result = await _toolVectorSearch(args); break;
      case 'rag_search': result = await _toolRagSearch(args); break;
      case 'web_search': result = await _executeWebSearchTool(args, agent); break;
      case 'mcts_plan': {
        var mctsResult = await executeMCTSPlan(agent, args);
        result = JSON.stringify(mctsResult);
        break;
      }
      case 'manage_group': result = await _executeManageGroupTool(args, groupId, agent); break;
      default: return { role: 'tool', tool_call_id: toolCall.id, content: '不支持的工具: ' + toolName };
    }
    if (typeof result === 'string') {
      return { role: 'tool', tool_call_id: toolCall.id, content: result };
    }
    return { role: 'tool', tool_call_id: toolCall.id, content: JSON.stringify(result) };
  } catch (e) {
    return { role: 'tool', tool_call_id: toolCall.id, content: '工具执行错误: ' + e.message };
  }
}

// ---- filesystem 统一包装 ----
async function _executeFilesystemTool(args) {
  var gid = args._groupId;
  if (args.action === 'list') {
    var flist = groupFiles[gid] || [];
    var visible = flist.filter(function(f) { return f.visible !== false; });
    if (!visible.length) return '群文件为空';
    return '群文件列表:\n' + visible.map(function(f) {
      return '- ' + f.filename + ' (' + (f.size / 1024).toFixed(1) + 'KB)';
    }).join('\n');
  }
  if (args.action === 'read') {
    if (!args.filename) return '请指定filename';
    var content = await getFileContent(gid, args.filename);
    if (content === null) return '文件不存在: ' + args.filename;
    if (typeof content === 'string' && content.startsWith('data:image/')) {
      var ps = content.indexOf('\n[OCR预览] ');
      var ocrPreview = ps >= 0 ? content.substring(ps + 12) : '(未识别)';
      return '[图片文件: ' + args.filename + ']\n' + ocrPreview;
    }
    var lines = content.split('\n');
    var totalLines = lines.length;
    var startLine = args.lineFrom || 1;
    var endLine = args.lineTo || 0;
    var maxLines = args.maxLines || 1000;
    if (startLine < 1) startLine = 1;
    if (startLine > totalLines) return '[文件: ' + args.filename + ' | 总行数: ' + totalLines + ' | ❌ 起始行号 ' + startLine + ' 超出范围]';
    if (endLine <= 0 || endLine > totalLines) endLine = totalLines;
    if (endLine - startLine + 1 > maxLines) endLine = startLine + maxLines - 1;
    var selected = lines.slice(startLine - 1, endLine);
    var numbered = selected.map(function(l, i) { return (startLine + i) + ': ' + l; }).join('\n');
    var info = '[文件: ' + args.filename + ' | 总行数: ' + totalLines + ' | 第 ' + startLine + '-' + endLine + ' 行';
    if (endLine < totalLines) info += (' | 剩余 ' + (totalLines - endLine) + ' 行未读，用 lineFrom=' + (endLine + 1) + ' 继续');
    else info += ' | ✅ 已读完]';
    return info + ']\n---\n' + numbered;
  }
  if (args.action === 'create') {
    if (!args.filename || args.content === undefined) return '请指定filename和content';
    var fileContent = args.content || '';
    var fileByteSize = new Blob([fileContent]).size;
    if (!groupFiles[gid]) groupFiles[gid] = [];
    var existing = groupFiles[gid].find(function(f) { return f.filename === args.filename; });
    if (existing) {
      existing.size = fileByteSize; existing.timestamp = Date.now();
      if (fileByteSize <= FILE_IDB_THRESHOLD) { existing.content = fileContent; existing._storage = 'local'; }
      else { delete existing.content; existing._storage = 'indexed'; }
      saveGroupFiles();
      await setFileContent(gid, args.filename, fileContent, fileByteSize);
      var cs = fileContent.length > 3000 ? fileContent.substring(0, 3000).replace(/\n+/g, ' ') + '\n...(以上为前3000字摘要，文件共'+fileContent.length+'字符。使用 filesystem read '+args.filename+' 读取完整内容)' : fileContent.substring(0, 3000);
      return '文件已覆盖: ' + args.filename + ' (' + (fileByteSize / 1024).toFixed(1) + 'KB)\n[内容摘要] ' + cs;

    } else {
      var newFile = { filename: args.filename, size: fileByteSize, timestamp: Date.now(), visible: true, _storage: fileByteSize <= FILE_IDB_THRESHOLD ? 'local' : 'indexed' };
      if (newFile._storage === 'local') newFile.content = fileContent;
      groupFiles[gid].push(newFile);
      saveGroupFiles();
      if (newFile._storage === 'indexed') await setFileContent(gid, args.filename, fileContent, fileByteSize);
      var cs = fileContent.length > 3000 ? fileContent.substring(0, 3000).replace(/\n+/g, ' ') + '\n...(以上为前3000字摘要，文件共'+fileContent.length+'字符。使用 filesystem read '+args.filename+' 读取完整内容)' : fileContent.substring(0, 3000);
      return '文件已创建: ' + args.filename + ' (' + (fileByteSize / 1024).toFixed(1) + 'KB)\n[内容摘要] ' + cs;
    }
  }
  if (args.action === 'append') {
    if (!args.filename || args.content === undefined) return '请指定filename和content';
    var origContent = await getFileContent(gid, args.filename);
    if (origContent === null) return '文件不存在: ' + args.filename + '，请先用create创建';
    var newContent = origContent + (args.content || '');
    var newSize = new Blob([newContent]).size;
    await setFileContent(gid, args.filename, newContent, newSize);
    return '内容已追加到文件末尾: ' + args.filename + ' (' + (newSize / 1024).toFixed(1) + 'KB)';
  }
  if (args.action === 'insert') {
    if (!args.filename || args.content === undefined) return '请指定filename和content';
    var srcContent = await getFileContent(gid, args.filename);
    if (srcContent === null) return '文件不存在: ' + args.filename + '，请先用create创建';
    var lines = srcContent.split('\n');
    var insLine = args.lineFrom || 1;
    if (insLine < 1) insLine = 1;
    if (insLine > lines.length + 1) insLine = lines.length + 1;
    lines.splice(insLine - 1, 0, args.content);
    var newContent = lines.join('\n');
    var newSize = new Blob([newContent]).size;
    await setFileContent(gid, args.filename, newContent, newSize);
    return '已在第 ' + insLine + ' 行插入内容: ' + args.filename + ' (' + (newSize / 1024).toFixed(1) + 'KB)';
  }
  if (args.action === 'delete_lines') {
    if (!args.filename) return '请指定filename';
    var srcContent = await getFileContent(gid, args.filename);
    if (srcContent === null) return '文件不存在: ' + args.filename + '，请先用create创建';
    var lines = srcContent.split('\n');
    var dlStart = (args.lineFrom || 1) - 1;
    var dlEnd = args.lineTo || args.lineFrom || 1;
    if (dlStart < 0) dlStart = 0;
    if (dlStart >= lines.length) return '行号超出文件范围: ' + args.filename;
    if (dlEnd > lines.length) dlEnd = lines.length;
    lines.splice(dlStart, dlEnd - dlStart);
    var newContent = lines.join('\n');
    var newSize = new Blob([newContent]).size;
    await setFileContent(gid, args.filename, newContent, newSize);
    return '已删除第 ' + (dlStart + 1) + ' 到第 ' + dlEnd + ' 行: ' + args.filename + ' (' + (newSize / 1024).toFixed(1) + 'KB)';
  }
  if (args.action === 'replace_lines') {
    if (!args.filename || args.content === undefined) return '请指定filename和content（空字符串=清空指定行）';
    var srcContent = await getFileContent(gid, args.filename);
    if (srcContent === null) return '文件不存在: ' + args.filename + '，请先用create创建';
    var lines = srcContent.split('\n');
    var rlStart = (args.lineFrom || 1) - 1;
    var rlEnd = args.lineTo || args.lineFrom || 1;
    if (rlStart < 0) rlStart = 0;
    if (rlStart >= lines.length) return '行号超出文件范围: ' + args.filename;
    if (rlEnd > lines.length) rlEnd = lines.length;
    lines.splice(rlStart, rlEnd - rlStart, args.content);
    var newContent = lines.join('\n');
    var newSize = new Blob([newContent]).size;
    await setFileContent(gid, args.filename, newContent, newSize);
    return '已替换第 ' + (rlStart + 1) + ' 到第 ' + rlEnd + ' 行: ' + args.filename + ' (' + (newSize / 1024).toFixed(1) + 'KB)';
  }
  if (args.action === 'runCode') {
    if (!args.filename) return '请指定filename';
    var ext = (args.filename.split('.').pop() || '').toLowerCase();
    var lang = ext === 'py' ? 'python' : ext === 'js' ? 'javascript' : null;
    if (!lang) return '仅支持 .js 和 .py 文件';
    var code = await getFileContent(gid, args.filename);
    if (code === null) return '文件不存在: ' + args.filename + '，请先用create创建';
    var result = await runCodeInSandbox(lang, code, lang === 'python' ? 30000 : 10000);
    var ok = result.exitCode === 0;
    return (ok ? '✓' : '✗') + ' 执行完成 (' + (result.duration || 0) + 'ms)\n' +
      (result.stdout || '') + (result.stderr ? '\n' + result.stderr : '') +
      '\n[退出码: ' + result.exitCode + ']';
  }
  return '未知action: ' + args.action;
}

// ---- web_search 包装 ----
async function _executeWebSearchTool(args, agent) {
  if (!agent.enableSearchTool) return '搜索功能未启用';
  if (args.action === 'extract') {
    if (!args.urls || !args.urls.length) return '请指定urls';
    var result = await callTavilyExtract(agent, args.urls);
    if (!result || (!result.results && !result.answer && !result.content)) return '提取无结果。';
    if (result.results && result.results.length) {
      return '📎 提取结果 ('+result.results.length+'条):\n'+result.results.map(function(r,i){return (i+1)+'. '+r.url+'\n   '+(r.raw_content||r.content||'').substring(0,3000)+(r.raw_content&&r.raw_content.length>3000?'...(以上为前3000字摘要)':'');}).join('\n');
    }
    return typeof result.content==='string'?result.content.substring(0,5000):JSON.stringify(result).substring(0,5000);
  }
  if (args.action === 'crawl') {
    if (!args.urls || !args.urls.length) return '请指定urls';
    var result = await callTavilyCrawl(agent, args.urls);
    if (!result || (!result.results && !result.answer)) return '爬取无结果。';
    if (result.results && result.results.length) {
      return '📎 爬取结果 ('+result.results.length+'条):\n'+result.results.map(function(r,i){return (i+1)+'. '+r.url+'\n   '+(r.raw_content||r.content||'').substring(0,3000)+(r.raw_content&&r.raw_content.length>3000?'...(以上为前3000字摘要)':'');}).join('\n');
    }
    return JSON.stringify(result).substring(0,5000);
  }
  if (!args.query) return '请指定query';
  var result = await callTavilySearch(agent, args.query, {
    searchDepth: args.search_depth || 'advanced',
    maxResults: args.max_results || 5
  });
  if (!result || (!result.results && !result.answer)) return '搜索无结果。';
  var lines=[];
  if(result.answer)lines.push('💡 AI摘要: '+result.answer);
  if(result.results&&result.results.length){
    lines.push('\n📎 搜索结果 ('+result.results.length+'条):');
    for(var i=0;i<result.results.length;i++){
      var r=result.results[i];
      lines.push((i+1)+'. **'+(r.title||'无标题')+'**\n   '+(r.content||'').substring(0,500)+(r.content&&r.content.length>500?'...':'')+'\n   🔗 '+r.url);
    }
  }
  return lines.join('\n');
}

      }, groupId, agent.id);

        command: 'remove',
        target: target,
        reason: reason
      }, groupId, agent.id);
      return target ? '已执行移出命令（target=' + target + '）' : '移出执行完毕';

    case 'invite':
      handleCommand({
        command: 'invite',
        target: target || args.invite_name || '',
        reason: reason
      }, groupId, agent.id);
      return target || args.invite_name ? '已执行邀请命令' : '邀请执行完毕';

    case 'admin':
      handleCommand({
        command: 'admin',
        target: target,
        reason: reason
      }, groupId, agent.id);
      return '已执行管理员设置命令';

    case 'vote':
      if (args.vote_proposal && !args.proposal_id) {
        // 发起投票
        handleCommand({
          command: 'propose',
          content: args.vote_proposal,
          proposalId: generateUUID()
        }, groupId, agent.id);
        return '✅ 已发起投票: ' + args.vote_proposal;
      }
      if (args.proposal_id && args.vote) {
        // 表决
        handleCommand({
          command: 'vote',
          proposalId: args.proposal_id,
          vote: args.vote,
          reason: reason
        }, groupId, agent.id);
        return '✅ 已表决: ' + (args.vote === 'agree' ? '同意' : '反对') + ' 提议 ' + args.proposal_id.substring(0, 8);
      }
      return '请指定vote_proposal（发起投票）或 proposal_id+vote（表决）';

    case 'stop_discussion':
      handleCommand({
        command: 'stop',
        reason: reason || 'Agent请求终止'
      }, groupId, agent.id);
      return '✅ 讨论已终止';

    case 'list_members':
      handleCommand({
        command: 'list_members',
        reason: reason
      }, groupId, agent.id);

        reason: reason
      }, groupId, agent.id);

    default:
      return '未知管理动作: ' + action;
  }
}

// ================================================================
// 流式API + 工具调用感知（替代 streamAgentResponse 用于主循环）
// ================================================================
async function streamWithToolCalls(agent, messages, tools, onChunk, abortSignal) {
  var req = _buildLLMRequest(agent, messages, tools, true);

  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, 600000);
  if (abortSignal) {
    if (abortSignal.aborted) { clearTimeout(timeoutId); throw new Error('已中止'); }
    abortSignal.addEventListener('abort', function() { controller.abort(); }, { once: true });
  }

  var response;
  try {
    response = await fetch(req.baseUrl + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + req.apiKey },
      body: JSON.stringify(req.body),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error(abortSignal && abortSignal.aborted ? '讨论已被终止' : '请求超时');
    throw e;
  }

  if (!response.ok) {
    var errText = await response.text().catch(function() { return ''; });
    throw new Error('API Error: ' + response.status + ' ' + errText.substring(0, 200));
  }

  var reader = response.body.getReader();
  var decoder = new TextDecoder();
  var buffer = '';
  var finishReason = null;

  var cancelReader = function() { try { reader.cancel(); } catch (e) {} };
  if (abortSignal) abortSignal.addEventListener('abort', cancelReader, { once: true });

  try {
    while (true) {
      var readResult = await reader.read();
      if (readResult.done) break;
      buffer += decoder.decode(readResult.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (var i = 0; i < lines.length; i++) {
        var trimmed = lines[i].trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        var data = trimmed.slice(6).trim();
        if (data === '[DONE]') {
          if (abortSignal) abortSignal.removeEventListener('abort', cancelReader);
          return finishReason;
        }
        try {
          var parsed = JSON.parse(data);
          if (parsed.choices && parsed.choices[0] && parsed.choices[0].finish_reason) {
            finishReason = parsed.choices[0].finish_reason;
          }
          await onChunk(parsed);
        } catch (e) {}
      }
    }
    if (abortSignal) abortSignal.removeEventListener('abort', cancelReader);
    return finishReason;
  } catch (e) {
    // reader.read() 被 abort 时抛出原生 TypeError，需转换为标准终止错误
    if (abortSignal && abortSignal.aborted) throw new Error('讨论已被终止');
    throw e;
  } finally {
    try { reader.cancel(); } catch (e) {}
    if (abortSignal) abortSignal.removeEventListener('abort', cancelReader);
  }
}

// ===== 并发控制 =====
class ConcurrencyController {
  constructor(limit = 1) {
    this.limit = limit;
    this.running = 0;
    this.queue = [];
  }
  
  async enqueue(taskFn) {
    DebugLogger.debug('concurrency', `排队中 (运行:${this.running}/${this.limit}, 队列:${this.queue.length})`);
    
    while (this.running >= this.limit) {
      await new Promise(resolve => this.queue.push(resolve));
    }
    
    this.running++;
    try {
      return await taskFn();
    } finally {
      this.running--;
      const next = this.queue.shift();
      if (next) next();
    }
  }
  
  async executeAll(tasks) {
    return Promise.all(tasks.map(task => this.enqueue(task)));
  }
}

const concurrencyControllers = new Map();

// ===== 全局讨论中断控制 =====
const groupAbortControllers = new Map(); // groupId -> AbortController

function abortGroupDiscussion(groupId, reason = '用户手动终止') {
  const ctrl = groupAbortControllers.get(groupId);
  if (ctrl) {
    ctrl.abort();
    ctrl._hardAbort = true;
    DebugLogger.info('chat', `群 ${groupId} 讨论中断: ${reason}`);
  }
  // 遍历所有该群的正在进行的fetch AbortController，统一中断
  const extraControllers = groupAbortControllers.get(groupId + '_requests') || [];
  for (const c of extraControllers) {
    try { c.abort(); } catch(e) {}
  }
  groupAbortControllers.set(groupId + '_requests', []);
}

function registerRequestController(groupId, controller) {
  let arr = groupAbortControllers.get(groupId + '_requests');
  if (!arr) {
    arr = [];
    groupAbortControllers.set(groupId + '_requests', arr);
  }
  arr.push(controller);
}

function unregisterRequestController(groupId, controller) {
  const arr = groupAbortControllers.get(groupId + '_requests');
  if (arr) {
    const idx = arr.indexOf(controller);
    if (idx >= 0) arr.splice(idx, 1);
  }
}

function getConcurrencyController(groupId) {
  const group = getGroup(groupId);
  const limit = group ? group.settings.concurrencyLimit : 3;
  
  let controller = concurrencyControllers.get(groupId);
  if (!controller || controller.limit !== limit) {
    controller = new ConcurrencyController(limit);
    concurrencyControllers.set(groupId, controller);
  }
  return controller;
}

// ===== 防退化机制 =====
function detectRepetition(messages, agentId, windowSize = 3) {
  const agentMessages = messages
    .filter(m => m.senderId === agentId && m.senderType === 'agent')
    .slice(-windowSize);
  
  if (agentMessages.length < windowSize) return { repeated: false, similarity: 0 };
  
  const contents = agentMessages.map(m => m.cleanContent || m.content || '');
  
  let similarPairs = 0;
  let totalPairs = 0;
  for (let i = 0; i < contents.length; i++) {
    for (let j = i + 1; j < contents.length; j++) {
      const similarity = levenshteinSimilarity(contents[i], contents[j]);
      if (similarity > 0.85) similarPairs++;
      totalPairs++;
    }
  }
  
  const avgSimilarity = totalPairs > 0 ? similarPairs / totalPairs : 0;
  
  return {
    repeated: similarPairs >= windowSize - 1,
    similarity: avgSimilarity
  };
}

function levenshteinSimilarity(a, b) {
  const na = a.replace(/\s+/g, '').toLowerCase();
  const nb = b.replace(/\s+/g, '').toLowerCase();
  
  if (na.length === 0 || nb.length === 0) return 0;
  if (na === nb) return 1;
  
  const maxLen = Math.max(na.length, nb.length);
  const distance = levenshteinDistance(na, nb);
  
  return 1 - distance / maxLen;
}

function levenshteinDistance(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1] 
        ? dp[i-1][j-1] 
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}


function runAntiDegradationChecks(groupId) {
  const group = getGroup(groupId);
  if (!group) return [];
  
  const messages = getMessages(groupId);
  const interventions = [];
  
  for (const member of group.members) {
    if (member.isMuted) continue;
    
    const agent = getAgentFriend(member.agentId);
    if (!agent) continue;
    
    const agentMessages = messages.filter(m => 
      m.senderId === member.agentId && 
      m.senderType === 'agent'
    );
    
    if (agentMessages.length < 3) continue;
    
    const repetition = detectRepetition(messages, member.agentId);
    if (repetition.repeated) {
      interventions.push({
        type: 'repetition',
        agentId: member.agentId,
        agentName: agent.name,
        action: 'skip_round',
        message: `${agent.name} 检测到重复输出(相似度${(repetition.similarity*100).toFixed(0)}%)，跳过本轮调用`
      });
      // 【复读@群主】检测到复读时，额外生成alert_host请求群主禁言该Agent
      interventions.push({
        type: 'repetition_alert_host',
        agentId: member.agentId,
        agentName: agent.name,
        action: 'alert_host',
        message: `⚠️ 复读警告: ${agent.name} 连续输出高度相似内容(相似度${(repetition.similarity*100).toFixed(0)}%)，建议群主使用 {\"command\":\"mute\",\"target\":\"${member.agentId}\",\"rounds\":5} 禁言该Agent以防止污染上下文`
      });
    }
    
    const lastMsg = agentMessages[agentMessages.length - 1];
    if (lastMsg) {
      const len = (lastMsg.cleanContent || lastMsg.content || '').length;
      if (len > 16000) {
        interventions.push({
          type: 'overlength',
          agentId: member.agentId,
          agentName: agent.name,
          action: 'truncate',
          message: `${agent.name} 输出过长(${len}字)，后续将被截断`
        });
      }
    }
    
    const recentAgentMsgs = agentMessages.slice(-5);
    if (recentAgentMsgs.length >= 3 && 
        recentAgentMsgs.every(m => (m.cleanContent || m.content || '').length < 20)) {
      interventions.push({
        type: 'silence',
        agentId: member.agentId,
        agentName: agent.name,
        action: 'reduce_frequency',
        message: `${agent.name} 连续低质量输出，建议降低活跃度或检查prompt`
      });
    }
  }
  
  if (interventions.length > 0) {
    for (const iv of interventions) {
      DebugLogger.warn('antideg', `${iv.agentName}: ${iv.type} → ${iv.action}`, iv);
    }
    logAntiDegEvents(groupId, interventions);
  }
  
  return interventions;
}

function logAntiDegEvents(groupId, interventions) {
  (async () => {
    try {
      const logFile = 'degradation-audit.md';
      if (!groupFiles[groupId]) groupFiles[groupId] = [];
      let found = groupFiles[groupId].find(f => f.filename === logFile);
      if (!found) {
        groupFiles[groupId].push({
          filename: logFile, _storage: 'local', size: 0,
          timestamp: Date.now(), visible: true
        });
      }
      let existing = '';
      try { existing = await getFileContent(groupId, logFile) || ''; } catch(e) {}
      const header = existing ? '' : `# 防退化审计日志\n\n> 群组: ${getGroup(groupId)?.name || '未知'}\n\n`;
      const ts = new Date().toLocaleString('zh-CN');
      let entries = '';
      for (const iv of interventions) {
        const actionMap = {
          skip_round: '⏭ 跳过本轮',
          alert_host: '⚠ 通知群主',
          mute_drifter: '🔇 建议禁言',
          truncate: '✂ 截断输出',
          reduce_frequency: '📉 建议降频'
        };
        entries += `| ${ts} | ${iv.agentName} | ${iv.type} | ${actionMap[iv.action] || iv.action} | ${iv.message} |\n`;
      }
      const tableHeader = existing ? '' : '| 时间 | Agent | 类型 | 措施 | 详情 |\n|------|-------|------|------|------|\n';
      await setFileContent(groupId, logFile, header + tableHeader + existing.replace(/^#.*\n>.*\n\n/, '') + entries);
      saveGroupFiles();
    } catch(e) { DebugLogger.error('antideg', '审计日志写入失败: ' + e.message); }
  })();
}

// ===== 群聊主循环 =====
async function runChatRound(groupId, userMessage = null, manualMentions = []) {
  const group = getGroup(groupId);
  if (!group) return;
  
  // 创建本轮讨论的 AbortController
  const roundAbortCtrl = new AbortController();
  roundAbortCtrl._hardAbort = false;
  // 先中止上一轮残留的controller（如果有）
  const oldCtrl = groupAbortControllers.get(groupId);
  if (oldCtrl) { try { oldCtrl.abort(); } catch(e) {} }
  groupAbortControllers.set(groupId, roundAbortCtrl);
  
  let allMessages = getMessages(groupId);
  
  // 1. 保存用户消息
  if (userMessage) {
    // 【Bug1修复】解析用户消息中的命令块
    const parsedUser = parseAgentResponse(userMessage);
    const mentions = extractMentionsFromContent(parsedUser.cleanContent, group);
    
    // 如果用户发出了vote命令但没有指定proposalId，自动查找当前群的活动提议
    if (parsedUser.commandBlock && parsedUser.commandBlock.command === 'vote' && !parsedUser.commandBlock.proposalId) {
      const openProposals = ProposalStateMachine.getOpenProposalsForGroup(groupId);
      if (openProposals.length === 1) {
        parsedUser.commandBlock.proposalId = openProposals[0].id;
      }
    }
    
    const msg = {
      id: generateUUID(),
      groupId,
      roundIndex: getNextRoundIndex(groupId),
      senderType: 'user',
      senderId: null,
      senderName: '用户',
      content: userMessage,
      cleanContent: parsedUser.cleanContent,
      thinkingContent: null,
      commandBlock: parsedUser.commandBlock,
      commandResult: null,
      searchResult: null,
      quotedMessageId: parsedUser.quotedMessageId || null,
      mentions: mentions,
      timestamp: Date.now()
    };
    allMessages.push(msg);
    saveMessages(groupId, allMessages);
    // 异步嵌入（不阻塞主流程）
    (function() {
      var embedText = parsedUser.cleanContent || userMessage;
      embedAndCache(msgEmbedKey(groupId, msg.id), embedText);
    })();
    renderChatMessages();
    
    // 【Bug1修复】执行用户消息中的命令
    if (parsedUser.commandBlock) {
      handleCommand(parsedUser.commandBlock, groupId, '__user__');
    }
  }
  
  // [v3] 2. 初始化调度器（纯打分调度，已移除整除预筛选）
  const scheduler = getWakeScheduler(groupId);
  scheduler.incrementMessageCount();
  // manualMentions 在 while 循环的收敛检测中自然处理

  // [v3] 3. 防退化检查 — agentCooldown(Map) 替代旧版 alreadyWokenThisTurn(Set)
  const agentCooldown = new Map();
  const interventions = runAntiDegradationChecks(groupId);
  for (const iv of interventions) {
    if (iv.action === 'skip_round') {
      agentCooldown.set(iv.agentId, scheduler.messageCount);
      addSystemMessage(groupId, `[防退化] ${iv.message}`);
    }
    if (iv.action === 'alert_host') {
      const hostMember = group.members.find(m => m.role === 'host');
      const hostAgent = hostMember ? getAgentFriend(hostMember.agentId) : null;
      const hostName = hostAgent ? hostAgent.name : '群主';
      addSystemMessage(groupId, `[防退化] ${iv.message}`);
      addSystemMessage(groupId, `[系统] @${hostName} 请关注上述防退化警告。如确认Agent存在复读行为，请使用禁言命令: {\"command\":\"mute\",\"target\":\"${iv.agentId}\",\"rounds\":5}`);
      if (hostMember && hostAgent && hostAgent.apiKey && hostAgent.apiKey.trim()) {
        scheduler.forceWakeNextRound(hostMember.agentId);
        agentCooldown.delete(hostMember.agentId);
      }
      // [v3] Watcher不再随防退化事件强制唤醒，它只走沉默专用通道
    }
    if (iv.action === 'mute_drifter') {
      addSystemMessage(groupId, `[防退化] ${iv.message}`);
    }
    if (iv.action === 'truncate') {
      addSystemMessage(groupId, `[防退化] ${iv.message}`);
    }
  }

  // [v3] 4. 历史压缩检查
  const compressionCheck = checkCompressionNeed(group, allMessages);
  if (compressionCheck.needed) {
    try {
      await executeCompression(groupId);
      allMessages = getMessages(groupId);
      const hostId = group.members.find(m => m.role === 'host')?.agentId;
      if (hostId) {
        scheduler.forceWakeNextRound(hostId);
