                    var _scrtRes = await executeTool(_scRevPending[_scrrp], groupId, agent);
                    revisionMessages.push(_scrtRes);
                    var _scrPreview = (_scrtRes.content || '').length > 120 ? (_scrtRes.content || '').substring(0, 120) + '...' : (_scrtRes.content || '');
                    _scAddToolBlock(_scRevPending[_scrrp].function.name, _scrPreview);
                  }
                }
                if (!agentContent.trim()) {
                  agentContent = currentDraft;
                  DebugLogger.warn('chat', agent.name + ' 修正返回空，回退');
                }
              }

              // ===== ④ 折叠所有自评估 phase blocks，仅保留 toggle 供展开 =====
              for (var _scfi = 0; _scfi < _scSaved.length; _scfi++) {
                var si = _scSaved[_scfi];
                if (si.block) si.block.classList.add('collapsed');
                if (si.toggle) si.toggle.textContent = si.toggle.getAttribute('data-expand-label');
              }
              DebugLogger.info('chat', agent.name + ' 自评估完成: ' + _scRounds + '轮');
              // 收集自评估 HTML，供 renderChatMessages 重建时使用
              msgElement._selfEvalHTML = '';
              for (var _scfi = 0; _scfi < _scSaved.length; _scfi++) {
                var si = _scSaved[_scfi];
                if (si.toggle && si.toggle.parentNode) msgElement._selfEvalHTML += si.toggle.outerHTML;
                if (si.block && si.block.parentNode) msgElement._selfEvalHTML += si.block.outerHTML;
              }

            } catch (_sce) {
              DebugLogger.warn('chat', agent.name + ' 自评估异常: ' + _sce.message);
              // 折叠所有自评估块（保留 DOM）
              for (var _scfi = 0; _scfi < _scSaved.length; _scfi++) {
                var si = _scSaved[_scfi];
                if (si.block) si.block.classList.add('collapsed');
                if (si.toggle) si.toggle.textContent = si.toggle.getAttribute('data-expand-label');
              }
              // 收集自评估 HTML（必须在 DOM 被 renderChatMessages 销毁前保存）
              msgElement._selfEvalHTML = '';
              for (var _scfi = 0; _scfi < _scSaved.length; _scfi++) {
                var si = _scSaved[_scfi];
                if (si.toggle && si.toggle.parentNode) msgElement._selfEvalHTML += si.toggle.outerHTML;
                if (si.block && si.block.parentNode) msgElement._selfEvalHTML += si.block.outerHTML;
              }
              // 恢复 agentContent 为原始草稿，避免外层因空内容删除整个气泡
              if (!agentContent.trim() && _scDraftContent.trim()) {
                agentContent = _scDraftContent;
                updateMessageContent(msgElement, agentContent);
              }
              // 如果是中止信号，重新抛出，让外层"讨论已被终止"处理器接管
              if (roundAbortCtrl.signal.aborted) throw _sce;
              // 非中止异常：清理 DOM 残留
              for (var _scfi2 = 0; _scfi2 < _scSaved.length; _scfi2++) {
                var si2 = _scSaved[_scfi2];
                if (si2.toggle && si2.toggle.parentNode) si2.toggle.remove();
                if (si2.block && si2.block.parentNode) si2.block.remove();
              }
            }
          }


          // 循环结束 — 最终渲染
          if (agentContent.trim()) {
            updateMessageContent(msgElement, agentContent);
          } else if (totalToolCalls > 0 || streamReasoning) {
            // 有工具调用或至少显示了思考过程 → 保留气泡
            updateMessageContent(msgElement, agentContent.trim() || (totalToolCalls > 0 ? '[已执行工具调用]' : ''));
          } else {
            if (msgElement && msgElement.parentNode) msgElement.remove();
            scheduler.incrementMessageCount();
            return;
          }

          // 保存消息
          var parsed = parseAgentResponse(agentContent);
          var msg = {
            id: generateUUID(),
            groupId: groupId,
            roundIndex: getNextRoundIndex(groupId),
            senderType: 'agent',
            senderId: agentId,
            senderName: agent.name,
            content: parsed.cleanContent || agentContent.trim(),
            cleanContent: parsed.cleanContent || agentContent.trim(),

          };

          saveMessage(groupId, msg);

          (function() {
            embedAndCache(msgEmbedKey(groupId, msg.id), msg.cleanContent || msg.content || '');
          })();

          batchHadOutput = true;
          scheduler.incrementMessageCount();
          finalizeMessageBubble(msgElement, parsed, msg);

        } catch (error) {
          if (error.message === '讨论已被终止') {
            // 保留气泡，不删除已生成的内容
            if (msgElement && agentContent.trim()) {
              var parsed2 = parseAgentResponse(agentContent);
              var interruptedMsg = {

              var streamingEl = document.getElementById(msgElement.id);

function processPendingSearchFallbacks(groupId, agentId, agentName) {
  // 检查开关：如果群设置关闭了兜底，直接跳过写文件
  const group = getGroup(groupId);
  if (group && !group.settings.enableSearchFallback) {
    const pending = pendingSearchFallbacks[groupId];
    if (pending) {
      pendingSearchFallbacks[groupId] = pending.filter(p => p.agentId !== agentId);
      if (pendingSearchFallbacks[groupId].length === 0) delete pendingSearchFallbacks[groupId];
    }
    delete agentWroteFileThisRound[`${groupId}:${agentId}`];
    return;
  }
  
  const pending = pendingSearchFallbacks[groupId];
  if (!pending || pending.length === 0) return;
  
  const agentPending = pending.filter(p => p.agentId === agentId);
  if (agentPending.length === 0) return;
  
  const wroteFile = agentWroteFileThisRound[`${groupId}:${agentId}`];
  
  for (const item of agentPending) {
    if (wroteFile) continue;  // Agent主动写了文件，跳过兜底
    
    (async () => {
      try {
        const ts = Date.now();  // 用毫秒时间戳替代秒级，彻底避免同名
        const safeName = agentName.replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g, '_').substring(0, 20);
        const fname = `search-fallback-${safeName}-${ts}.md`;
        
        // 去重：检查同名文件是否已存在
        if (!groupFiles[groupId]) groupFiles[groupId] = [];
        const alreadyExists = groupFiles[groupId].some(f => f.filename === fname);
        if (!alreadyExists) {
          groupFiles[groupId].push({
            filename: fname, _storage: 'local', size: 0,
            timestamp: Date.now(), visible: true
          });
        }
        
        const query = item.searchData.query || (item.searchData.urls || []).join(', ') || '';
        const result = item.searchData.result;
        const body = (result.results || []).map((r, i) =>
          `### [${i+1}] ${r.title || ''}\n- URL: ${r.url || ''}\n- 摘要: ${(r.content || r.snippet || r.raw_content || '').substring(0, 800)}\n`
        ).join('\n');
        const aiSummary = result.answer ? `\n## AI摘要\n${result.answer}\n\n` : '';
        
        await setFileContent(groupId, fname,
          `# 🔄 搜索兜底归档: ${item.action}\n> 执行者: ${agentName}\n> 时间: ${new Date().toLocaleString('zh-CN')}\n> 查询: ${query}\n> ⚠️ 此文件为自动兜底生成，因Agent未主动将搜索结果写入文件\n\n${aiSummary}${body}`
        );
        saveGroupFiles();
      } catch(e) { /* 静默失败，不干扰主流程 */ }
    })();
  }
  
  // 清理
  pendingSearchFallbacks[groupId] = pending.filter(p => p.agentId !== agentId);
  if (pendingSearchFallbacks[groupId].length === 0) delete pendingSearchFallbacks[groupId];
  delete agentWroteFileThisRound[`${groupId}:${agentId}`];
}

    // 并发执行这一批
    const preBatchMsgCount = scheduler.messageCount;
    await concurrency.executeAll(tasks);
    // ← 循环回到顶部，重新 pickNextBatch（@优先级已内化在评分中）

    // [v4] 冷却死锁防护：确保批次推进量足够解除冷却期
    const actualAdvance = scheduler.messageCount - preBatchMsgCount;
    if (actualAdvance < MIN_COOLDOWN_ADVANCE) {
      scheduler.messageCount = preBatchMsgCount + MIN_COOLDOWN_ADVANCE;
      DebugLogger.info('chat', `群 ${group.name}: 批次推进不足(${actualAdvance}<${MIN_COOLDOWN_ADVANCE})，强制推进messageCount至${scheduler.messageCount}以防冷却死锁`);
    }

    // [v4] 停滞检测：连续多轮无有效输出则自动终止（替代硬上限）
    if (!batchHadOutput) {
      consecutiveEmptyBatches++;
      if (consecutiveEmptyBatches >= MAX_CONSECUTIVE_EMPTY_BATCHES) {
        DebugLogger.info('chat', `群 ${group.name}: 连续${MAX_CONSECUTIVE_EMPTY_BATCHES}轮无有效输出，自动终止`);
        addSystemMessage(groupId, '[系统] ⏹ 讨论已自然收敛（多轮无有效回应）');
        break;
      }
    } else {
      consecutiveEmptyBatches = 0;
    }
  }

  // 清理 AbortController
  groupAbortControllers.delete(groupId);
  
  // 最终刷新UI
  renderChatMessages();
  renderGroupList();
}

function extractMentionsFromContent(content, group) {
  if (!content || !group) return [];
  
  const mentionRegex = /@([^\s,，。！？、；：""''\]\)】》\n!?,.;:'"\)\]]+)/g;
  const mentionedNames = [];
  let match;
  while ((match = mentionRegex.exec(content)) !== null) {
    mentionedNames.push(match[1]);
  }
  
  const result = mentionedNames.map(name => {
    const member = group.members.find(m => {
      const agent = getAgentFriend(m.agentId);
      return agent && agent.name === name;
    });
    return member ? member.agentId : null;
  }).filter(Boolean);
  
  // [R1] 角色称呼自动映射：用户说"群主"→自动@host，"管理员"→自动@所有admin
  if (content.includes('群主')) {
    const hostMember = group.members.find(m => m.role === 'host');
    if (hostMember && !result.includes(hostMember.agentId)) {
      result.push(hostMember.agentId);
    }
  }
  if (content.includes('管理员')) {
    const adminMembers = group.members.filter(m => m.role === 'admin');
    for (const am of adminMembers) {
      if (!result.includes(am.agentId)) {
        result.push(am.agentId);
      }
    }
  }
  
  return result;
}

// ===== 边界条件与异常处理 =====
async function withRetry(fn, maxRetries = 3, baseDelay = 1000) {
  let lastError;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      return await fn();
    } catch (error) {
      lastError = error;
      
      if (error.message.includes('401') || error.message.includes('403')) {
        throw error;
      }
      
      if (error.message.includes('429')) {
        const delay = baseDelay * Math.pow(2, attempt) + Math.random() * 1000;
        DebugLogger.warn('api', `429限流，${delay}ms后重试 (${attempt + 1}/${maxRetries})`);
        await new Promise(r => setTimeout(r, delay));
        continue;
      }
      
      if (attempt < maxRetries) {
        const delay = baseDelay * Math.pow(2, attempt);
        DebugLogger.warn('api', `网络错误，${delay}ms后重试 (${attempt + 1}/${maxRetries}): ${error.message}`);
        await new Promise(r => setTimeout(r, delay));
      }
    }
  }
  throw lastError;
}

function checkStorageQuota() {
  let total = 0;
  for (const key in localStorage) {
    if (localStorage.hasOwnProperty(key)) {
      total += localStorage[key].length * 2;
    }
  }
  const quotaMB = total / (1024 * 1024);
  const maxMB = 5;
  
  if (quotaMB > maxMB * 0.8) {
    return {
      warning: true,
      usage: quotaMB,
      limit: maxMB,
      message: `存储空间已使用 ${quotaMB.toFixed(1)}MB/${maxMB}MB，建议导出并清理旧记录`
    };
  }
  return { warning: false, usage: quotaMB, limit: maxMB };
}

function migrateData() {

  if (!settings.version) {
    settings.version = currentVersion;
    saveAppSettings(settings);
    initializeBuiltinAgents();
    DebugLogger.info('system', '首次运行，初始化数据和内置Agent');
    return;
  }
  
  if (settings.version !== currentVersion) {
    DebugLogger.info('system', `数据版本迁移: ${settings.version} → ${currentVersion}`);
    settings.version = currentVersion;
    saveAppSettings(settings);
  }
}

// ===== 输入验证 =====
const VALIDATION_RULES = {
  agentName: {
    minLength: 1,
    maxLength: 30,
    pattern: /^[\u4e00-\u9fa5a-zA-Z0-9·\-\s]+$/,
    message: '名称需1~30字符，支持中英文数字和·-符号'
  },
  groupName: {
    minLength: 1,
    maxLength: 50,
    pattern: /^[^\n\r]{1,50}$/,
    message: '群名需1~50字符'
  },
  apiKey: {
    minLength: 1,
    maxLength: 200,
    message: 'API Key不能为空'
  },
  temperature: { min: 0, max: 2, message: '温度范围0~2' },
  maxTokens: { min: 256, max: 1048576, message: 'Token范围256~1048576' },
  concurrencyLimit: { min: 1, max: 3, message: '并发限制1~3' },
  wakeInterval: { min: 0, max: 10, message: '活跃度0~10（0=仅被@唤醒，值越大发言越积极）' },
  baseURL: {
    pattern: /^https?:\/\/.+/,
    message: 'Base URL需以http://或https://开头'
  }
};

function validateField(fieldName, value) {
  const rule = VALIDATION_RULES[fieldName];
  if (!rule) return { valid: true };
  
  if (rule.minLength !== undefined && String(value).length < rule.minLength) {
    return { valid: false, message: rule.message };
  }
  if (rule.maxLength !== undefined && String(value).length > rule.maxLength) {
    return { valid: false, message: rule.message };
  }
  if (rule.min !== undefined && Number(value) < rule.min) {
    return { valid: false, message: rule.message };
  }
  if (rule.max !== undefined && Number(value) > rule.max) {
    return { valid: false, message: rule.message };
  }
  if (rule.pattern && !rule.pattern.test(String(value))) {
    return { valid: false, message: rule.message };
  }
  return { valid: true };
}

// 知识库文件上传处理
function handleKBFileUpload(input){
  if(!input.files||!input.files.length)return;
  // 1. 先把所有 File 对象缓存到数组（input.value清空后FileList也会消失）
  var filesArr=[];
  var totalFiles=input.files.length;
  for(var fi=0;fi<totalFiles;fi++){
    filesArr.push(input.files[fi]);
  }
  // 2. 立即清空input防止重复触发
  input.value='';

  // 3. 遍历缓存的文件数组
  var count=0;
  for(var fi=0;fi<filesArr.length;fi++){
    var file=filesArr[fi];
    var reader=new FileReader();
    reader.onload=(function(f){
      return function(e){
        var text=e.target.result;
        var title=f.name.replace(/\.[^.]+$/,'');
        var kb=_loadKB();
        kb.entries.push({title:title,content:text, tags:'file:'+f.name,createdAt:Date.now()});
        _saveKB(kb);
        var newIdx=kb.entries.length-1;
        embedAndCache(kbEmbedKey('global',newIdx),(title+' '+text).substring(0,800));
        count++;
        // 全部读完才刷新一次对话框
        if(count>=totalFiles){
          showKnowledgeBaseDialog();
          showToast('已导入 '+count+' 个文件到知识库 ✓','success');
        }
      };
    })(file);
    reader.onerror=function(){
      count++;
      if(count>=totalFiles){
        showKnowledgeBaseDialog();
        showToast('知识库导入完成（部分文件读取失败）','warning');
      }
    };
    reader.readAsText(file);
  }
}

// 格式化字节大小
function _formatSize(bytes){
  if(!bytes||bytes<=0)return'';
  if(bytes<1024)return bytes+'B';
  if(bytes<1048576)return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1048576).toFixed(1)+'MB';
}

function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatTime(timestamp) {
  const now = Date.now();
  const diff = now - timestamp;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  return new Date(timestamp).toLocaleDateString('zh-CN');
}

  if (member?.role === 'host') roleBadge = '<span class="badge badge-host">群主</span>';
  if (member?.role === 'admin') roleBadge = '<span class="badge badge-admin">管理</span>';
  if (member?.isMuted) roleBadge += '<span class="badge badge-muted">禁言</span>';

  }
  
  const contentText = msg.cleanContent || msg.content || '';
  const isLong = contentText.length > 400;

  const container = document.getElementById('messageList');
  const group = getGroup(activeGroupId);
  if (!group) return;
  
  const rawMessages = getMessages(activeGroupId);
  const messages = [...rawMessages].sort((a, b) => {
    if (a.timestamp !== b.timestamp) return a.timestamp - b.timestamp;
    return rawMessages.indexOf(a) - rawMessages.indexOf(b);
  });
  
  if (messages.length === 0) {
    container.innerHTML = '';
    _renderedOldestTimestamp[activeGroupId] = null;
    return;
  }
  
  // 初始化：只渲染最近100条（必须 >= MSG_HOT_CACHE_SIZE 的80，否则20条夹在 localStorage 和 IndexedDB 之间永远加载不到）
  const RENDER_INITIAL = 100;
  const toRender = messages.length > RENDER_INITIAL
    ? messages.slice(-RENDER_INITIAL)
    : messages;
  
  _renderedOldestTimestamp[activeGroupId] = toRender[0].timestamp;
  
  let html = '';
  
  // 如果localStorage已达热缓存上限(80条)，说明更早的消息可能已归档到IndexedDB
  if (messages.length >= MSG_HOT_CACHE_SIZE) {
    html += `<div id="loadMoreSentinel" style="text-align:center;padding:16px;cursor:pointer;color:var(--text-weak);font-size:13px;border-bottom:1px solid var(--border-color);"
      onclick="loadEarlierMessages('${activeGroupId}')">
      ↑ 向上滑动或点击加载更早的消息
    </div>`;
  }
  
  for (const msg of toRender) {
    html += renderSingleMessageHTML(msg, group);
  }
  
  container.innerHTML = html;
  
  // 绑定搜索指示器
  bindSearchIndicators(container, messages);
  
  // 绑定滚动加载
  bindScrollLoader(container, group);
  
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 50);
}

function bindSearchIndicators(container, messages) {
  container.querySelectorAll('.search-indicator').forEach(indicator => {
    const msgId = indicator.dataset.msgid;
    const msg = messages.find(m => m.id === msgId);
    if (!msg || !msg.searchResult) return;
    const successCount = msg.searchResult.filter(r => !r.error).length;
    const failCount = msg.searchResult.filter(r => !!r.error).length;
    const totalResults = msg.searchResult.reduce((sum, r) => sum + (r.results?.length || 0), 0);
    indicator.onclick = () => {
      if (indicator.classList.contains('expanded')) {
        indicator.classList.remove('expanded');
        indicator.innerHTML = `⚡ 调用完成: ${successCount}成功${failCount > 0 ? ` ${failCount}失败` : ''}，共${totalResults}条结果 (点击展开)`;
        indicator.style.cursor = 'pointer';
        return;
      }
      indicator.classList.add('expanded');
      let detailHTML = `<div style="font-weight:600;margin-bottom:6px;">⚡ 调用详情（仅你可见）</div>`;
      msg.searchResult.forEach((sr, si) => {
        detailHTML += `<div style="margin-bottom:8px;padding:6px;background:rgba(0,0,0,0.2);border-radius:4px;">`;
        detailHTML += `<div style="font-weight:600;color:var(--accent-gold);">#${si+1}: ${escapeHTML(sr.query)}</div>`;
        if (sr.error) {
          detailHTML += `<div style="color:var(--accent-red);">❌ ${escapeHTML(sr.error)}</div>`;
        } else {
          detailHTML += `<div style="color:var(--text-weak);">${sr.results?.length || 0}条结果 ${sr.answer ? '| AI摘要可用' : ''}</div>`;
          (sr.results || []).slice(0, 5).forEach((r, ri) => {
            const titleSnippet = escapeHTML((r.title || r.url || '').substring(0, 80));
            detailHTML += `<div style="margin:3px 0 0 8px;font-size:11px;">[${ri+1}] <a href="${escapeHTML(r.url || '#')}" target="_blank" style="color:var(--accent-blue);">${titleSnippet}</a></div>`;
            if (r.content) {
              const contentSnippet = escapeHTML(r.content.substring(0, 100));
              detailHTML += `<div style="margin:0 0 3px 20px;font-size:11px;color:var(--text-weak);">${contentSnippet}${r.content.length > 100 ? '...' : ''}</div>`;
            }
          });
          if ((sr.results || []).length > 5) {
            detailHTML += `<div style="margin:2px 0 0 8px;font-size:11px;color:var(--text-weak);">...还有${sr.results.length - 5}条</div>`;
          }
        }
        detailHTML += `</div>`;
      });
      detailHTML += `<div style="font-size:10px;color:var(--text-weak);">搜索结果仅发送给该Agent，其他Agent不可见。文件操作同样仅该Agent可见。</div>`;
      indicator.innerHTML = detailHTML;
      indicator.style.cursor = 'default';
    };
  });
}

// 滚动加载：距顶部<80px时自动加载更早消息
function bindScrollLoader(container, group) {
  // 移除旧监听器
  if (container._scrollHandler) {
    container.removeEventListener('scroll', container._scrollHandler);
  }
  
  const handler = () => {
    if (_isLoadingHistory[activeGroupId]) return;
    if (container.scrollTop > 80) return;  // 还没滚到顶部
    if (!_renderedOldestTimestamp[activeGroupId]) return;  // 没有更早的消息
    
    const sentinel = document.getElementById('loadMoreSentinel');
    if (sentinel) sentinel.textContent = '加载中...';
    
    loadEarlierMessages(activeGroupId);
  };
  
  container._scrollHandler = handler;
  container.addEventListener('scroll', handler, { passive: true });
}

// 加载更早的历史消息（从IndexedDB）
async function loadEarlierMessages(groupId) {
  if (_isLoadingHistory[groupId]) return;
  _isLoadingHistory[groupId] = true;
  
  const container = document.getElementById('messageList');
  const group = getGroup(groupId);
  if (!group || !container) { _isLoadingHistory[groupId] = false; return; }
  
  try {
    const oldestTs = _renderedOldestTimestamp[groupId];
    if (!oldestTs) { _isLoadingHistory[groupId] = false; return; }
    
    const olderMsgs = await loadMessagesRange(groupId, oldestTs, 30);
    
    if (olderMsgs.length === 0) {
      // 没有更早的消息了
      const sentinel = document.getElementById('loadMoreSentinel');
      if (sentinel) sentinel.textContent = '— 已到最早消息 —';
      _renderedOldestTimestamp[groupId] = null;
      _isLoadingHistory[groupId] = false;
      return;
    }
    
    // 按时间排序
    olderMsgs.sort((a, b) => a.timestamp - b.timestamp);
    _renderedOldestTimestamp[groupId] = olderMsgs[0].timestamp;
    
    // 拼接HTML并插入到DOM顶部
    let prependHTML = '';
    for (const msg of olderMsgs) {
      prependHTML += renderSingleMessageHTML(msg, group);
    }
    
    // 保留加载提示
    const sentinel = document.getElementById('loadMoreSentinel');
    if (sentinel) {
      sentinel.insertAdjacentHTML('afterend', prependHTML);
      bindSearchIndicators(container, olderMsgs);
    } else {
      // 如果没有sentinel（首次加载），创建一个并插入
      const newSentinel = document.createElement('div');
      newSentinel.id = 'loadMoreSentinel';
      newSentinel.style.cssText = 'text-align:center;padding:16px;cursor:pointer;color:var(--text-weak);font-size:13px;border-bottom:1px solid var(--border-color);';
      newSentinel.textContent = '↑ 向上滑动或点击加载更早的消息';
      newSentinel.onclick = () => loadEarlierMessages(groupId);
      container.insertBefore(newSentinel, container.firstChild);
      container.insertBefore(
        (() => { const d = document.createElement('div'); d.innerHTML = prependHTML; const frag = document.createDocumentFragment(); while(d.firstChild) frag.appendChild(d.firstChild); return frag; })(),
        newSentinel
      );
      bindSearchIndicators(container, olderMsgs);
    }
    
    // 更新sentinel文字
    const sentinelAfter = document.getElementById('loadMoreSentinel');
    if (sentinelAfter) {
      sentinelAfter.textContent = '↑ 向上滑动或点击加载更早的消息';
      sentinelAfter.onclick = () => loadEarlierMessages(groupId);
    }
    
    DebugLogger.info('msgDB', `群 ${groupId}: 加载了${olderMsgs.length}条更早消息 (最早时间戳:${_renderedOldestTimestamp[groupId]})`);
  } catch(e) {
    DebugLogger.error('msgDB', `加载历史消息失败: ${e.message}`);
  } finally {
    _isLoadingHistory[groupId] = false;
  }
}

function renderCommandStatus(commandBlock, commandResult) {
  if (!commandBlock) return '';
  
  if (commandBlock.command === 'propose') {
    const proposal = ProposalStateMachine.proposals.get(commandBlock.proposalId);
    if (!proposal) {
      return `<div class="vote-status-bar">
        <span class="pending">提议: ${escapeHTML((commandBlock.content || '').substring(0, 40))}...</span>
      </div>`;
    }
    
    const votes = Object.values(proposal.votes || {});
    const agrees = votes.filter(v => v.vote === 'agree').length;
    const disagrees = votes.filter(v => v.vote === 'disagree').length;
    const statusText = proposal.status === 'passed' ? '[已通过]' 
      : proposal.status === 'rejected' ? '[已否决]'
      : proposal.status === 'timeout' ? '[已超时]'
      : `[表决中 ${agrees + disagrees}票]`;
    
    return `<div class="vote-status-bar">
      ${proposal.status === 'open' ? '<span class="pending">' + statusText + '</span>' : ''}
      ${proposal.status === 'passed' ? '<span class="agree">' + statusText + '</span>' : ''}
      ${proposal.status === 'rejected' ? '<span class="disagree">' + statusText + '</span>' : ''}
      ${proposal.status === 'timeout' ? '<span class="timeout">' + statusText + '</span>' : ''}
      <span class="agree">同意: ${agrees}</span>
      <span class="disagree">反对: ${disagrees}</span>
    </div>`;
  }
  
  return '';
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHTML(text);
  
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, 
    '<pre style="background:rgba(255,255,255,0.05);padding:8px;border-radius:4px;overflow-x:auto;font-size:13px;font-family:var(--font-mono);">$2</pre>');
  
  html = html.replace(/`([^`]+)`/g, 
    '<code style="background:rgba(255,255,255,0.08);padding:1px 4px;border-radius:2px;font-family:var(--font-mono);font-size:13px;">$1</code>');
  
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  
  html = html.replace(/@(\S+)/g, '<span class="mention-tag">@$1</span>');
  
  html = html.replace(/\n/g, '<br>');
  
  return html;
}

function createMessageBubble(agentName, avatar, memberConfig) {

  wrapper.className = 'message-wrapper agent';
  wrapper.id = 'streaming-' + generateUUID().substring(0, 8);
  
  let roleBadge = '';

// 开始新一轮思考 — 在气泡中追加新的思考块
function beginRoundThinking(wrapper, roundIndex) {
  var blocks = wrapper.querySelector('.round-blocks');
  if (!blocks) return null;
  
  wrapper._roundIndex = roundIndex;
  
  var roundDiv = document.createElement('div');
  roundDiv.className = 'round-block';
  roundDiv.id = 'round-' + roundIndex + '-' + wrapper.id.replace('streaming-', '');
  
  // 轮次标签
  var header = document.createElement('div');
  header.className = 'round-header';
  header.innerHTML = '<span class="dot"></span> 第' + (roundIndex + 1) + '轮思考';
  
  // 思考块
  var thinkBlock = document.createElement('div');
  thinkBlock.className = 'thinking-block';
  thinkBlock.style.display = 'block';
  
  // 折叠/展开
  header.onclick = function() {
    thinkBlock.classList.toggle('collapsed');
    var dot = header.querySelector('.dot');
    if (thinkBlock.classList.contains('collapsed')) {
      header.innerHTML = header.innerHTML.replace('▼', '▶');
    } else {
      header.innerHTML = header.innerHTML.replace('▶', '▼');
    }
  };
  
  roundDiv.appendChild(header);
  roundDiv.appendChild(thinkBlock);
  blocks.appendChild(roundDiv);
  
  wrapper._currentThinking = thinkBlock;
  
  var container = document.getElementById('messageList');
  container.scrollTop = container.scrollHeight;
  
  return thinkBlock;
}

// 向当前思考块追加文本
function appendThinkingText(wrapper, text) {
  var thinkBlock = wrapper._currentThinking;
  if (!thinkBlock) {
    thinkBlock = beginRoundThinking(wrapper, wrapper._roundIndex || 0);
  }
  if (thinkBlock) {
    thinkBlock.textContent = (thinkBlock.textContent || '') + text;
    var container = document.getElementById('messageList');
    container.scrollTop = container.scrollHeight;
  }
}

// 结束当前轮思考，追加工具调用指示器
function finishRoundWithTool(wrapper, toolName, toolPreview) {
  var blocks = wrapper.querySelector('.round-blocks');
  if (!blocks) return;
  
  // 在最后一个 round-block 中追加工具块
  var roundBlocks = blocks.querySelectorAll('.round-block');
  var lastRound = roundBlocks[roundBlocks.length - 1];
  if (!lastRound) return;
  
  var toolDiv = document.createElement('div');
  toolDiv.className = 'tool-call-block';
  toolDiv.innerHTML = '\u{1F527} <b>' + escapeHTML(toolName) + '</b>' + (toolPreview ? ': ' + escapeHTML(toolPreview.substring(0, 100)) : '');
  lastRound.appendChild(toolDiv);
  
  // 下一轮
  wrapper._currentThinking = null;
  wrapper._roundIndex = (wrapper._roundIndex || 0) + 1;
  
  var container = document.getElementById('messageList');
  container.scrollTop = container.scrollHeight;
}

function updateMessageContent(wrapper, fullText) {
  const body = wrapper.querySelector('.message-body');
  if (body) {
    body.innerHTML = renderMarkdown(fullText);
  }
  const container = document.getElementById('messageList');
  container.scrollTop = container.scrollHeight;
}

function updateThinkingBlock(wrapper, thinkingText) {
  // 检查是否已有活跃思考块；如果没有则开始新一轮
  if (!wrapper._currentThinking) {
    beginRoundThinking(wrapper, wrapper._roundIndex || 0);
  }
  // 全量替换当前思考块文本（thinkingText 是累积值）
  if (wrapper._currentThinking) {
    wrapper._currentThinking.textContent = thinkingText;
    wrapper._currentThinking.style.display = 'block';
    wrapper._currentThinking.classList.remove('collapsed');
  }
  var container = document.getElementById('messageList');
  container.scrollTop = container.scrollHeight;
}

function handleDeleteMessage(msgId) {
  if (!activeGroupId) return;
  if (!confirm('确定删除这条消息？')) return;

  var messages = getMessages(activeGroupId);
  var idx = messages.findIndex(function(m) { return m.id === msgId; });
  if (idx === -1) return;

  messages.splice(idx, 1);
  saveMessages(activeGroupId, messages);

  // 更新调度器计数
  var scheduler = getWakeScheduler(activeGroupId);
  if (scheduler.messageCount > 0) scheduler.messageCount--;

  renderChatMessages();
}

// ===== 消息发送 =====
let isDiscussionRunning = false;

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  
  // 如果正在讨论中，这次点击是"停止"
  if (isDiscussionRunning) {
    stopDiscussion();
    return;
  }
  
  const content = input.value.trim();
  if (!content || !activeGroupId) return;
  
  input.value = '';
  input.style.height = 'auto';
  
  // 切换为停止模式
  enterStopMode();
  
  try {
    await runChatRound(activeGroupId, content);
  } catch(e) {
    if (e.message !== '讨论已被终止') {
      addSystemMessage(activeGroupId, `[错误] ${e.message}`);
      DebugLogger.error('chat', `sendMessage异常: ${e.message}`);
    }
  }
  
  // 恢复发送模式
  exitStopMode();
  
  renderChatMessages();
  renderGroupList();
}

function enterStopMode() {
  isDiscussionRunning = true;
  const sendBtn = document.getElementById('sendBtn');
  const input = document.getElementById('messageInput');
  
  sendBtn.textContent = '⏹ 停止';
  sendBtn.className = 'btn danger stop-active';
  input.disabled = true;
  input.placeholder = '讨论进行中... 点击红色按钮停止';
}

function exitStopMode() {
  isDiscussionRunning = false;
  const sendBtn = document.getElementById('sendBtn');
  const input = document.getElementById('messageInput');
  
  sendBtn.textContent = '发送';
  sendBtn.className = 'btn primary';
  input.disabled = false;
  input.placeholder = '输入消息... 使用 @ 提及Agent';
  input.focus();
}

function stopDiscussion() {
  if (!activeGroupId) return;
  abortGroupDiscussion(activeGroupId, '用户手动终止');
  addSystemMessage(activeGroupId, '[系统] ⏹ 用户手动终止了本轮讨论');
  exitStopMode();
  // 延迟渲染：让 agent 任务的 abort 处理有机会保存中断消息，
  // 等所有任务终止后再重建 DOM。runChatRound 的 while 循环退出时
  // 也会调用 renderChatMessages()，此处作为兜底。
  setTimeout(function() {
    if (activeGroupId) {
      renderChatMessages();
      renderGroupList();
    }
  }, 200);
}

function getNextRoundIndex(groupId) {
  const messages = getMessages(groupId);
  if (messages.length === 0) return 0;
  return Math.max(...messages.map(m => m.roundIndex || 0)) + 1;
}

function addSystemMessage(groupId, content) {
  const msg = {
    id: generateUUID(),
    groupId,
    roundIndex: getNextRoundIndex(groupId),
    senderType: 'system',
    senderId: null,
    senderName: '系统',
    content,
    cleanContent: content,
    thinkingContent: null,
    commandBlock: null,
    commandResult: null,
    quotedMessageId: null,
    mentions: [],
    timestamp: Date.now()
  };
  saveMessage(groupId, msg);
}

// ===== 文件上传处理 =====
function handleFileUpload(input) {
  const groupId = window._uploadToGroupId || activeGroupId;
  if (window._uploadToGroupId === groupId) window._uploadToGroupId = null;
  if (!groupId) return;
  const file = input.files[0];
  if (!file) return;
  const MAX_SIZE = 100 * 1024 * 1024;
  if (file.size > MAX_SIZE) {
    showToast('文件不能超过100MB', 'error');
    input.value = '';
    return;
  }
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!FILE_PARSERS[ext]) {
    showToast('不支持的文件类型: ' + ext, 'error');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const content = await FILE_PARSERS[ext](reader.result);
      if (!groupFiles[groupId]) groupFiles[groupId] = [];
      // 移除同名旧文件（含IndexedDB清理）
      const oldFile = groupFiles[groupId].find(f => f.filename === file.name);
      if (oldFile) await deleteFileContent(groupId, file.name);
      groupFiles[groupId] = groupFiles[groupId].filter(f => f.filename !== file.name);
      const meta = {
        filename: file.name,
        size: file.size,
        timestamp: Date.now(),
        visible: true,
        _storage: file.size <= FILE_IDB_THRESHOLD ? 'local' : 'indexed'
      };
      if (meta._storage === 'local') {
        meta.content = content;
      }
      groupFiles[groupId].push(meta);
      // 大文件异步写入IndexedDB
      if (meta._storage === 'indexed') {
        await setFileContent(groupId, file.name, content, file.size);
        // setFileContent 内部已调用 saveGroupFiles()，完成后元数据一致
      }
      addSystemMessage(groupId, '📎 已上传: ' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)\nAgent可用 {"readFile":"' + file.name + '"} 读取');
      showToast('✅ 已上传: ' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)', 'success');
      saveGroupFiles();
      DebugLogger.info('file', '上传文件: ' + file.name + ' (' + ext + ', ' + (file.size/1024).toFixed(1) + 'KB)');
    } catch(err) {
      showToast(file.name + ' 解析失败: ' + err.message, 'error');
      DebugLogger.error('file', '解析失败: ' + file.name + ' - ' + err.message);
    }
  };
  reader.onerror = () => {
    showToast('文件读取失败', 'error');
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function escapeJSStr(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// ===== Toast 提示 =====
function showToast(msg, type = 'success') {
  const existing = document.getElementById('toastEl');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toastEl';
  const color = type === 'error' ? 'var(--accent-red)' : type === 'warning' ? 'var(--accent-gold)' : 'var(--accent-green)';
  toast.style.cssText = `
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:500;
    padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;
    background:rgba(0,0,0,0.9);border:1px solid ${color};color:${color};
    pointer-events:none;transition:opacity 0.3s;white-space:nowrap;
  `;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
}

function handleInputKeydown(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    if (isDiscussionRunning) {
      // 讨论进行中，回车=停止
      stopDiscussion();
    } else {
      sendMessage();
    }
  }
}

function handleInputChange(event) {
  const input = event.target;
  // 移动端IME组合输入期间不调整高度，避免卡死
  if (event.isComposing) return;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, window.innerHeight * 0.4) + 'px';
  
  const cursorPos = input.selectionStart;
  const textBeforeCursor = input.value.substring(0, cursorPos);
  if (textBeforeCursor.endsWith('@') && activeGroupId) {
    showMentionSelector(input, activeGroupId);
  }
}

function showPopupMenu(x, y, items) {
  const existing = document.getElementById('popupMenu');
  
  // 【修复】清理上一次可能残留的closeHandler引用
  if (existing._closeHandler) {
    document.removeEventListener('click', existing._closeHandler);
    existing._closeHandler = null;
  }
  
  existing.style.display = 'none';
  
  existing.innerHTML = items.map((item, idx) => {
    if (item.label === '---') {
      return '<div style="border-top:1px solid var(--border-color);margin:4px 0;"></div>';
    }
    return `<div class="popup-menu-item${item.danger ? ' danger' : ''}" 
      data-idx="${idx}">${item.label}</div>`;
  }).join('');
  
  existing.querySelectorAll('.popup-menu-item').forEach((el) => {
    const idx = parseInt(el.dataset.idx);
    const item = items[idx];
    if (item && item.action) {
      el.addEventListener('click', () => {
        existing.style.display = 'none';
        // 【修复】菜单项点击时主动清理外部点击监听器
        if (existing._closeHandler) {
          document.removeEventListener('click', existing._closeHandler);
          existing._closeHandler = null;
        }
        item.action();
      });
    }
  });
  
  existing.style.display = 'block';
  
  requestAnimationFrame(() => {
    const menuWidth = existing.offsetWidth;
    const menuHeight = existing.offsetHeight;
    existing.style.left = Math.min(x, window.innerWidth - menuWidth - 10) + 'px';
    existing.style.top = Math.min(y, window.innerHeight - menuHeight - 60) + 'px';
  });
  
  const closeHandler = (e) => {
    if (!existing.contains(e.target)) {
      existing.style.display = 'none';
      document.removeEventListener('click', closeHandler);
      existing._closeHandler = null;
    }
  };
  existing._closeHandler = closeHandler;
  setTimeout(() => document.addEventListener('click', closeHandler), 100);
}

function showMuteSelector(group, x, y) {
  const members = group.members.filter(m => m.role !== 'host');
  if (members.length === 0) {
    alert('没有可禁言的成员');
    return;
  }
  
  const items = members.map(m => {
    const agent = getAgentFriend(m.agentId);
    return {
      label: `${agent?.name || '未知'}${m.isMuted ? ' [已禁言]' : ''}`,
      action: () => {
        if (m.isMuted) {
          alert(`${agent?.name || '该成员'} 已处于禁言状态`);
        } else {
          const rounds = parseInt(prompt(`禁言 ${agent?.name || '该成员'} 几轮?`, '3'));
          if (rounds > 0 && !isNaN(rounds)) {
            m.isMuted = true;
            const scheduler = getWakeScheduler(activeGroupId);
            m.muteUntilCount = scheduler.messageCount + rounds;
            saveGroup(group);
            addSystemMessage(activeGroupId, `[系统] ${agent?.name || '成员'} 被禁言 ${rounds} 轮`);
            renderChatMessages();
          }
        }
      }
    };
  });
  
  showPopupMenu(x, y, items);
}

function showUnmuteSelector(group, x, y) {

  if (mutedMembers.length === 0) {

}

function showProposeInput(x, y) {
  const content = prompt('输入提议内容:');
  if (content && content.trim()) {
    const groupId = activeGroupId;
    const proposalId = generateUUID();
    ProposalStateMachine.create(proposalId, content.trim(), '__user__', groupId);
    addSystemMessage(groupId, `[用户提议] ${content.trim()} (ID: ${proposalId.substring(0, 8)})`);
    renderChatMessages();
    
    // 【Bug2修复】用户手动发起提议后强制唤醒全体非禁言成员参与表决
    // 不使用runChatRound（避免计数唤醒的随机性），直接构造表决任务
    const group = getGroup(groupId);
    if (!group) return;
    
    setTimeout(async () => {
      const abortSignal = groupAbortControllers.get(groupId)?.signal || null;
      try {
        const allMessages = getMessages(groupId);
        const concurrency = getConcurrencyController(groupId);
        
        // 强制唤醒所有非禁言、有API Key的成员
        const allMemberIds = group.members
          .filter(m => !m.isMuted)
          .map(m => m.agentId)
          .filter(id => {
            const agent = getAgentFriend(id);
            return agent && agent.apiKey && agent.apiKey.trim();
          });
        
        if (allMemberIds.length === 0) return;
        
        const votingPrompt = `[系统表决请求] 用户发起了一个新提议需要表决:\n  提议ID: ${proposalId}\n  提议内容: ${content.trim()}\n  请各成员使用 vote 命令进行表决: {\"command\":\"vote\",\"proposalId\":\"${proposalId}\",\"vote\":\"agree或disagree\",\"reason\":\"表决理由\"}`;
        
        const tasks = allMemberIds.map(agentId => {
          return async () => {
            const member = group.members.find(m => m.agentId === agentId);
            const agent = getAgentFriend(agentId);
            if (!member || !agent) return;
            
            const context = buildAgentContext(group, agentId, allMessages);
            try {
              const response = await callAgentAPI(
                agent, member, group,
                votingPrompt,
                context.messages,
                false
              );
              
              let fullResponse = '';
              let thinkingResponse = '';
              const msgElement = createMessageBubble(agent.name, agent.avatar, member);
              
              await streamAgentResponse(
                response,
                (chunk, full, isThinking) => {
                  if (isThinking) {
                    thinkingResponse += chunk;
                    updateThinkingBlock(msgElement, thinkingResponse);
                  } else {
                    fullResponse += chunk;
                    updateMessageContent(msgElement, fullResponse);
                  }
                },
                (fullText, thinkingText) => {
                  if (abortSignal && abortSignal.aborted) return;
                  const parsed = parseAgentResponse(fullText);

                  // 【v3修复】空输出过滤——与主线聊天循环保持一致，防止偏离检测哨兵空格泄露
                  const hasSearchCommands = parsed.searchCommands && parsed.searchCommands.length > 0 && agent.enableSearchTool;
                  const hasFileCommands = parsed.readFileCommands && parsed.readFileCommands.length > 0 && agent.enableFileTool;
                  const hasCommandBlock = parsed.commandBlock !== null;
                  const hasContent = parsed.cleanContent && parsed.cleanContent.trim();
                  if (!hasContent && !hasSearchCommands && !hasFileCommands && !hasCommandBlock) {
                    if (msgElement && msgElement.parentNode) {
                      msgElement.remove();
                    }
                    DebugLogger.info('chat', `${agent.name} 空输出已过滤（静默）`);
                    return;
                  }

                  const msg = {
                    id: generateUUID(),
                    groupId,
                    roundIndex: getNextRoundIndex(groupId),
                    senderType: 'agent',
                    senderId: agentId,
                    senderName: agent.name,
                    content: parsed.cleanContent || parsed.displayContent,
                    cleanContent: parsed.cleanContent,
                    thinkingContent: thinkingText || parsed.thinkingContent,
                    commandBlock: parsed.commandBlock,
                    commandResult: null,
                    searchResult: null,
                    quotedMessageId: parsed.quotedMessageId || null,
                    mentions: extractMentionsFromContent(parsed.cleanContent, group),
                    timestamp: Date.now()
                  };
                  saveMessage(groupId, msg);

                  if (parsed.commandBlock) {
                    handleCommand(parsed.commandBlock, groupId, agentId);
                  }

                  // 【Bug4修复】消息生成完成后递增messageCount
                  const scheduler = getWakeScheduler(groupId);
                  scheduler.incrementMessageCount();

                  finalizeMessageBubble(msgElement, parsed, msg);
                },
 
                (error) => {
                  showErrorMessage(msgElement, error.message);
                },
                abortSignal
              );
            } catch (error) {
              if (error.message !== '讨论已被终止') {
                DebugLogger.error(`agent:${agent.name}`, `表决响应失败: ${error.message}`);
              }
            }
          };
        });
        
        await concurrency.executeAll(tasks);
        renderChatMessages();
        renderGroupList();
      } catch(e) {
        if (e.message !== '讨论已被终止') {
          DebugLogger.error('command', `用户提议表决轮触发失败: ${e.message}`);
        }
      }
    }, 500);
  }
}

function showVoteSelector(x, y) {
  const openProposals = [];
  ProposalStateMachine.proposals.forEach((p, id) => {
    if (p.status === 'open' && p.groupId === activeGroupId) {
      openProposals.push({ id, content: p.content });
    }
  });
  
  if (openProposals.length === 0) {
    alert('当前没有进行中的提议');
    return;
  }
  
  const items = openProposals.map(p => ({
    label: `提议: ${p.content.substring(0, 30)}...`,
    action: () => {
      const vote = confirm(`对提议 "${p.content.substring(0, 40)}..." \n\n点击"确定"=同意，点击"取消"=反对`);
      const result = ProposalStateMachine.castVote(
        p.id, '__user__', vote ? 'agree' : 'disagree', '用户手动表决'
      );
      if (result) {
        addSystemMessage(activeGroupId, `[用户表决] ${vote ? '同意' : '反对'}了提议 (${p.id.substring(0, 8)})`);
        renderChatMessages();
      }
    }
  }));
  
  showPopupMenu(x, y, items);
}

function enterQuoteMode() {
  // 【修复】实现真正的引用模式：让用户点击消息来引用
  const messageList = document.getElementById('messageList');
  if (!messageList) return;
  
  // 添加视觉提示：进入引用模式
  const input = document.getElementById('messageInput');
  if (input) {
    input.placeholder = '[引用模式] 点击一条消息来引用它，或按Esc取消...';
    input.focus();
  }
  
  // 高亮所有可引用的消息
  const wrappers = messageList.querySelectorAll('.message-wrapper.agent, .message-wrapper.user');
  wrappers.forEach(w => {
    w.style.cursor = 'pointer';
    w.style.outline = '2px dashed var(--accent-blue)';
    w.style.outlineOffset = '2px';
  });
  
  // 点击消息完成引用
  const quoteHandler = function(e) {
    const wrapper = e.target.closest('.message-wrapper');
    if (!wrapper) return;
    
    // 从id提取消息ID: msg-xxxx
    const msgId = wrapper.id.replace('msg-', '');
    if (!msgId) return;
    
    // 将引用标记插入输入框
    if (input) {
      const currentVal = input.value;
      input.value = (currentVal ? currentVal + ' ' : '') + `[引用:${msgId}] `;
      input.placeholder = '输入消息... 使用 @ 提及Agent';
      input.focus();
    }
    
    // 清理引用模式
    cleanupQuoteMode(wrappers);
  };
  
  // Esc取消
  const keyHandler = function(e) {
    if (e.key === 'Escape') {
      cleanupQuoteMode(wrappers);
    }
  };
  
  function cleanupQuoteMode(wrappersList) {
    wrappersList.forEach(w => {
      w.style.cursor = '';
      w.style.outline = '';
      w.style.outlineOffset = '';
      w.removeEventListener('click', quoteHandler);
    });
    document.removeEventListener('keydown', keyHandler);
    if (input) {
      input.placeholder = '输入消息... 使用 @ 提及Agent';
    }
  }
  
  wrappers.forEach(w => {
    w.addEventListener('click', quoteHandler);
  });
  document.addEventListener('keydown', keyHandler);
}

}

// ===== 群文件管理渲染 =====
function renderFileManagement(groupId) {
  const files = groupFiles[groupId] || [];
  if (files.length === 0) {
    return `<div style="font-size:13px;color:var(--text-weak);padding:4px 0 8px;">
      暂无文件 · 在聊天输入框旁点 📎 上传
    </div>
    <div style="margin-top:8px;">
      <button class="btn small" onclick="window._uploadToGroupId='${groupId}';document.getElementById('fileUploadInput').click();">📎 上传文件</button>
    </div>`;
  }
  const items = files.map((f, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;
      padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;display:flex;align-items:center;gap:6px;">
          ${f.visible === false ? '<span style="color:var(--accent-red);font-size:10px;">[已屏蔽]</span>' : ''}
          ${escapeHTML(f.filename)}
        </div>
        <div style="font-size:11px;color:var(--text-weak);">
          ${(f.size/1024).toFixed(1)}KB · ${new Date(f.timestamp).toLocaleString('zh-CN')}
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;">
        <button class="btn small" onclick="toggleFileVisibility('${escapeJSStr(groupId)}','${escapeJSStr(f.filename)}')" style="font-size:11px;">
          ${f.visible === false ? '取消屏蔽' : '屏蔽'}</button>
        <button class="btn small" onclick="downloadGroupFile('${escapeJSStr(groupId)}','${escapeJSStr(f.filename)}')" style="font-size:11px;">下载</button>
        <button class="btn small danger" onclick="deleteGroupFile('${escapeJSStr(groupId)}','${escapeJSStr(f.filename)}')" style="font-size:11px;">删除</button>
      </div>
    </div>`).join('');
  return items + `
    <div style="margin-top:12px;">
      <button class="btn small" onclick="window._uploadToGroupId='${groupId}';document.getElementById('fileUploadInput').click();">📎 上传更多文件</button>
    </div>`;
}

function toggleFileVisibility(groupId, filename) {
  const files = groupFiles[groupId] || [];
  const found = files.find(f => f.filename === filename);
  if (!found) return;
  found.visible = (found.visible === false) ? true : false;
  saveGroupFiles();
  addSystemMessage(groupId, found.visible === false
    ? '[系统] 文件 "' + filename + '" 已被屏蔽，Agent将无法读取'
    : '[系统] 文件 "' + filename + '" 已恢复可见');
  openGroupSettingsPanel(groupId);

}

async function deleteGroupFile(groupId, filename) {
  if (!confirm('确定删除文件 "' + filename + '"? 此操作不可恢复。')) return;
  if (!groupFiles[groupId]) return;
  await deleteFileContent(groupId, filename);
  groupFiles[groupId] = groupFiles[groupId].filter(f => f.filename !== filename);
  saveGroupFiles();
  addSystemMessage(groupId, '[系统] 文件 "' + filename + '" 已被删除');
  openGroupSettingsPanel(groupId);
}

async function downloadGroupFile(groupId, filename) {
  const flist = groupFiles[groupId] || [];
  const found = flist.find(f => f.filename === filename);
  if (!found) return;
  const content = await getFileContent(groupId, filename);
  if (content === null) { showToast('文件读取失败', 'error'); return; }
  const ext = '.' + filename.split('.').pop().toLowerCase();
  const mimeMap = {
    // 纯文本
    '.txt':'text/plain','.md':'text/markdown','.log':'text/plain',
    // 数据
    '.json':'application/json','.csv':'text/csv','.xml':'application/xml','.html':'text/html',
    '.yaml':'text/yaml','.yml':'text/yaml','.toml':'text/plain','.ini':'text/plain',
    '.cfg':'text/plain','.env':'text/plain','.css':'text/css',
    // 脚本
    '.sh':'text/x-shellscript','.bash':'text/x-shellscript','.zsh':'text/x-shellscript',
    '.bat':'text/plain','.ps1':'text/plain',
    // 代码
    '.js':'text/javascript','.ts':'text/typescript','.jsx':'text/javascript','.tsx':'text/typescript',
    '.py':'text/x-python','.java':'text/x-java','.c':'text/x-c','.cpp':'text/x-c++',
    '.h':'text/x-c','.hpp':'text/x-c++','.go':'text/x-go','.rs':'text/x-rust',
    '.rb':'text/x-ruby','.php':'text/x-php','.swift':'text/x-swift','.kt':'text/x-kotlin',
    '.scala':'text/x-scala','.r':'text/x-r','.m':'text/x-objectivec','.lua':'text/x-lua',
    '.sql':'text/x-sql','.pl':'text/x-perl','.tex':'text/x-tex','.rkt':'text/x-scheme',
    '.dart':'text/x-dart','.elm':'text/x-elm','.ex':'text/x-elixir','.exs':'text/x-elixir',
    '.fsx':'text/x-fsharp','.groovy':'text/x-groovy','.hs':'text/x-haskell',
    '.nim':'text/x-nim','.jl':'text/x-julia','.ml':'text/x-ocaml','.pas':'text/x-pascal',
    // Office
    '.pdf':'application/pdf','.docx':'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    '.xlsx':'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    '.xls':'application/vnd.ms-excel','.xlsm':'application/vnd.ms-excel.sheet.macroEnabled.12',
    '.ods':'application/vnd.oasis.opendocument.spreadsheet',
    '.pptx':'application/vnd.openxmlformats-officedocument.presentationml.presentation',
    // 电子书
    '.epub':'application/epub+zip',
    // 图片
    '.png':'image/png','.jpg':'image/jpeg','.jpeg':'image/jpeg','.gif':'image/gif',
    '.webp':'image/webp','.bmp':'image/bmp'
  };
  const mime = mimeMap[ext] || 'application/octet-stream';
  const charset = mime.startsWith('text/') || mime === 'application/json' || mime === 'application/xml'
    ? ';charset=utf-8' : '';
  const blob = new Blob([content], { type: mime + charset });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
}

function updateGroupField(groupId, field, value) {
  const group = getGroup(groupId);
  if (!group) return;
  group[field] = value;
  saveGroup(group);
  updateNavTitle();
  renderGroupList();
}

function updateGroupSetting(groupId, setting, value) {
  const group = getGroup(groupId);
  if (!group) return;
  group.settings[setting] = value;
  saveGroup(group);
}

function updateCompressionThresholdSlider(groupId, sliderEl) {
  const value = parseInt(sliderEl.value);
  const valueDisplay = document.getElementById('compressionThresholdValue');
  if (valueDisplay) {
    valueDisplay.textContent = value + '%';
    if (value <= 30) valueDisplay.style.color = 'var(--accent-green)';
    else if (value <= 60) valueDisplay.style.color = 'var(--accent-gold)';
    else valueDisplay.style.color = 'var(--accent-red)';
  }
  updateGroupSetting(groupId, 'compressionThreshold', value);
}

function updateConcurrencyLimitSlider(groupId, sliderEl) {
  const value = parseInt(sliderEl.value);
  const valueDisplay = document.getElementById('concurrencyLimitValue_' + groupId);
  if (valueDisplay) {
    valueDisplay.textContent = value;
    if (value === 1) valueDisplay.style.color = 'var(--accent-green)';
    else if (value <= 3) valueDisplay.style.color = 'var(--accent-gold)';
    else valueDisplay.style.color = 'var(--accent-red)';
  }
  updateGroupSetting(groupId, 'concurrencyLimit', value);
}

function updateSelfCritiqueRoundsSlider(groupId, sliderEl) {
  var value = parseInt(sliderEl.value);
  var valueDisplay = document.getElementById('selfCritiqueRoundsValue_' + groupId);
  if (valueDisplay) {
    valueDisplay.textContent = value === 0 ? '关闭' : value;
  }
  updateGroupSetting(groupId, 'selfCritiqueRounds', value);
}

function toggleGroupBreakArmor(groupId, el) {
  const group = getGroup(groupId);
  if (!group) return;
  group.settings.globalBreakArmor = !group.settings.globalBreakArmor;
  el.classList.toggle('on', group.settings.globalBreakArmor);
  saveGroup(group);
  
  const statusEl = document.getElementById('breakArmorStatus');
  if (statusEl) {
    statusEl.innerHTML = '当前状态: ' + (group.settings.globalBreakArmor
      ? '<span style="color:var(--accent-green);">已开启</span>'
      : '<span style="color:var(--accent-red);">已关闭</span>');
  }
}

function toggleSearchFallback(groupId, el) {
  const group = getGroup(groupId);
  if (!group) return;
  if (group.settings.enableSearchFallback === undefined) {
    group.settings.enableSearchFallback = false;
  }
  group.settings.enableSearchFallback = !group.settings.enableSearchFallback;
  el.classList.toggle('on', group.settings.enableSearchFallback);
  saveGroup(group);
}

function renderMemberManagement(group) {
  return group.members.map(m => {
    const agent = getAgentFriend(m.agentId);
    if (!agent) return '';
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;
        padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--bg-tertiary);
            display:flex;align-items:center;justify-content:center;font-size:12px;">
            ${escapeHTML(agent.avatar)}
          </div>
          <div>
            <div style="font-size:14px;">${escapeHTML(agent.name)}</div>
            <div style="font-size:11px;color:var(--text-weak);">
              ${m.role === 'host' ? '群主' : m.role === 'admin' ? '管理员' : '成员'}
              ${m.isMuted ? ' · 禁言中' : ''}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:4px;">
          ${m.role !== 'host' ? `<button class="btn small" onclick="promoteMember('${group.id}','${m.agentId}','host')">升群主</button>` : ''}
          ${m.role === 'member' ? `<button class="btn small" onclick="promoteMember('${group.id}','${m.agentId}','admin')">设管理</button>` : ''}
          ${m.role === 'admin' ? `<button class="btn small" onclick="demoteMember('${group.id}','${m.agentId}')">降级</button>` : ''}
          ${!m.isMuted ? `<button class="btn small" onclick="muteMemberFromPanel('${group.id}','${m.agentId}')">禁言</button>` : ''}
          ${m.isMuted ? `<button class="btn small" onclick="unmuteMemberFromPanel('${group.id}','${m.agentId}')">解除</button>` : ''}
          ${m.role !== 'host' ? `<button class="btn small danger" onclick="kickMember('${group.id}','${m.agentId}')">踢出</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

function promoteMember(groupId, agentId, role) {
  const group = getGroup(groupId);
  if (!group) return;
  if (role === 'host') {
    group.members.forEach(m => { if (m.role === 'host') m.role = 'member'; });
  }
  const member = group.members.find(m => m.agentId === agentId);
  if (member) member.role = role;
  saveGroup(group);
  const agent = getAgentFriend(agentId);
  addSystemMessage(groupId, `[系统] ${agent?.name || '成员'} 被任命为${role === 'host' ? '群主' : '管理员'}`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function demoteMember(groupId, agentId) {
  const group = getGroup(groupId);
  if (!group) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (member) member.role = 'member';
  saveGroup(group);
  const agent = getAgentFriend(agentId);
  addSystemMessage(groupId, `[系统] ${agent?.name || '成员'} 被降级为普通成员`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function kickMember(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  if (!confirm(`确认将 ${agent.name} 踢出群聊?`)) return;
  group.members = group.members.filter(m => m.agentId !== agentId);
  saveGroup(group);
  addSystemMessage(groupId, `[系统] ${agent.name} 已被移出群聊`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function showInviteMemberSelector(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  
  const allFriends = getAllAgentFriends();
  const activeMemberIds = new Set(group.members.map(m => m.agentId));
  const available = allFriends.filter(a => !activeMemberIds.has(a.id));
  
  if (available.length === 0) {
    alert('没有可邀请的好友（所有好友已在群内）');
    return;
  }
  
  const dialog = document.createElement('div');
  dialog.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.7);z-index:400;
    display:flex;align-items:center;justify-content:center;
  `;
  dialog.id = 'inviteMemberDialog';
  
  const selectedIds = new Set();
  
  const toggleSelect = (agentId, el) => {
    if (selectedIds.has(agentId)) {
      selectedIds.delete(agentId);
      el.style.background = 'transparent';
      el.style.outline = '';
    } else {
      selectedIds.add(agentId);
      el.style.background = 'rgba(68,136,255,0.15)';
      el.style.outline = '1px solid var(--accent-blue)';
    }
    const btn = dialog.querySelector('#inviteConfirmBtn');
    if (btn) btn.textContent = `拉入群聊 (${selectedIds.size})`;
  };
  
  dialog.innerHTML = `
    <div style="background:var(--bg-secondary);border:1px solid var(--border-color);
      border-radius:var(--radius-lg);width:400px;max-width:90vw;max-height:70vh;
      display:flex;flex-direction:column;">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border-color);
        display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:600;">拉人进群 · ${escapeHTML(group.name)}</span>
        <button class="hamburger-btn" id="inviteDialogClose">[×]</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:8px;">
        ${available.map(a => `
          <div class="invite-candidate" data-agent-id="${a.id}"
            style="display:flex;align-items:center;gap:10px;padding:10px 12px;
              cursor:pointer;border-radius:var(--radius-sm);margin:2px 0;
              transition:background 0.1s;">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--bg-tertiary);
              display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;
              flex-shrink:0;">${escapeHTML(a.avatar)}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;">${escapeHTML(a.name)}</div>
              <div style="font-size:11px;color:var(--text-weak);">${escapeHTML(a.model)} ${(a.tags||[]).join(' · ')}</div>
            </div>
          </div>
        `).join('')}
        ${available.length === 0 ? '<div style="text-align:center;color:var(--text-weak);padding:24px;">没有可邀请的好友</div>' : ''}
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--border-color);
        display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn" id="inviteCancelBtn">取消</button>
        <button class="btn primary" id="inviteConfirmBtn">拉入群聊</button>
      </div>
    </div>`;
  
  document.body.appendChild(dialog);
  
  // 绑定候选人点击事件
  dialog.querySelectorAll('.invite-candidate').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (!selectedIds.has(el.dataset.agentId)) el.style.background = 'rgba(255,255,255,0.03)';
    });
    el.addEventListener('mouseleave', () => {
      if (!selectedIds.has(el.dataset.agentId)) el.style.background = 'transparent';
    });
    el.addEventListener('click', () => toggleSelect(el.dataset.agentId, el));
  });
  
  // 关闭按钮
  dialog.querySelector('#inviteDialogClose').addEventListener('click', () => dialog.remove());
  dialog.querySelector('#inviteCancelBtn').addEventListener('click', () => dialog.remove());
  
  // 点击遮罩关闭
  dialog.addEventListener('click', (e) => {
    if (e.target === dialog) dialog.remove();
  });
  
  // 确认按钮
  dialog.querySelector('#inviteConfirmBtn').addEventListener('click', () => {
    if (selectedIds.size === 0) return;
    for (const agentId of selectedIds) {
      inviteMemberToGroup(groupId, agentId);
    }
    dialog.remove();
    openGroupSettingsPanel(groupId);
    renderChatMessages();
  });
}

function inviteMemberToGroup(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  
  if (group.members.some(m => m.agentId === agentId)) return;
  
  group.members.push({
    agentId: agentId,
    overrides: {},
    role: 'member',
    isMuted: false,
    muteUntilCount: null,
    joinedAt: Date.now()
  });
  saveGroup(group);
  addSystemMessage(groupId, `[加入] ${agent.name} 被邀请加入群聊`);
}

function muteMemberFromPanel(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (!member) return;
  if (member.role === 'host') {
    alert('不能禁言群主');
    return;
  }
  const rounds = parseInt(prompt(`禁言 ${agent.name} 几轮?`, '3'));
  if (!rounds || rounds <= 0 || isNaN(rounds)) return;
  member.isMuted = true;
  const scheduler = getWakeScheduler(groupId);
  member.muteUntilCount = scheduler.messageCount + rounds;
  saveGroup(group);
  addSystemMessage(groupId, `[系统] ${agent.name} 被禁言 ${rounds} 轮`);
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function unmuteMemberFromPanel(groupId, agentId) {
  const group = getGroup(groupId);
  const agent = getAgentFriend(agentId);
  if (!group || !agent) return;
  const member = group.members.find(m => m.agentId === agentId);
  if (member) {
    member.isMuted = false;
    member.muteUntilCount = null;
    saveGroup(group);
    addSystemMessage(groupId, `[系统] ${agent.name} 被解除禁言`);
    openGroupSettingsPanel(groupId);
    renderChatMessages();
  }
}

function renderMuteManagement(group) {
  const mutedMembers = group.members.filter(m => m.isMuted);
  if (mutedMembers.length === 0) {
    return '<div style="font-size:13px;color:var(--text-weak);">当前无禁言成员</div>';
  }
  const scheduler = getWakeScheduler(group.id);
  return `
    <div style="margin-bottom:8px;">
      ${mutedMembers.map(m => {
        const agent = getAgentFriend(m.agentId);
        const remaining = m.muteUntilCount !== null && m.muteUntilCount !== undefined
          ? Math.max(0, m.muteUntilCount - scheduler.messageCount)
          : '?';
        return `<div style="font-size:13px;padding:4px 0;display:flex;justify-content:space-between;">
          <span>${agent?.name || '未知'} <span style="color:var(--accent-red);">(剩余${remaining}轮)</span></span>
          <button class="btn small" onclick="unmuteMemberFromPanel('${group.id}','${m.agentId}')">解除</button>
        </div>`;
      }).join('')}
    </div>
    <button class="btn small danger" onclick="unmuteAllMembers('${group.id}')">批量解除所有禁言</button>`;
}

function unmuteAllMembers(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  group.members.forEach(m => { m.isMuted = false; m.muteUntilCount = null; });
  saveGroup(group);
  addSystemMessage(groupId, '[系统] 所有禁言已解除');
  openGroupSettingsPanel(groupId);
  renderChatMessages();
}

function resetChat(groupId) {
  if (!confirm('确认重置聊天? 所有消息和摘要将被清空。')) return;
  saveMessages(groupId, []);
  const group = getGroup(groupId);
  if (group) {
    group.summaries = [];
    saveGroup(group);
    const scheduler = wakeSchedulers.get(groupId);
    if (scheduler) scheduler.reset();
  }
  addSystemMessage(groupId, '[系统] 聊天记录已重置');
  renderChatMessages();
}

function disbandGroup(groupId) {
  const group = getGroup(groupId);
  if (!group) return;
  if (!confirm(`确认解散群聊 "${group.name}"? 此操作不可恢复。`)) return;
  if (!confirm(`再次确认解散 "${group.name}"?`)) return;
  deleteGroup(groupId);
  if (activeGroupId === groupId) {
    activeGroupId = null;
    const settings = getAppSettings();
    settings.activeGroupId = null;
    saveAppSettings(settings);
  }
  closePanel();
  switchView('groups');
  renderGroupList();
}

function createNewGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  if (!name) { alert('请输入群名称'); return; }
  
  const topic = document.getElementById('newGroupTopic').value.trim();
  const hostId = document.querySelector('input[name="hostSelect"]:checked')?.value;
  if (!hostId) { alert('请选择群主'); return; }
  
  const memberIds = [...document.querySelectorAll('input[name="memberSelect"]:checked')]
    .map(el => el.value);
  const concurrency = parseInt(document.getElementById('newGroupConcurrency').value) || 1;
  const breakArmor = document.getElementById('newGroupBreakArmor').classList.contains('on');
  const selfCritique = parseInt(document.getElementById('newGroupSelfCritiqueRounds')?.value) || 0;
  
  const groupId = generateUUID();
  const group = {
    id: groupId,
    name,
    topic,
    createdAt: Date.now(),
    members: [],
    settings: {
      concurrencyLimit: Math.max(1, Math.min(3, concurrency)),
      globalBreakArmor: breakArmor,
      hostContextMultiplier: 2,
      maxHistoryRounds: 15,
      compressionThreshold: 70,
      selfCritiqueRounds: Math.max(0, Math.min(3, selfCritique))
    },
    summaries: []
  };
  
  group.members.push({
    agentId: hostId,
    overrides: {},
    role: 'host',
    isMuted: false,
    muteUntilCount: null,
    joinedAt: Date.now()
  });
  
  for (const id of memberIds) {
    if (id === hostId) continue;
    group.members.push({
      agentId: id,
      overrides: {},
      role: 'member',
      isMuted: false,
      muteUntilCount: null,
      joinedAt: Date.now()
    });
  }
  
  // 【AI话题检测】强制添加话题偏离检测Agent到每个群
  // Watcher作为系统哨兵，不占用用户选择的成员名额
  const DRIFT_WATCHER_ID = 'builtin-watchdog-drift';
  if (!group.members.some(m => m.agentId === DRIFT_WATCHER_ID)) {
    const watcher = getAgentFriend(DRIFT_WATCHER_ID);
    if (watcher) {
      group.members.push({
        agentId: DRIFT_WATCHER_ID,
        overrides: {},
        role: 'member',
        isMuted: false,
        muteUntilCount: null,
        joinedAt: Date.now()
      });
    }
  }
  
  saveGroup(group);
  
  getWakeScheduler(groupId);
  
  const hostAgent = getAgentFriend(hostId);
  // 构建成员列表供初始显示
  const visibleMembers = group.members.filter(m => !HIDDEN_AGENT_IDS.has(m.agentId));
  const memberIntro = visibleMembers.map(m => {
    const a = getAgentFriend(m.agentId);
    const role = m.role === 'host' ? '群主' : '成员';
    return `  • ${a?.name || '未知'} (${role})`;
  }).join('\n');
  addSystemMessage(groupId, `[系统] 群聊 "${name}" 已创建!\n\n当前成员(${visibleMembers.length}人):\n${memberIntro}\n\n请 @${hostAgent?.name || '群主'} 并描述您的话题或项目，群主会开始引导讨论并分配任务。`);  
  closeCreateGroupDialog();
  openChat(groupId);
}

function getTestStatusBadge(agent, testResult, tavilyResult) {
  if (!agent.apiKey || !agent.apiKey.trim()) {
    return '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text-weak);">未配置Key</span>';
  }
  
  if (!testResult) {
    return '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text-weak);">未测试</span>';
  }
  
  const badgeMap = {
    'ok':              { bg: 'rgba(68,255,68,0.15)', color: 'var(--accent-green)', text: '连通' },
    'model_not_found': { bg: 'rgba(255,215,0,0.15)', color: 'var(--accent-gold)',  text: '模型未找到' },
    'auth_error':      { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '认证失败' },
    'timeout':         { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '超时' },
    'network_error':   { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '网络错误' },
    'rate_limited':    { bg: 'rgba(255,215,0,0.15)', color: 'var(--accent-gold)',  text: '限流429' },
    'bad_request':     { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '请求错误' },
    'unexpected':      { bg: 'rgba(255,68,68,0.15)',  color: 'var(--accent-red)',   text: '异常响应' }
  };
  
  const b = badgeMap[testResult.status] || badgeMap['unexpected'];
  let html = `<span style="font-size:10px;padding:1px 6px;border-radius:3px;
    background:${b.bg};color:${b.color};">${b.text}</span>`;

  // Tavily搜索状态徽章（仅当该Agent启用了搜索工具且配置了Tavily Key时显示）
  if (agent.enableSearchTool && agent.tavilyApiKey && agent.tavilyApiKey.trim()) {
    if (tavilyResult && tavilyResult.type === 'tavily') {
      const tb = badgeMap[tavilyResult.status] || badgeMap['unexpected'];
      html += ` <span style="font-size:10px;padding:1px 6px;border-radius:3px;
        background:${tb.bg};color:${tb.color};">⚡ ${tb.text}</span>`;
    } else if (!tavilyResult) {
      html += ` <span style="font-size:10px;padding:1px 6px;border-radius:3px;
        background:rgba(255,255,255,0.05);color:var(--text-weak);">⚡未测试</span>`;
    }
  }

  return html;
}

function getLatencyDisplay(testResult) {
  if (!testResult || testResult.status === 'skipped') return '';
  const ms = testResult.latency;
  const color = ms < 1000 ? 'var(--accent-green)' : ms < 3000 ? 'var(--accent-gold)' : 'var(--accent-red)';
  return `<span style="color:${color};">${ms}ms</span>`;
}

function showFriendHamburgerMenu(event) {
  const items = [
    { label: '导入Agent列表', action: () => {
      const input = document.getElementById('hiddenFileInput');
      if (!input) return;
      input.accept = '.json';
      // 清理旧handler，绑定新的
      if (input._oldHandler) {
        input.removeEventListener('change', input._oldHandler);
      }
      const handler = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const result = await importAgentList(file);
          alert(`导入完成: ${result.imported}个成功, ${result.skipped}个跳过(重名), 共${result.total}个`);
          renderFriendList();
        } catch(err) {
          alert('导入失败: ' + err.message);
        }
        input.value = '';
      };
      input._oldHandler = handler;
      input.addEventListener('change', handler);
      input.click();
    }},
    { label: '导出Agent列表', action: () => exportAgentList() }
  ];
  showPopupMenu(event.clientX, event.clientY, items);
}

  const modelSelect = document.getElementById('editAgentModel');

      if (customInput) customInput.style.display = this.value === 'custom' ? 'block' : 'none';
